<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Self Love Club — Protocol Formatter</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,400&family=DM+Mono:wght@300&family=Instrument+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --parchment:#F7F4EF;
  --ink:#1A1814;
  --amber:#8B6F4E;
  --sand:#C4A882;
}

* { box-sizing: border-box; }

body {
  margin:0;
  background:var(--parchment);
  color:var(--ink);
  font-family:'Instrument Sans', sans-serif;
}

/* NAV */
nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 28px;
  border-bottom:1px solid rgba(196,168,130,.3);
}

.brand small {
  font-size:10px;
  letter-spacing:3px;
  color:var(--amber);
  text-transform:uppercase;
}

.brand h1 {
  margin:3px 0 0;
  font-size:18px;
  font-weight:400;
}

.auth-section {
  display:flex;
  gap:12px;
  align-items:center;
}

.api-input {
  padding:8px 14px;
  border:1px solid var(--amber);
  background:transparent;
  color:var(--ink);
  font-size:12px;
  font-family:'DM Mono', monospace;
  width:280px;
}

.api-input::placeholder {
  color:rgba(26,24,20,.3);
}

.api-input:focus {
  outline:none;
  background:rgba(139,111,78,.08);
}

/* BUTTONS */
.btn {
  border:1px solid var(--amber);
  padding:6px 14px;
  font-size:10px;
  letter-spacing:1.5px;
  text-transform:uppercase;
  cursor:pointer;
  background:transparent;
  color:var(--amber);
  font-family:'Instrument Sans', sans-serif;
  transition:all .2s ease;
}

.btn:hover {
  background:rgba(139,111,78,.08);
}

.btn.active {
  background:var(--amber);
  color:white;
}

.btn.primary {
  background:var(--amber);
  color:white;
  width:100%;
  padding:14px;
}

.btn.primary:hover {
  opacity:.9;
}

.btn:disabled {
  opacity:.4;
  cursor:not-allowed;
}

.status {
  font-size:10px;
  color:var(--sand);
  letter-spacing:1px;
}

/* LAYOUT */
main {
  display:grid;
  grid-template-columns:1fr 1fr;
  height:calc(100vh - 70px);
}

/* EDITOR */
textarea {
  width:100%;
  height:100%;
  border:none;
  outline:none;
  padding:30px;
  font-family:'DM Mono', monospace;
  background:transparent;
  line-height:1.8;
  resize:none;
  font-size:13px;
}

textarea::placeholder {
  opacity:.3;
}

/* PREVIEW */
.preview {
  overflow-y:auto;
  padding:60px 0;
  background:rgba(196,168,130,.05);
}

.article {
  max-width:540px;
  margin:auto;
  padding:0 20px;
}

/* TYPOGRAPHY */
h1.title {
  font-family:'Cormorant Garamond', serif;
  font-style:italic;
  font-weight:300;
  font-size:42px;
  line-height:1.1;
}

.subtitle {
  color:var(--amber);
  font-size:14px;
}

p {
  line-height:1.9;
  font-size:15px;
  font-weight:300;
}

blockquote {
  border-left:2px solid var(--amber);
  padding-left:25px;
  font-style:italic;
  font-size:19px;
  opacity:.9;
}

.concept {
  background:rgba(196,168,130,.15);
  padding:20px;
  border-radius:6px;
  font-family:'DM Mono', monospace;
  font-size:13px;
}

/* FEEDBACK */
.warning {
  margin-bottom:40px;
  padding:15px;
  background:#c0392b08;
  border:1px solid #c0392b40;
  font-size:12px;
}

.error {
  padding:15px;
  background:#e74c3c20;
  border:1px solid #e74c3c;
  color:#c0392b;
  margin-bottom:20px;
  border-radius:2px;
  font-size:12px;
}

.loading {
  opacity:.5;
  text-align:center;
  margin-top:120px;
}

/* MICRO UX */
.fade {
  animation:fade .4s ease;
}

@keyframes fade {
  from { opacity:0; transform:translateY(6px);}
  to { opacity:1; transform:translateY(0);}
}

.spin {
  animation:spin 1.5s linear infinite;
}

@keyframes spin {
  to { transform:rotate(360deg); }
}

@media (max-width:1024px) {
  main {
    grid-template-columns:1fr;
  }
  
  nav {
    flex-direction:column;
    gap:12px;
  }
  
  .auth-section {
    flex-direction:column;
    width:100%;
  }
  
  .api-input {
    width:100%;
  }
}
</style>

</head>

<body>

<nav>
  <div class="brand">
    <small>Self Love Club</small>
    <h1>Protocol Formatter</h1>
  </div>

  <div class="auth-section">
    <input type="password" class="api-input" id="apiKey" placeholder="Anthropic API key...">
    <span class="status" id="authStatus">✗ No autenticado</span>
  </div>

  <div>
    <button class="btn active" id="splitBtn">Split</button>
    <button class="btn" id="previewBtn">Preview</button>
  </div>
</nav>

<main id="layout">

  <!-- EDITOR -->

  <section>
    <textarea id="input" placeholder="Pega el ensayo en bruto aquí..."></textarea>
    <div style="padding:20px;">
      <button class="btn primary" id="runBtn" disabled>Aplicar protocolo</button>
    </div>
  </section>

  <!-- PREVIEW -->

  <section class="preview">
    <div class="article" id="output">
      <div style="opacity:.2;text-align:center;margin-top:120px;">
        ✧<br/>ESPERANDO SEÑAL
      </div>
    </div>
  </section>

</main>

<script>
const forbidden = ["viaje","despertar","magia","mágico","mágica"];

const apiKeyInput = document.getElementById("apiKey");
const authStatus = document.getElementById("authStatus");
const runBtn = document.getElementById("runBtn");
const input = document.getElementById("input");
const output = document.getElementById("output");

// Monitorear API key
apiKeyInput.addEventListener("change", ()=>{
  updateAuthStatus();
});

apiKeyInput.addEventListener("input", ()=>{
  updateAuthStatus();
});

function updateAuthStatus(){
  const key = apiKeyInput.value.trim();
  if(key.length > 20 && key.startsWith("sk-")) {
    authStatus.textContent = "✓ Autenticado";
    authStatus.style.color = "var(--amber)";
    runBtn.disabled = false;
  } else {
    authStatus.textContent = "✗ No autenticado";
    authStatus.style.color = "var(--sand)";
    runBtn.disabled = true;
  }
}

// Main function
runBtn.onclick = async () => {
  const text = input.value.trim();
  const apiKey = apiKeyInput.value.trim();
  
  if(!text) {
    output.innerHTML = '<div class="error">Ingresa texto para procesar</div>';
    return;
  }
  
  if(!apiKey.startsWith("sk-")) {
    output.innerHTML = '<div class="error">API key inválida</div>';
    return;
  }

  output.innerHTML = '<div class="loading"><div class="spin">⚡</div><br/>Procesando con Anthropic...</div>';
  
  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01"
      },
      body: JSON.stringify({
        model: "claude-opus-4-1",
        max_tokens: 2000,
        messages: [
          {
            role: "user",
            content: `Eres un editor de ensayos para "Self Love Club", un proyecto que usa economía, arquitectura de sistemas y termodinámica para explicar decisiones humanas.

Analiza este ensayo y retorna SOLO un JSON válido (sin markdown, sin explicación) con esta estructura:

{
  "title": "Título del ensayo",
  "subtitle": "Subtítulo o descripción breve",
  "wordCount": 1500,
  "forbiddenWords": ["palabra1", "palabra2"],
  "sections": [
    {"type": "paragraph", "content": "..."},
    {"type": "quote", "content": "..."},
    {"type": "concept", "content": "..."}
  ]
}

REGLAS CRÍTICAS:
1. Si encuentras estas palabras, inclúyelas en forbiddenWords: viaje, despertar, magia, mágico, mágica
2. Estructura el contenido en secciones con tipos: "paragraph", "quote", "concept"
3. Las quotes deben ser frases destacadas del texto
4. Los concepts deben ser explicaciones técnicas o variables clave
5. Mantén el tono académico y riguroso
6. Retorna SOLO el JSON, nada más

ENSAYO:
${text}`
          }
        ]
      })
    });

    if(!response.ok) {
      const error = await response.json();
      throw new Error(error.error?.message || "Error en la API de Anthropic");
    }

    const data = await response.json();
    const content = data.content[0].text;
    
    // Parse JSON
    let parsed;
    try {
      parsed = JSON.parse(content);
    } catch(e) {
      // Intenta limpiar markdown si lo hay
      const cleaned = content.replace(/```json\n?|\n?```/g, '').trim();
      parsed = JSON.parse(cleaned);
    }
    
    render(parsed);
    
  } catch(err) {
    output.innerHTML = `<div class="error">⚠ Error: ${err.message}</div>`;
    console.error(err);
  }
};

function render(data){

  let html = "";

  if(data.forbiddenWords && data.forbiddenWords.length){
    html += `
    <div class="warning">
      ⚠ Palabras prohibidas detectadas: <strong>${data.forbiddenWords.join(", ")}</strong>
    </div>`;
  }

  html += `
    <h1 class="title">${data.title || "Sin título"}</h1>
    <div class="subtitle">${data.subtitle || ""}</div>
    <div style="height:1px;background:var(--sand);width:30px;margin:40px 0;"></div>
  `;

  if(data.sections && Array.isArray(data.sections)){
    data.sections.forEach(s=>{
      if(s.type==="quote"){
        html += `<blockquote>${s.content}</blockquote>`;
      } else if(s.type==="concept"){
        html += `<div class="concept">${s.content}</div>`;
      } else {
        html += `<p>${s.content}</p>`;
      }
    });
  }

  html += `
    <div style="margin-top:60px;font-size:10px;color:var(--sand);display:flex;justify-content:space-between;">
      <span>andresramirez.pro</span>
      <span>${data.wordCount || 0} palabras</span>
    </div>
  `;

  output.innerHTML = html;
  output.classList.add("fade");
}

/* VIEW SWITCH */
document.getElementById("previewBtn").onclick = ()=>{
  document.getElementById("layout").style.gridTemplateColumns="0 1fr";
};

document.getElementById("splitBtn").onclick = ()=>{
  document.getElementById("layout").style.gridTemplateColumns="1fr 1fr";
};

// Inicializar
updateAuthStatus();
</script>

</body>
</html>
