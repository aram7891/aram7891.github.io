<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Self Love Club — Protocol Formatter</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,400&family=DM+Mono:wght@300&family=Instrument+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --parchment:#F7F4EF;
  --ink:#1A1814;
  --amber:#8B6F4E;
  --sand:#C4A882;
}

* { box-sizing: border-box; }

body {
  margin:0;
  background:var(--parchment);
  color:var(--ink);
  font-family:'Instrument Sans', sans-serif;
}

/* NAV */
nav {
  display:flex;
  justify-content:space-between;
  padding:18px 28px;
  border-bottom:1px solid rgba(196,168,130,.3);
}

.brand small {
  font-size:10px;
  letter-spacing:3px;
  color:var(--amber);
  text-transform:uppercase;
}

.brand h1 {
  margin:3px 0 0;
  font-size:18px;
  font-weight:400;
}

/* BUTTONS */
.btn {
  border:1px solid var(--amber);
  padding:6px 14px;
  font-size:10px;
  letter-spacing:1.5px;
  text-transform:uppercase;
  cursor:pointer;
  background:transparent;
  color:var(--amber);
}

.btn.active {
  background:var(--amber);
  color:white;
}

.btn.primary {
  background:var(--amber);
  color:white;
  width:100%;
  padding:14px;
}

/* LAYOUT */
main {
  display:grid;
  grid-template-columns:1fr 1fr;
  height:calc(100vh - 70px);
}

/* EDITOR */
textarea {
  width:100%;
  height:100%;
  border:none;
  outline:none;
  padding:30px;
  font-family:'DM Mono', monospace;
  background:transparent;
  line-height:1.8;
}

/* PREVIEW */
.preview {
  overflow-y:auto;
  padding:60px 0;
  background:rgba(196,168,130,.05);
}

.article {
  max-width:540px;
  margin:auto;
  padding:0 20px;
}

/* TYPOGRAPHY */
h1.title {
  font-family:'Cormorant Garamond', serif;
  font-style:italic;
  font-weight:300;
  font-size:42px;
  line-height:1.1;
}

.subtitle {
  color:var(--amber);
  font-size:14px;
}

p {
  line-height:1.9;
  font-size:15px;
  font-weight:300;
}

blockquote {
  border-left:2px solid var(--amber);
  padding-left:25px;
  font-style:italic;
  font-size:19px;
  opacity:.9;
}

.concept {
  background:rgba(196,168,130,.15);
  padding:20px;
  border-radius:6px;
  font-family:'DM Mono', monospace;
  font-size:13px;
}

/* MICRO UX */
textarea::placeholder {
  opacity:.3;
}

.fade {
  animation:fade .4s ease;
}

@keyframes fade {
  from { opacity:0; transform:translateY(6px);}
  to { opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<nav>
  <div class="brand">
    <small>Self Love Club</small>
    <h1>Protocol Formatter</h1>
  </div>
  
  <div>
    <button class="btn active" id="splitBtn">Split</button>
    <button class="btn" id="previewBtn">Preview</button>
  </div>
</nav>

<main id="layout">
  
  <!-- EDITOR -->
  <section>
    <textarea id="input" placeholder="Pega el ensayo en bruto aquí..."></textarea>
    <div style="padding:20px;">
      <button class="btn primary" id="runBtn">Aplicar protocolo</button>
    </div>
  </section>

  <!-- PREVIEW -->
  <section class="preview">
    <div class="article fade" id="output">
      <div style="opacity:.2;text-align:center;margin-top:120px;">
        ✧<br/>ESPERANDO SEÑAL
      </div>
    </div>
  </section>

</main>

<script>
const API_URL = "/api/format-essay";

const forbidden = ["viaje","despertar","magia","mágico","mágica"];

document.getElementById("runBtn").onclick = async () => {
  const text = input.value.trim();
  if(!text) return;

  output.innerHTML = "Procesando...";
  
  const res = await fetch(API_URL,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ text })
  });

  const data = await res.json();

  render(data);
};

function render(data){

  let html = "";

  if(data.forbiddenWords?.length){
    html += `
    <div style="margin-bottom:40px;padding:15px;background:#c0392b08;border:1px solid #c0392b40;">
      ⚠ ${data.forbiddenWords.join(", ")}
    </div>`;
  }

  html += `
    <h1 class="title">${data.title}</h1>
    <div class="subtitle">${data.subtitle}</div>
    <div style="height:1px;background:var(--sand);width:30px;margin:40px 0;"></div>
  `;

  data.sections.forEach(s=>{
    if(s.type==="quote"){
      html += `<blockquote>${s.content}</blockquote>`;
    } else if(s.type==="concept"){
      html += `<div class="concept">${s.content}</div>`;
    } else {
      html += `<p>${s.content}</p>`;
    }
  });

  html += `
    <div style="margin-top:60px;font-size:10px;color:var(--sand);display:flex;justify-content:space-between;">
      <span>andresramirez.pro</span>
      <span>${data.wordCount} palabras</span>
    </div>
  `;

  output.innerHTML = html;
}

/* VIEW SWITCH */
previewBtn.onclick = ()=>{
  layout.style.gridTemplateColumns="0 1fr";
};

splitBtn.onclick = ()=>{
  layout.style.gridTemplateColumns="1fr 1fr";
};
</script>

</body>
</html>
