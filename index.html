<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Andrés Ramírez — Claridad Antes que Conexión</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            paper: '#FAFAFA', 
            ink: '#1A1A1A', 
            subtle: '#71717A', 
            divider: '#E4E4E7', 
            accent: '#A67C52'
          },
          fontFamily: {
            serif: ['"Playfair Display"', 'serif'], 
            sans: ['"Inter"', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/styles/global.css" />

  <script src="/styles/scripts/translations.js" defer></script>
  <script src="/styles/scripts/main.js" defer></script>

  <script>
    // Función general para cargar secciones fijas
    async function loadSection(id, file) {
      try {
        const container = document.getElementById(id);
        const response = await fetch(file);
        if (!response.ok) throw new Error(`Error cargando ${file}`);
        const html = await response.text();
        container.innerHTML = html;

        const scripts = container.querySelectorAll("script");
        scripts.forEach((oldScript) => {
          const newScript = document.createElement("script");
          Array.from(oldScript.attributes).forEach(attr =>
            newScript.setAttribute(attr.name, attr.value)
          );
          newScript.appendChild(document.createTextNode(oldScript.innerHTML));
          oldScript.parentNode.replaceChild(newScript, oldScript);
        });

      } catch (error) {
        console.error("Error en la sección:", id, error);
      }
    }

    // NUEVA FUNCIÓN: Toggler para Ensayos (ES/EN)
    async function loadEssays(lang) {
      const file = lang === 'es' ? '/sections/ensayos-es.html' : '/sections/essays-en.html';
      try {
        const container = document.getElementById("essays");
        const response = await fetch(file);
        if (!response.ok) throw new Error(`Error cargando ${file}`);
        const html = await response.text();
        container.innerHTML = html;
        
        // Opcional: Actualizar clases de botones de idioma si los tienes en el index
        document.querySelectorAll('.essay-lang-btn').forEach(btn => btn.classList.remove('font-bold', 'border-b-2'));
        const activeBtn = document.querySelector(`.essay-lang-btn[onclick*="${lang}"]`);
        if(activeBtn) activeBtn.classList.add('font-bold', 'border-b-2', 'border-ink');

      } catch (error) {
        console.error("Error cargando ensayos:", lang, error);
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      loadSection("navbar", "/sections/navbar.html");
      loadSection("home", "/sections/hero.html");
      loadSection("about", "/sections/about.html");
      loadSection("lab", "/sections/lab.html");
      
      // Carga inicial de ensayos en español
      loadEssays('es'); 

      loadSection("books", "/sections/books.html");
      loadSection("selflove", "/sections/selflove.html");
      loadSection("footer", "/sections/footer.html");
    });
  </script>
</head>

<body class="bg-paper text-ink font-sans antialiased selection:bg-accent selection:text-paper">

  <div id="navbar"></div>
  <div id="home"></div> 
  <div id="about"></div>
  <div id="lab"></div>

  <section class="max-w-7xl mx-auto px-6 py-20">
    <div class="flex justify-center space-x-8 mb-12 border-b border-divider pb-4">
      <button onclick="loadEssays('es')" class="essay-lang-btn text-[10px] tracking-[0.2em] uppercase transition hover:opacity-50">Español</button>
      <button onclick="loadEssays('en')" class="essay-lang-btn text-[10px] tracking-[0.2em] uppercase transition hover:opacity-50">English</button>
    </div>
    <div id="essays"></div>
  </section>

  <div id="books"></div>
  <div id="selflove"></div>
  <div id="footer"></div>

</body>
</html>
