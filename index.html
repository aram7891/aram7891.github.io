<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Andrés Ramírez — Claridad Antes que Conexión</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            paper: '#FAFAFA', 
            ink: '#1A1A1A', 
            subtle: '#71717A', 
            divider: '#E4E4E7', 
            accent: '#A67C52'
          },
          fontFamily: {
            serif: ['"Playfair Display"', 'serif'], 
            sans: ['"Inter"', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/styles/global.css" />

  <script src="/styles/scripts/translations.js" defer></script>
  <script src="/styles/scripts/main.js" defer></script>

  <script>
    async function loadSection(id, file) {
      try {
        const container = document.getElementById(id);
        const response = await fetch(file);
        if (!response.ok) throw new Error(`Error cargando ${file}`);
        const html = await response.text();
        container.innerHTML = html;

        // Reactivar scripts internos de cada sección
        const scripts = container.querySelectorAll("script");
        scripts.forEach((oldScript) => {
          const newScript = document.createElement("script");

          // Copiar atributos (src, type, etc.)
          Array.from(oldScript.attributes).forEach(attr =>
            newScript.setAttribute(attr.name, attr.value)
          );

          // Copiar contenido interno
          newScript.appendChild(document.createTextNode(oldScript.innerHTML));

          // Reemplazar para forzar ejecución
          oldScript.parentNode.replaceChild(newScript, oldScript);
        });

      } catch (error) {
        console.error("Error en la sección:", id, error);
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      loadSection("navbar", "/sections/navbar.html");
      loadSection("hero", "/sections/hero.html");
      loadSection("about", "/sections/about.html");
      loadSection("lab", "/sections/lab.html");
      loadSection("essays", "/sections/essays.html");
      loadSection("books", "/sections/books.html");
      loadSection("selflove", "/sections/selflove.html");
      loadSection("footer", "/sections/footer.html");
    });
  </script>
</head>

<body class="bg-paper text-ink font-sans antialiased selection:bg-accent selection:text-paper">

  <div id="navbar"></div>
  <div id="home"></div> <div id="about"></div>
  <div id="lab"></div>
  <div id="essays"></div>
  <div id="books"></div>
  <div id="selflove"></div>
  <div id="footer"></div>

</body>

</html>
