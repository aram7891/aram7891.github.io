<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Andrés Ramírez — Claridad Antes que Conexión</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="/styles.css" />

  <!-- Script de carga modular -->
  <script>
    async function loadSection(id, file) {
      const container = document.getElementById(id);
      const response = await fetch(file);
      const html = await response.text();
      container.innerHTML = html;
    }

    document.addEventListener("DOMContentLoaded", () => {
      loadSection("navbar", "/sections/navbar.html");
      loadSection("hero", "/sections/hero.html");
      loadSection("about", "/sections/about.html");
      loadSection("lab", "/sections/lab.html");
      loadSection("essays", "/sections/essays.html");
      loadSection("books", "/sections/books.html");
      loadSection("selflove", "/sections/selflove.html");
      loadSection("footer", "/sections/footer.html");
    });
  </script>
</head>

<body class="bg-paper text-ink">

  <!-- Contenedores vacíos donde se insertan las secciones -->
  <div id="navbar"></div>
  <div id="hero"></div>
  <div id="about"></div>
  <div id="lab"></div>
  <div id="essays"></div>
  <div id="books"></div>
  <div id="selflove"></div>
  <div id="footer"></div>

</body>
</html>
