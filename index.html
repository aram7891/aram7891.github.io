<script>
async function ejecutarAuditoria(tipo) {
    console.log("Iniciando auditoría técnica de:", tipo);

    const esClarity = tipo === 'discern';
    const inputId = esClarity ? 'situationInput' : 'patternInput';
    const resultId = esClarity ? 'clarityResult' : 'noteResult';
    const contentId = esClarity ? 'clarityContent' : 'noteContent';
    const spinnerId = esClarity ? 'analyzeSpinner' : 'noteSpinner';
    const btnTextId = esClarity ? 'analyzeBtnText' : 'noteBtnText';

    const textoUsuario = document.getElementById(inputId).value.trim();

    if (textoUsuario.length < 20) {
        alert("Necesito un poco más de contexto para procesar la auditoría.");
        return;
    }

    const spinner = document.getElementById(spinnerId);
    const btnText = document.getElementById(btnTextId);
    const resultBox = document.getElementById(resultId);
    const contentArea = document.getElementById(contentId);

    spinner.classList.remove('hidden');
    btnText.style.opacity = "0.3";

    try {
        const response = await fetch('/api/index', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                text: textoUsuario,
                type: tipo
            })
        });

        const data = await response.json();

        if (data.output) {
            contentArea.innerHTML = data.output.replace(/\n/g, '<br>');
            resultBox.classList.remove('hidden');
            resultBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        } else {
            throw new Error("Respuesta vacía");
        }

    } catch (error) {
        console.error("Fallo en el Laboratorio:", error);
        contentArea.innerText = "No se pudo procesar la solicitud. Intenta nuevamente.";
        resultBox.classList.remove('hidden');
    } finally {
        spinner.classList.add('hidden');
        btnText.style.opacity = "1";
    }
}

function analyzeClarity() { ejecutarAuditoria('discern'); }
function generateFieldNote() { ejecutarAuditoria('audit'); }
</script>
