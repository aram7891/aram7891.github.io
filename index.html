  <script>
    // Función original blindada: si Vercel falla al cargar una sección, la página no colapsa
    async function loadSection(id, file) {
      const el = document.getElementById(id);
      if (!el) return;
      try {
        const response = await fetch(file);
        if (!response.ok) throw new Error("HTTP " + response.status);
        const html = await response.text();
        el.innerHTML = html;
      } catch (error) {
        console.error("Error al cargar la sección " + id + ":", error);
      }
    }

    // La función reparada para que los botones de Ensayos funcionen en producción
    async function loadEssays(lang) {
      const el = document.getElementById("essays");
      if (!el) return;
      
      const file = `sections/essays-${lang}.html`; 
      try {
        const response = await fetch(file);
        if (!response.ok) throw new Error("HTTP " + response.status);
        const html = await response.text();
        el.innerHTML = html;
      } catch (error) {
        console.error("Error cargando el idioma " + lang + ":", error);
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      loadSection("navbar", "sections/navbar.html");
      loadSection("home", "sections/home.html");
      loadSection("about", "sections/about.html");
      loadSection("lab", "sections/lab.html");
      loadSection("books", "sections/books.html");
      loadSection("selflove", "sections/selflove.html");
      loadSection("field-notes", "sections/field-notes.html");
      
      // Inicia con español por defecto
      loadEssays('es');
    });
  </script>
