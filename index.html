<head>

  <!-- FAVICON -->

  <title>Andrés Ramírez</title>

  <link rel="stylesheet" href="styles/essays.css" />
  <link rel="stylesheet" href="styles/lab.css" />

  <!-- CARGA DE SECCIONES -->
  <script>
    async function loadSection(id, file) {
      const el = document.getElementById(id);
      if (!el) return;
      const html = await fetch(file).then(r => r.text());
      el.innerHTML = html;
    }

    document.addEventListener("DOMContentLoaded", () => {
      loadSection("navbar", "sections/navbar.html");
      loadSection("home", "sections/home.html");
      loadSection("about", "sections/about.html");
      loadSection("lab", "sections/lab.html");
      loadSection("books", "sections/books.html");
      loadSection("selflove", "sections/selflove.html");
      loadSection("field-notes", "sections/field-notes.html");
      loadSection("footer", "sections/footer.html");
    });
  </script>
</head>

<body class="bg-paper text-ink font-sans antialiased selection:bg-accent selection:text-paper">
