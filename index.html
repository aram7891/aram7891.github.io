<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Andrés Ramírez — Claridad Antes que Conexión</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            paper: '#FAFAFA',
            ink: '#1A1A1A',
            subtle: '#71717A',
            divider: '#E4E4E7',
            accent: '#A67C52'
          },
          fontFamily: {
            serif: ['"Playfair Display"', 'serif'],
            sans: ['"Inter"', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/styles/global.css" />

  <script src="/styles/scripts/translations.js" defer></script>
  <script src="/styles/scripts/main.js" defer></script>

  <script>
    async function loadSection(id, file) {
      try {
        const container = document.getElementById(id);
        const response = await fetch(file);
        if (!response.ok) throw new Error(`Error cargando ${file}`);
        const html = await response.text();
        container.innerHTML = html;

        const scripts = container.querySelectorAll("script");
        scripts.forEach((oldScript) => {
          const newScript = document.createElement("script");
          Array.from(oldScript.attributes).forEach(attr =>
            newScript.setAttribute(attr.name, attr.value)
          );
          newScript.appendChild(document.createTextNode(oldScript.innerHTML));
          oldScript.parentNode.replaceChild(newScript, oldScript);
        });

      } catch (error) {
        console.error("Error en la sección:", id, error);
      }
    }

    async function loadEssays(lang) {
      const file = lang === 'es' ? '/sections/ensayos-es.html' : '/sections/essays-en.html';
      try {
        const container = document.getElementById("essays");
        const response = await fetch(file);
        if (!response.ok) throw new Error(`Error cargando ${file}`);
        const html = await response.text();
        container.innerHTML = html;

        document.querySelectorAll('.essay-lang-btn').forEach(btn => btn.classList.remove('font-bold', 'border-b-2'));
        const activeBtn = document.querySelector(`.essay-lang-btn[onclick*="${lang}"]`);
        if (activeBtn) activeBtn.classList.add('font-bold', 'border-b-2', 'border-ink');

      } catch (error) {
        console.error("Error cargando ensayos:", lang, error);
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      loadSection("navbar", "/sections/navbar.html");
      loadSection("home", "/sections/hero.html");
      loadSection("about", "/sections/about.html");

      // ✔ LABORATORIO AHORA VA AQUÍ
      loadSection("lab", "/sections/lab.html");

      loadEssays('es');

      loadSection("books", "/sections/books.html");
      loadSection("selflove", "/sections/selflove.html");

      // Field Notes antes del footer
      loadSection("field-notes", "/sections/field.html");

      loadSection("footer", "/sections/footer.html");
    });
  </script>
</head>

<body class="bg-paper text-ink font-sans antialiased selection:bg-accent selection:text-paper">

  <div id="navbar"></div>
  <div id="home"></div>
  <div id="about"></div>

  <!-- ✔ LABORATORIO DESPUÉS DEL AUTOR -->
  <div id="lab"></div>

  <section class="max-w-7xl mx-auto px-6 py-20">
    <div class="flex justify-center space-x-8 mb-12 border-b border-divider pb-4">
      <button onclick="loadEssays('es')" class="essay-lang-btn text-[10px] tracking-[0.2em] uppercase transition hover:opacity-50">Español</button>
      <button onclick="loadEssays('en')" class="essay-lang-btn text-[10px] tracking-[0.2em] uppercase transition hover:opacity-50">English</button>
    </div>
    <div id="essays"></div>
  </section>

  <div id="books"></div>
  <div id="selflove"></div>

  <!-- FIELD NOTES ANTES DEL FOOTER -->
  <div id="field-notes"></div>

  <div id="footer"></div>

<script>
async function ejecutarAuditoria(tipo) {
    console.log("Iniciando auditoría técnica de:", tipo);

    const esClarity = tipo === 'discern';
    const inputId = esClarity ? 'situationInput' : 'patternInput';
    const resultId = esClarity ? 'clarityResult' : 'noteResult';
    const contentId = esClarity ? 'clarityContent' : 'noteContent';
    const spinnerId = esClarity ? 'analyzeSpinner' : 'noteSpinner';
    const btnTextId = esClarity ? 'analyzeBtnText' : 'noteBtnText';

    const textoUsuario = document.getElementById(inputId).value.trim();

    if (textoUsuario.length < 20) {
        alert("Andrés, necesito un poco más de contexto para procesar la auditoría.");
        return;
    }

    const spinner = document.getElementById(spinnerId);
    const btnText = document.getElementById(btnTextId);
    const resultBox = document.getElementById(resultId);
    const contentArea = document.getElementById(contentId);

    spinner.classList.remove('hidden');
    btnText.style.opacity = "0.3";

    try {
        const response = await fetch('/api', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                text: textoUsuario,
                type: tipo
            })
        });

        const data = await response.json();

        if (data.output) {
            contentArea.innerHTML = data.output.replace(/\n/g, '<br>');
            resultBox.classList.remove('hidden');
            resultBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        } else {
            throw new Error("Respuesta vacía");
        }

    } catch (error) {
        console.error("Fallo en el Laboratorio:", error);
        contentArea.innerText = "Error de conexión con el motor de IA. Reintenta en un momento.";
        resultBox.classList.remove('hidden');
    } finally {
        spinner.classList.add('hidden');
        btnText.style.opacity = "1";
    }
}

function analyzeClarity() { ejecutarAuditoria('discern'); }
function generateFieldNote() { ejecutarAuditoria('audit'); }
</script>

</body>
</html>
