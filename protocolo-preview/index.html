<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Clarity Protocol — Self Love Club</title>
<meta name="description" content="A closed system of 10 modules applying economics, human behavior, and applied systems thinking to decision design. Andrés Ramírez." />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Instrument+Sans:wght@400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

<script src="https://assets.gumroad.com/js/gumroad.js"></script>

<style>
  :root {
    --parchment: #F7F4EF;
    --ink:       #1A1814;
    --amber:     #8B6F4E;
    --sand:      #C4A882;
    --rule:      rgba(26,24,20,0.14);
    --rule-strong: rgba(26,24,20,0.28);
    --font-display: "Cormorant Garamond", "Times New Roman", serif;
    --font-body:    "Instrument Sans", -apple-system, sans-serif;
    --font-mono:    "DM Mono", "Courier New", monospace;
    --max:    1180px;
    --gutter: 6vw;
  }

  *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
  body {
    background: var(--parchment);
    color: var(--ink);
    font-family: var(--font-body);
    font-weight: 300;
    font-size: 17px;
    line-height: 1.65;
    letter-spacing: 0.005em;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  ::selection { background: var(--ink); color: var(--parchment); }
  a { color: inherit; text-decoration: none; }

  /* I18N TOGGLE */
  [data-lang] { display: none; }
  [data-lang].active { display: inline; }

  .container { max-width: var(--max); margin: 0 auto; padding: 0 var(--gutter); }
  .meta {
    font-family: var(--font-mono);
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink);
    opacity: 0.6;
  }
  .section { padding: 12vh 0; border-top: 1px solid var(--rule); }
  .section:first-of-type { border-top: 0; }

  /* NAV */
  .nav {
    position: sticky; top: 0; z-index: 50;
    background: rgba(247,244,239,0.92);
    border-bottom: 1px solid var(--rule);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }
  .nav-inner {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px var(--gutter); max-width: var(--max); margin: 0 auto; gap: 16px;
  }
  .nav-brand {
    font-family: var(--font-mono);
    font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
  }
  .nav-brand em {
    font-family: var(--font-display);
    font-style: italic; text-transform: none; letter-spacing: 0;
    font-size: 14px; color: var(--amber);
  }
  .nav-right { display: flex; align-items: center; gap: 18px; }

  .lang-btns { display: flex; border: 1px solid var(--rule-strong); }
  .lang-btn {
    background: none; border: 0; cursor: pointer;
    font-family: var(--font-mono);
    font-size: 10px; letter-spacing: 0.18em;
    padding: 7px 11px; color: var(--ink); opacity: 0.5;
    transition: all .25s;
  }
  .lang-btn + .lang-btn { border-left: 1px solid var(--rule-strong); }
  .lang-btn.active { background: var(--ink); color: var(--parchment); opacity: 1; }
  .lang-btn:hover:not(.active) { opacity: 1; }

  .nav-cta {
    font-family: var(--font-mono);
    font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
    padding: 9px 18px; border: 1px solid var(--ink);
    transition: all .25s ease;
  }
  .nav-cta:hover { background: var(--ink); color: var(--parchment); }

  @media (max-width: 540px) {
    .nav-brand { font-size: 9px; letter-spacing: 0.18em; }
    .nav-brand em { font-size: 12px; }
    .nav-cta { padding: 8px 12px; font-size: 10px; }
    .lang-btn { padding: 7px 9px; }
    .nav-right { gap: 10px; }
  }

  /* HERO */
  .hero {
    padding: 14vh var(--gutter);
    position: relative; border-top: 0;
    max-width: var(--max); margin: 0 auto;
  }
  .hero-meta {
    display: flex; justify-content: space-between;
    margin-bottom: 8vh; padding-bottom: 14px;
    border-bottom: 1px solid var(--rule);
  }
  .hero-num {
    font-family: var(--font-display); font-style: italic;
    font-size: clamp(120px, 22vw, 280px);
    line-height: 0.85;
    color: var(--sand); opacity: 0.55;
    letter-spacing: -0.04em;
    position: absolute; right: var(--gutter); top: 18vh;
    pointer-events: none; user-select: none; z-index: 0;
  }
  .hero-content { position: relative; z-index: 1; }
  .hero h1 {
    font-family: var(--font-display); font-weight: 400;
    font-size: clamp(44px, 7.5vw, 96px);
    line-height: 1.02; letter-spacing: -0.025em;
    margin: 4vh 0 5vh; max-width: 14ch;
  }
  .hero h1 em { font-style: italic; color: var(--amber); }
  .hero-sub {
    font-size: clamp(17px, 1.6vw, 21px);
    line-height: 1.55; max-width: 52ch;
    margin-bottom: 6vh; color: var(--ink); opacity: 0.82;
  }
  .hero-actions { display: flex; align-items: center; gap: 28px; flex-wrap: wrap; }
  .btn-primary {
    display: inline-block;
    background: var(--ink); color: var(--parchment);
    font-family: var(--font-mono);
    font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase;
    padding: 18px 36px;
    transition: all .3s ease;
    border: 1px solid var(--ink); cursor: pointer;
  }
  .btn-primary:hover { background: transparent; color: var(--ink); }
  .price-tag {
    font-family: var(--font-mono);
    font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
    opacity: 0.55;
  }

  /* SECTION HEADERS */
  .sec-label { display: flex; align-items: baseline; gap: 18px; margin-bottom: 6vh; }
  .sec-label .num {
    font-family: var(--font-mono);
    font-size: 11px; letter-spacing: 0.22em; color: var(--amber);
  }
  .sec-label .name {
    font-family: var(--font-mono);
    font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
    opacity: 0.7;
  }
  .sec-h {
    font-family: var(--font-display); font-weight: 400;
    font-size: clamp(34px, 4.6vw, 58px);
    line-height: 1.08; letter-spacing: -0.02em;
    max-width: 22ch; margin-bottom: 5vh;
  }
  .sec-h em { font-style: italic; color: var(--amber); }
  .sec-body { font-size: 17px; line-height: 1.7; max-width: 58ch; opacity: 0.85; }
  .sec-body p + p { margin-top: 1.4em; }

  /* PROBLEM */
  .problem-grid { display: grid; grid-template-columns: 1fr 1.4fr; gap: 8vw; align-items: start; }
  @media (max-width: 800px) { .problem-grid { grid-template-columns: 1fr; gap: 4vh; } }
  .problem-statements { display: flex; flex-direction: column; gap: 4vh; }
  .problem-item { padding-left: 22px; border-left: 1px solid var(--rule-strong); }
  .problem-item p {
    font-family: var(--font-display);
    font-style: italic; font-weight: 400;
    font-size: clamp(20px, 2vw, 26px);
    line-height: 1.35;
  }
  .problem-item .meta { display: block; margin-bottom: 8px; }

  /* SHIFT */
  .shift { padding: 18vh 0; }
  .shift .sec-label { margin-bottom: 8vh; }
  .shift-statement {
    font-family: var(--font-display); font-weight: 400; font-style: italic;
    font-size: clamp(38px, 6.2vw, 86px);
    line-height: 1.05; letter-spacing: -0.02em;
    max-width: 18ch;
  }
  .shift-statement .accent { color: var(--amber); font-style: italic; }
  .shift-tail { margin-top: 6vh; max-width: 52ch; font-size: 17px; line-height: 1.65; opacity: 0.78; }

  /* SYSTEM */
  .system-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8vw; align-items: start; }
  @media (max-width: 800px) { .system-grid { grid-template-columns: 1fr; gap: 5vh; } }
  .system-defs { border-top: 1px solid var(--rule); }
  .system-def {
    padding: 24px 0; border-bottom: 1px solid var(--rule);
    display: grid; grid-template-columns: 80px 1fr; gap: 18px; align-items: baseline;
  }
  .system-def .key {
    font-family: var(--font-mono);
    font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--amber);
  }
  .system-def .val {
    font-family: var(--font-display); font-style: italic;
    font-size: 22px; line-height: 1.3;
  }
  .system-def .note {
    font-family: var(--font-body);
    font-size: 14px; opacity: 0.7; margin-top: 6px; line-height: 1.5;
  }

  /* MODULES */
  .modules { border-top: 1px solid var(--ink); }
  .module {
    display: grid; grid-template-columns: 80px 1fr auto;
    gap: 24px; padding: 24px 0;
    border-bottom: 1px solid var(--rule);
    align-items: baseline; transition: padding .3s ease;
  }
  .module:hover { padding-left: 12px; }
  .module .num {
    font-family: var(--font-mono); font-weight: 300;
    font-size: 14px; letter-spacing: 0.05em; color: var(--amber);
  }
  .module .title {
    font-family: var(--font-display); font-weight: 400; font-style: italic;
    font-size: clamp(20px, 2vw, 26px); line-height: 1.25;
  }
  .module .desc { font-size: 14px; opacity: 0.65; margin-top: 4px; line-height: 1.5; font-style: normal; }
  .module .tag {
    font-family: var(--font-mono);
    font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
    opacity: 0.4;
  }
  @media (max-width: 600px) {
    .module { grid-template-columns: 50px 1fr; }
    .module .tag { display: none; }
  }

  .deliverables {
    margin-top: 10vh;
    display: grid; grid-template-columns: repeat(3, 1fr);
    border-top: 1px solid var(--ink); border-bottom: 1px solid var(--ink);
  }
  @media (max-width: 700px) { .deliverables { grid-template-columns: 1fr; } }
  .deliverable { padding: 32px 28px; border-right: 1px solid var(--rule); }
  .deliverable:last-child { border-right: 0; }
  @media (max-width: 700px) {
    .deliverable { border-right: 0; border-bottom: 1px solid var(--rule); }
    .deliverable:last-child { border-bottom: 0; }
  }
  .deliverable .num {
    font-family: var(--font-mono);
    font-size: 11px; letter-spacing: 0.2em; color: var(--amber);
    display: block; margin-bottom: 14px;
  }
  .deliverable .name {
    font-family: var(--font-display); font-style: italic;
    font-size: 22px; line-height: 1.25; margin-bottom: 10px;
  }
  .deliverable .detail { font-size: 13px; line-height: 1.55; opacity: 0.7; }

  /* AUTHOR */
  .author { background: #ECE6DC; padding: 14vh 0; }
  .author-grid {
    display: grid; grid-template-columns: 1.1fr 1fr;
    gap: 6vw; align-items: end;
    max-width: var(--max); margin: 0 auto;
    padding: 0 var(--gutter);
  }
  @media (max-width: 800px) { .author-grid { grid-template-columns: 1fr; } }
  .author-image { position: relative; }
  .author-image img { display: block; width: 100%; height: auto; }
  .author-image .img-meta {
    position: absolute; bottom: 24px; left: 24px;
    background: var(--parchment); padding: 10px 14px;
    font-family: var(--font-mono);
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
  }
  .author-text { padding-bottom: 4vh; }
  .author-text .sec-label { margin-bottom: 4vh; }
  .author-text h3 {
    font-family: var(--font-display); font-weight: 400;
    font-size: clamp(34px, 4vw, 52px);
    line-height: 1.08; margin-bottom: 4vh; letter-spacing: -0.02em;
  }
  .author-text h3 em { font-style: italic; color: var(--amber); }
  .author-text p { font-size: 16px; line-height: 1.7; opacity: 0.82; max-width: 42ch; }
  .author-text p + p { margin-top: 1.2em; }
  .author-tags { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 4vh; }
  .author-tag {
    font-family: var(--font-mono);
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
    padding: 6px 12px; border: 1px solid var(--rule-strong);
  }

  /* TRANSFORMATION */
  .transformation { padding: 14vh 0; }
  .trans-list { margin-top: 4vh; }
  .trans-item {
    display: grid; grid-template-columns: 60px 1fr;
    gap: 28px; padding: 32px 0;
    border-top: 1px solid var(--rule); align-items: baseline;
  }
  .trans-item:last-child { border-bottom: 1px solid var(--rule); }
  .trans-item .num {
    font-family: var(--font-mono);
    font-size: 11px; letter-spacing: 0.2em; color: var(--amber);
  }
  .trans-item p {
    font-family: var(--font-display); font-style: italic; font-weight: 400;
    font-size: clamp(20px, 2.2vw, 28px);
    line-height: 1.35; max-width: 32ch;
  }

  /* FINAL CTA */
  .final { background: var(--ink); color: var(--parchment); padding: 18vh 0; }
  .final .meta { color: var(--sand); opacity: 1; }
  .final h2 {
    font-family: var(--font-display); font-style: italic; font-weight: 400;
    font-size: clamp(40px, 6vw, 80px);
    line-height: 1.05; letter-spacing: -0.02em;
    margin: 5vh 0 6vh; max-width: 16ch;
  }
  .final h2 em { color: var(--sand); font-style: italic; }
  .final-meta {
    display: grid; grid-template-columns: repeat(3, 1fr);
    margin-bottom: 8vh;
    border-top: 1px solid rgba(247,244,239,0.18);
    border-bottom: 1px solid rgba(247,244,239,0.18);
  }
  @media (max-width: 700px) { .final-meta { grid-template-columns: 1fr; } }
  .final-meta div {
    padding: 24px 20px 24px 0;
    border-right: 1px solid rgba(247,244,239,0.14);
  }
  .final-meta div:last-child { border-right: 0; }
  @media (max-width: 700px) {
    .final-meta div { border-right: 0; border-bottom: 1px solid rgba(247,244,239,0.14); padding: 20px 0; }
    .final-meta div:last-child { border-bottom: 0; }
  }
  .final-meta .k {
    font-family: var(--font-mono);
    font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--sand); margin-bottom: 8px;
  }
  .final-meta .v { font-family: var(--font-display); font-style: italic; font-size: 24px; }
  .final .btn-primary {
    background: var(--parchment); color: var(--ink); border-color: var(--parchment);
  }
  .final .btn-primary:hover { background: transparent; color: var(--parchment); }

  /* FOOTER */
  footer { padding: 40px var(--gutter); border-top: 1px solid var(--rule); background: var(--parchment); }
  .footer-inner {
    max-width: var(--max); margin: 0 auto;
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 20px;
  }
  .footer-inner .meta { opacity: 0.5; }
  .footer-links { display: flex; gap: 22px; }
  .footer-links a {
    font-family: var(--font-mono);
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
    opacity: 0.55; transition: opacity .25s, color .25s;
  }
  .footer-links a:hover { opacity: 1; color: var(--amber); }

  /* REVEAL */
  .reveal {
    opacity: 0; transform: translateY(18px);
    transition: opacity 1.1s cubic-bezier(0.2, 0.7, 0.2, 1), transform 1.1s cubic-bezier(0.2, 0.7, 0.2, 1);
  }
  .reveal.in { opacity: 1; transform: translateY(0); }
  @media (prefers-reduced-motion: reduce) {
    .reveal { opacity: 1; transform: none; transition: none; }
    html { scroll-behavior: auto; }
  }

  /* PRINT */
  @page { margin: 20mm; }
  @media print {
    .nav, footer { display: none !important; }
    .reveal { opacity: 1; transform: none; }
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>

</head>
