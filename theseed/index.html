<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>La Semilla · Self Love Club</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400;1,500&family=Instrument+Sans:wght@300;400&family=DM+Mono:wght@300&display=swap" rel="stylesheet">
<style>
  :root{
    --parchment:#F7F4EF;
    --ink:#1A1814;
    --amber:#8B6F4E;
    --sand:#C4A882;
    --paper:#FCFAF6;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:var(--parchment);
    color:var(--ink);
    font-family:'Instrument Sans',sans-serif;
    font-weight:300;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    height:100dvh;
  }

  .topbar{
    flex:0 0 auto;
    display:flex;justify-content:flex-end;align-items:center;
    padding:14px 20px 6px;
  }
  .lang{
    font-family:'DM Mono',monospace;font-weight:300;font-size:12px;
    letter-spacing:.12em;text-transform:uppercase;display:flex;gap:14px;
  }
  .lang button{background:none;border:none;cursor:pointer;font:inherit;color:var(--sand);padding:4px 0;position:relative}
  .lang button.active{color:var(--ink)}
  .lang button.active::after{content:"";position:absolute;left:0;right:0;bottom:-2px;height:1px;background:var(--amber)}

  .stage{
    flex:1 1 auto;display:flex;align-items:center;justify-content:center;
    padding:0 16px;position:relative;
  }
  .book{width:100%;max-width:560px;height:100%;max-height:880px;position:relative}

  .page{
    position:absolute;inset:0;
    display:flex;flex-direction:column;
    opacity:0;pointer-events:none;
    transition:opacity .5s ease, transform .55s cubic-bezier(.4,0,.2,1);
    transform:translateX(26px);
  }
  .page.active{opacity:1;pointer-events:auto;transform:translateX(0)}
  .page.leaving{opacity:0;transform:translateX(-26px)}

  .frame{flex:1 1 auto;display:flex;flex-direction:column;padding:4% 7% 3%;min-height:0}

  /* ---- parchment-framed illustration ---- */
  .illo{
    flex:1 1 56%;min-height:0;position:relative;
    display:flex;align-items:center;justify-content:center;
    padding:14px;
  }
  .illo::before{
    /* the parchment leaf behind the image */
    content:"";position:absolute;inset:0;
    background:var(--paper);
    border-radius:255px 12px 225px 15px / 15px 225px 12px 255px;
    box-shadow:
      0 1px 0 rgba(196,168,130,.4),
      inset 0 0 22px rgba(196,168,130,.18),
      0 6px 18px rgba(26,24,20,.06);
    transform:rotate(-.4deg);
  }
  .illo img{
    position:relative;z-index:1;
    max-width:100%;max-height:100%;
    object-fit:contain;
    border-radius:200px 8px 180px 10px / 10px 180px 8px 200px;
    mix-blend-mode:multiply;
  }

  .text{
    flex:0 0 auto;
    font-size:clamp(14px,3.8vw,18px);
    line-height:1.8;font-weight:300;
    padding:4% 2% 0;
  }
  .text p{margin:0 0 .6em}
  .text em{font-style:italic;color:var(--amber)}
  .text .lead::first-letter{
    font-family:'Cormorant Garamond',serif;font-style:italic;
    font-size:2.5em;line-height:.8;float:left;margin:.05em .12em 0 0;color:var(--amber);
  }

  .pageno{
    flex:0 0 auto;
    font-family:'Cormorant Garamond',serif;font-style:italic;
    font-size:28px;color:var(--sand);text-align:center;padding:1% 0 2%;
  }

  /* cover */
  .page.cover .frame{justify-content:center}
  .cover .illo{flex:1 1 64%}
  .cover-kicker{
    font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.22em;
    text-transform:uppercase;color:var(--sand);text-align:center;margin:4% 0 12px;
  }
  .cover-title{
    font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:500;
    font-size:clamp(32px,9vw,48px);line-height:1.05;text-align:center;
  }
  .cover-sub{
    font-size:13px;line-height:1.7;text-align:center;color:var(--amber);
    margin:12px auto 0;max-width:26ch;
  }

  /* colophon / back cover */
  .page.colophon .frame{justify-content:center}
  .colophon .illo{flex:1 1 50%}
  .colophon .secret{
    font-family:'Cormorant Garamond',serif;font-style:italic;
    font-size:clamp(22px,6vw,30px);text-align:center;color:var(--amber);
    margin:5% 0 3%;
  }
  .colophon .mark{
    font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.22em;
    text-transform:uppercase;color:var(--sand);text-align:center;margin-bottom:6px;
  }
  .colophon .cnote{font-size:13px;line-height:1.7;text-align:center;color:var(--amber);max-width:30ch;margin:0 auto}

  .nav{
    flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;
    padding:8px 24px 16px;gap:16px;
  }
  .nav button{
    background:none;border:none;cursor:pointer;
    font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--ink);padding:8px 4px;
    display:flex;align-items:center;gap:8px;
  }
  .nav button:disabled{color:var(--sand);opacity:.4;cursor:default}
  .nav .arrow{font-size:18px;line-height:1}
  .progress{flex:1 1 auto;display:flex;gap:5px;align-items:center;justify-content:center}
  .dot{width:5px;height:5px;border-radius:50%;background:var(--sand);opacity:.4;transition:all .3s}
  .dot.on{background:var(--amber);opacity:1;transform:scale(1.4)}

  .tapzone{position:absolute;top:0;bottom:0;width:34%;z-index:5;cursor:pointer}
  .tapzone.left{left:0}
  .tapzone.right{right:0}

  @media (prefers-reduced-motion: reduce){
    .page{transition:opacity .2s linear}
    .page.active,.page.leaving{transform:none}
  }
</style>
</head>
<body>

  <div class="topbar">
    <div class="lang">
      <button id="es" class="active" onclick="setLang('es')">Español</button>
      <button id="en" onclick="setLang('en')">English</button>
    </div>
  </div>

  <div class="stage">
    <div class="book" id="book">
      <div class="tapzone left" onclick="prev()"></div>
      <div class="tapzone right" onclick="next()"></div>
    </div>
  </div>

  <div class="nav">
    <button id="prevBtn" onclick="prev()"><span class="arrow">‹</span><span data-es="Anterior" data-en="Back">Anterior</span></button>
    <div class="progress" id="progress"></div>
    <button id="nextBtn" onclick="next()"><span data-es="Siguiente" data-en="Next">Siguiente</span><span class="arrow">›</span></button>
  </div>

<script>
const IMG = "assets/theseed/"; // <-- ajusta esta ruta a donde subas las imagenes

const SCENES = [
  { type:"cover", img:"portada.png",
    kicker_es:"Self Love Club", kicker_en:"Self Love Club",
    title_es:"La Semilla", title_en:"The Seed",
    sub_es:"Una historia sobre el valor de elegir bien, desde adentro.",
    sub_en:"A story about the courage to choose well, from within." },

  { img:"p1.png",
    es:["Debajo de la tierra, una semilla esperaba.","No quería ser la más grande.","No quería crecer rápido.","Solo quería crecer bien, desde adentro.","Y eso le pedía algo: decidir."],
    en:["Beneath the earth, a seed waited.","It did not want to be the biggest.","It did not want to grow fast.","It only wanted to grow well, from within.","And that required something of her: to decide."] },

  { img:"p2.png",
    es:["Cada mañana, la semilla tenía opciones:","Agua turbia o agua limpia.","Sombra profunda o luz tibia.","Tierra apretada o tierra suelta.","Sus padres traían las opciones.","Pero ella decidía cuál necesitaba."],
    en:["Every morning, the seed had choices:","Murky water or clean water.","Deep shadow or warm light.","Tight soil or loose soil.","Her parents brought the options.","But she decided which one she needed."] },

  { img:"p3.png",
    es:["Pasaron días.","Y la semilla comenzó a notar algo claro:","Cuando elegía agua limpia, sus raíces crecían firmes. Cuando bebía agua turbia, se debilitaba.","No todas las opciones valían igual.","Algunas la fortalecían. Otras la gastaban.","La semilla aprendió a escuchar lo que su cuerpo le decía."],
    en:["Days passed.","And the seed began to notice something clear:","When she chose clean water, her roots grew firm. When she drank murky water, she felt herself weaken.","Not all choices were equal.","Some strengthened her. Others wore her down.","The seed learned to listen to what her own body told her."] },

  { img:"p4.png",
    es:["Un día, una semilla cercana le susurró:","<em>\u201c¿Por qué eres tan exigente contigo misma? Yo bebo cualquier agua. Crezco igual.\u201d</em>","Otra preguntó:","<em>\u201c¿No es egoísmo pensar tanto en lo que necesitas? Las semillas de verdad no eligen. Solo crecen.\u201d</em>","La semilla sintió la duda. ¿Estaba sola por elegir bien? ¿Era egoísmo cuidarse a sí misma?"],
    en:["One day, a seed nearby whispered to her:","<em>\u201cWhy are you so demanding of yourself? I drink any water. I grow the same.\u201d</em>","Another asked:","<em>\u201cIsn\u2019t it selfish to think so much about what you need? Real seeds don\u2019t choose. They just grow.\u201d</em>","The seed felt the doubt. Was she alone for choosing well? Was caring for herself selfish?"] },

  { img:"p5.png",
    es:["Más tiempo después, vio a la otra semilla.","La que decía que todas las aguas valían igual.","Estaba débil. Sus raíces apenas sostenían el peso.","Entonces la semilla entendió sin necesidad de sermón:","Cuidarse a sí misma no era egoísmo. Era la única manera de poder cuidar a otros."],
    en:["More time passed.","She saw the other seed, the one who said all waters were equal.","It was weak. Its roots barely held its weight.","Then the seed understood without any lesson needed:","Caring for herself was not selfishness. It was the only way she could care for others."] },

  { img:"p6.png",
    es:["Pasó un año.","La semilla era ahora un árbol joven y firme.","Sus raíces eran profundas. Sus ramas, fuertes.","Y ahora podía hacer cosas que antes no podía:","Ofrecer sombra fresca a quien tenía calor. Sostener flores. Alimentar pájaros. Abrazar a sus padres con raíces profundas y seguras.","Todo eso vino de haber elegido bien cuando era solo una semilla en la oscuridad."],
    en:["One year passed.","The seed was now a young tree.","Its roots were deep. Its branches, strong.","And now it could do things it never could before:","Offer cool shade to those who had heat. Hold flowers. Feed birds. Hold its parents with roots deep and sure.","All of that came from choosing well, when it was only a seed in the dark."] },

  { img:"p7.png",
    es:["El árbol joven seguía en el mismo bosque.","Cada día, nuevas semillas llegaban con la misma pregunta:","<em>\u201c¿No es egoísmo pensar en lo que yo necesito?\u201d</em>","El árbol sonrió. Y dijo algo que nunca olvidarían:","\u201cEl amor propio no es lo opuesto al amor por otros. Es el inicio.\u201d","Cuando aprendas a elegir bien para ti, cuando crezcas fuerte desde adentro, tendrás todo lo que necesitas para amar de verdad.","Y eso es el regalo más grande que puedes darle a quienes te aman."],
    en:["The young tree stayed in the same forest.","Each day, new seeds came with the same question:","<em>\u201cIsn\u2019t it selfish to think about what I need?\u201d</em>","The tree smiled. And said something they would never forget:","\u201cSelf-love is not the opposite of love for others. It is the beginning.\u201d","When you learn to choose well for yourself, when you grow strong from within, you will have everything you need to love truly.","And that is the greatest gift you can give to those who love you."] },

  { type:"colophon", img:"contraportada.png",
    secret_es:"Y todo vuelve a empezar.", secret_en:"And it all begins again.",
    mark_es:"Self Love Club · La Semilla", mark_en:"Self Love Club · The Seed",
    cnote_es:"Un protocolo de amor propio narrado para quien aún crece.",
    cnote_en:"A protocol of self-love narrated for those who are still growing." }
];

let lang="es", idx=0;
const book=document.getElementById("book");

function buildPage(s,i){
  const p=document.createElement("div");
  p.className="page";
  if(s.type==="cover"){
    p.classList.add("cover");
    p.innerHTML=`<div class="frame">
      <div class="illo"><img src="${IMG}${s.img}" alt=""></div>
      <div class="cover-kicker" data-es="${s.kicker_es}" data-en="${s.kicker_en}">${s.kicker_es}</div>
      <div class="cover-title" data-es="${s.title_es}" data-en="${s.title_en}">${s.title_es}</div>
      <div class="cover-sub" data-es="${s.sub_es}" data-en="${s.sub_en}">${s.sub_es}</div>
    </div>`;
  } else if(s.type==="colophon"){
    p.classList.add("colophon");
    p.innerHTML=`<div class="frame">
      <div class="illo"><img src="${IMG}${s.img}" alt=""></div>
      <div class="secret" data-es="${s.secret_es}" data-en="${s.secret_en}">${s.secret_es}</div>
      <div class="mark" data-es="${s.mark_es}" data-en="${s.mark_en}">${s.mark_es}</div>
      <div class="cnote" data-es="${s.cnote_es}" data-en="${s.cnote_en}">${s.cnote_es}</div>
    </div>`;
  } else {
    const esH=s.es.map((t,k)=>`<p class="${k===0?'lead':''}">${t}</p>`).join("");
    const enH=s.en.map((t,k)=>`<p class="${k===0?'lead':''}">${t}</p>`).join("");
    p.innerHTML=`<div class="frame">
      <div class="illo"><img src="${IMG}${s.img}" alt=""></div>
      <div class="text" data-es-html="${encodeURIComponent(esH)}" data-en-html="${encodeURIComponent(enH)}">${esH}</div>
      <div class="pageno">${i}</div>
    </div>`;
  }
  return p;
}

SCENES.forEach((s,i)=>book.appendChild(buildPage(s,i)));
const pages=[...book.querySelectorAll(".page")];

const progress=document.getElementById("progress");
SCENES.forEach(()=>{const d=document.createElement("div");d.className="dot";progress.appendChild(d)});
const dots=[...progress.querySelectorAll(".dot")];

function render(){
  pages.forEach((p,i)=>p.classList.toggle("active",i===idx));
  dots.forEach((d,i)=>d.classList.toggle("on",i===idx));
  document.getElementById("prevBtn").disabled=idx===0;
  document.getElementById("nextBtn").disabled=idx===pages.length-1;
}
function go(n){
  if(n<0||n>pages.length-1)return;
  const cur=pages[idx];
  cur.classList.add("leaving");
  setTimeout(()=>cur.classList.remove("leaving"),550);
  idx=n;render();
}
function next(){go(idx+1)}
function prev(){go(idx-1)}

function setLang(l){
  lang=l;document.documentElement.lang=l;
  document.getElementById("es").classList.toggle("active",l==="es");
  document.getElementById("en").classList.toggle("active",l==="en");
  document.querySelectorAll("[data-es][data-en]").forEach(el=>el.textContent=el.getAttribute("data-"+l));
  document.querySelectorAll("[data-es-html][data-en-html]").forEach(el=>el.innerHTML=decodeURIComponent(el.getAttribute("data-"+l+"-html")));
}

document.addEventListener("keydown",e=>{if(e.key==="ArrowRight")next();if(e.key==="ArrowLeft")prev()});
let x0=null;
book.addEventListener("touchstart",e=>x0=e.touches[0].clientX,{passive:true});
book.addEventListener("touchend",e=>{if(x0===null)return;const dx=e.changedTouches[0].clientX-x0;if(Math.abs(dx)>45){dx<0?next():prev()}x0=null});

render();
</script>
</body>
</html>
