<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinetic Clarity Engine - Self Love Club</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        kinetic: '#a855f7',
                        kineticDark: '#0f172a',
                        surface: '#1e293b'
                    },
                    fontFamily: {
                        serif: ['"Playfair Display"', 'serif'],
                        sans: ['"Inter"', 'sans-serif'],
                        cormorant: ['"Cormorant Garamond"', 'serif'],
                        instrument: ['"Instrument Sans"', 'sans-serif'],
                        dm: ['"DM Mono"', 'monospace']
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;600;800&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Instrument+Sans:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; margin: 0; padding: 0; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        .grayscale-editorial { filter: grayscale(100%) contrast(1.15); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useLayoutEffect, useRef } = React;

        const AutoFitContent = ({ children, isCenter }) => {
            const containerRef = useRef(null);
            const contentRef = useRef(null);
            const [scale, setScale] = useState(1);
            useLayoutEffect(() => { setScale(1); }, [children]);
            useLayoutEffect(() => {
                const container = containerRef.current;
                const content = contentRef.current;
                if (!container || !content) return;
                const measureAndScale = () => {
                    const containerH = container.clientHeight;
                    const contentH = content.scrollHeight;
                    if (contentH > containerH && containerH > 0) {
                        const newScale = containerH / contentH;
                        setScale(newScale * 0.95); 
                    }
                };
                requestAnimationFrame(measureAndScale);
            }, [children]);

            return (
                <div ref={containerRef} className={`w-full flex-1 min-h-0 flex flex-col ${isCenter ? 'items-center justify-center' : 'justify-center'} overflow-hidden`}>
                    <div ref={contentRef} style={{ transform: `scale(${scale})`, transformOrigin: isCenter ? 'center center' : 'left center', width: scale < 1 ? `${100 / scale}%` : '100%' }} className={`flex flex-col gap-4 ${isCenter ? 'items-center text-center' : ''}`}>
                        {children}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [essay, setEssay] = useState("");
            const [userApiKey, setUserApiKey] = useState("");
            const [selectedModel, setSelectedModel] = useState("gemini-2.0-flash");
            const [loading, setLoading] = useState(false);
            const [slides, setSlides] = useState(null);
            const [currentSlide, setCurrentSlide] = useState(0);
            const [error, setError] = useState(null);
            const [exporting, setExporting] = useState(false);
            const [currentStyle, setCurrentStyle] = useState("Editorial");
            const [polishing, setPolishing] = useState(false);
            const [isSpeaking, setIsSpeaking] = useState(false);
            const [listingModels, setListingModels] = useState(false);
            const slideRef = useRef(null);

            const stylesConfig = {
                Editorial: { container: "bg-[#F7F4EF] text-[#1A1814]", accent: "bg-[#8B6F4E]", textAccent: "text-[#8B6F4E]", border: "border-[#8B6F4E]", fontHeading: "font-cormorant italic font-bold tracking-wide", fontBody: "font-instrument", tag: "bg-[#C4A882] text-[#1A1814] font-dm text-[8px] font-semibold", logoFilter: "grayscale-editorial opacity-35", padding: "px-16 py-12" },
                Kinetic: { container: "bg-[#0f172a] text-[#f8fafc]", accent: "bg-[#a855f7]", textAccent: "text-[#a855f7]", border: "border-slate-800", fontHeading: "font-serif", fontBody: "font-sans", tag: "bg-[#a855f7] text-white font-dm text-[9px]", logoFilter: "invert brightness-200", padding: "px-12 py-10" },
                Brutalist: { container: "bg-white text-black border-[6px] border-black", accent: "bg-yellow-400", textAccent: "text-black underline decoration-yellow-400 decoration-8", border: "border-black", fontHeading: "font-sans font-black uppercase tracking-tighter", fontBody: "font-sans font-bold", tag: "bg-black text-white font-dm text-[9px] font-bold", logoFilter: "contrast-150", padding: "px-14 py-10" },
                DarkMode: { container: "bg-slate-950 text-white", accent: "bg-blue-500", textAccent: "text-blue-400", border: "border-slate-800", fontHeading: "font-sans font-black", fontBody: "font-sans", tag: "bg-white text-black font-dm text-[9px]", logoFilter: "invert brightness-200", padding: "px-12 py-10" },
                Stoic: { container: "bg-[#f4f1ea] text-[#2c2c2c]", accent: "bg-[#8b7e66]", textAccent: "text-[#5d5444]", border: "border-[#8b7e66]", fontHeading: "font-serif italic font-bold", fontBody: "font-serif italic", tag: "bg-[#2c2c2c] text-white font-dm text-[9px]", logoFilter: "sepia contrast-110", padding: "px-14 py-10" },
                Modern: { container: "bg-gradient-to-br from-indigo-50 via-white to-blue-50 text-slate-900", accent: "bg-indigo-600", textAccent: "text-indigo-600", border: "border-indigo-100", fontHeading: "font-sans font-extrabold tracking-tight", fontBody: "font-sans", tag: "bg-indigo-900 text-white font-dm text-[9px]", logoFilter: "", padding: "px-12 py-10" }
            };

            const formatText = (text) => {
                if (!text) return null;
                return text.split('\n').map((line, i) => {
                    if (!line.trim()) return <div key={i} className="h-3"></div>;
                    const parts = line.split(/(\*\*.*?\*\*)/g).map((part, j) => (part.startsWith('**') && part.endsWith('**')) ? <strong key={j} className="font-bold opacity-100">{part.slice(2, -2)}</strong> : part);
                    if (/^[-•]|\d+\./.test(line.trim())) {
                        return <div key={i} className="flex gap-4 my-2 pl-2"><span className={`opacity-40 select-none ${stylesConfig[currentStyle].accent} w-1.5 h-1.5 rounded-full mt-2.5 flex-none`}></span><p className="leading-relaxed">{parts}</p></div>;
                    }
                    return <p key={i} className="mb-2 leading-relaxed">{parts}</p>;
                });
            };

            const exportAsJpg = async () => {
                if (!window.htmlToImage) return;
                setExporting(true);
                try {
                    const dataUrl = await window.htmlToImage.toJpeg(slideRef.current, { quality: 0.95, pixelRatio: 3, useCORS: true, cacheBust: true });
                    const link = document.createElement('a');
                    link.download = `SLC-Slide-0${slides[currentSlide].slideNumber}.jpg`;
                    link.href = dataUrl; link.click();
                } catch (err) { console.error(err); } finally { setExporting(false); }
            };

            const downloadAllAsZip = async () => {
                if (!slides) return;
                setExporting(true);
                const zip = new JSZip();
                const originalSlide = currentSlide;
                try {
                    for (let i = 0; i < slides.length; i++) {
                        setCurrentSlide(i);
                        await new Promise(res => setTimeout(res, 800));
                        const dataUrl = await window.htmlToImage.toJpeg(slideRef.current, { quality: 0.95, pixelRatio: 3, useCORS: true, cacheBust: true });
                        zip.file(`SLC-Slide-0${i+1}.jpg`, dataUrl.split(',')[1], {base64: true});
                    }
                    const content = await zip.generateAsync({type: "blob"});
                    const link = document.createElement("a"); link.href = URL.createObjectURL(content); link.download = "Presentacion_SelfLoveClub.zip"; link.click();
                } catch (err) { console.error(err); } finally { setCurrentSlide(originalSlide); setExporting(false); }
            };

            const listAvailableModels = async () => {
                if (!userApiKey.trim()) return;
                setListingModels(true);
                try {
                    const url = `https://generativelanguage.googleapis.com/v1beta/models?key=${userApiKey.trim()}`;
                    const data = await fetch(url).then(res => res.json());
                    const modelNames = data.models ? data.models.map(m => m.name.replace("models/", "")) : [];
                    alert("Modelos disponibles:\n" + modelNames.join("\n"));
                } catch (err) { console.error(err); } finally { setListingModels(false); }
            };

            const generateCarousel = async () => {
                if (!essay.trim() || !userApiKey.trim()) return;
                setLoading(true); setError(null);
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${userApiKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: "Create EXACTLY 7 carousel slides for Self Love Club based on the following text. Respond in JSON {slides:[{title, subtitle, body, slideNumber}]}. Slide 1 title/subtitle only, slides 2-6 body only, slide 7 closing title/CTA. Text: " + essay }] }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    const data = await response.json();
                    const parsed = JSON.parse(data.candidates[0].content.parts[0].text);
                    setSlides(parsed.slides);
                } catch (err) { setError("Error de API: " + err.message); } finally { setLoading(false); }
            };

            const polishSlide = async () => {
                if (!slides || !userApiKey.trim()) return;
                setPolishing(true);
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${userApiKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: "Improve this slide wording concisely: " + JSON.stringify(slides[currentSlide]) }] }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    const data = await response.json();
                    const refined = JSON.parse(data.candidates[0].content.parts[0].text);
                    const newSlides = [...slides]; newSlides[currentSlide] = { ...slides[currentSlide], ...refined };
                    setSlides(newSlides);
                } catch (err) { console.error(err); } finally { setPolishing(false); }
            };

            const toggleNarration = () => {
                if (!slides) return;
                if (isSpeaking) { window.speechSynthesis.cancel(); setIsSpeaking(false); return; }
                const fullText = slides.map(s => `${s.title || ''}. ${s.body || ''}`).join(' ');
                const utterance = new SpeechSynthesisUtterance(fullText); utterance.lang = 'es-ES';
                utterance.onend = () => setIsSpeaking(false);
                window.speechSynthesis.speak(utterance); setIsSpeaking(true);
            };

            return (
                <div className="min-h-screen bg-kineticDark text-slate-200 font-sans selection:bg-kinetic selection:text-white pb-20">
                    <nav className="border-b border-slate-800 bg-[#0b1121] py-5 px-8 flex justify-between items-center sticky top-0 z-50 shadow-lg">
                        <div className="flex items-center gap-4">
                            <span className="font-serif font-bold text-2xl tracking-wide text-white">Kinetic Clarity</span>
                        </div>
                        <div className="flex items-center gap-4">
                            <img src="/assets/images/andres-ramirez-portrait.jpg" className="w-11 h-11 rounded-full border-2 border-slate-700 shadow-md object-cover" />
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto p-8 mt-6 grid grid-cols-1 lg:grid-cols-12 gap-12">
                        <div className="lg:col-span-5 space-y-6">
                            <div className="bg-surface p-8 rounded-3xl shadow-2xl border border-slate-800 relative overflow-hidden">
                                <h2 className="text-3xl font-serif font-bold mb-8 text-white">Generador de Activos</h2>
                                <div className="space-y-6 relative z-10">
                                    <input type="password" className="w-full bg-[#0b1121] border border-slate-700 rounded-xl p-3 text-sm focus:border-kinetic outline-none" placeholder="API Key..." value={userApiKey} onChange={(e) => setUserApiKey(e.target.value)} />
                                    <select value={selectedModel} onChange={(e) => setSelectedModel(e.target.value)} className="w-full bg-[#0b1121] border border-slate-700 rounded-xl p-3 text-sm">
                                        <option value="gemini-2.0-flash">gemini-2.0-flash</option>
                                        <option value="gemini-2.0-pro-exp-02-05">gemini-2.0-pro (mejor redacción)</option>
                                    </select>
                                    <button onClick={listAvailableModels} className="w-full text-[10px] font-bold bg-[#0b1121] py-2 rounded-xl border border-slate-700">🔎 VER MODELOS DISPONIBLES</button>
                                    <div className="grid grid-cols-3 gap-3">
                                        {Object.keys(stylesConfig).map(s => (
                                            <button key={s} onClick={() => setCurrentStyle(s)} className={`py-2 rounded-xl text-[10px] font-bold border ${currentStyle === s ? 'bg-kinetic text-white border-kinetic shadow-lg' : 'bg-[#0b1121] text-slate-400 border-slate-700'}`}>{s.toUpperCase()}</button>
                                        ))}
                                    </div>
                                    <textarea className="w-full h-48 p-5 bg-[#0b1121] border border-slate-700 rounded-2xl text-sm" placeholder="Tu ensayo..." value={essay} onChange={(e) => setEssay(e.target.value)} />
                                    <button onClick={generateCarousel} disabled={loading} className="w-full py-4 bg-white text-kineticDark rounded-xl font-bold">
                                        {loading ? "SINTETIZANDO..." : "GENERAR CARRUSEL"}
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div className="lg:col-span-7 flex flex-col items-center">
                            {slides ? (
                                <div className="flex flex-col items-center gap-8 w-full">
                                    <div className="w-full max-w-[480px] flex justify-between items-center bg-surface p-3 rounded-2xl border border-slate-800 shadow-xl">
                                        <div className="flex gap-2">
                                            <button onClick={polishSlide} className="bg-[#0b1121] text-slate-300 px-4 py-2 rounded-xl text-xs font-bold border border-slate-700">Pulir</button>
                                            <button onClick={toggleNarration} className="bg-[#0b1121] text-slate-300 px-4 py-2 rounded-xl text-xs font-bold border border-slate-700">Narrar</button>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={exportAsJpg} className="bg-kinetic text-white px-5 py-2 rounded-xl font-bold text-xs">JPG</button>
                                            <button onClick={downloadAllAsZip} className="bg-emerald-600 text-white px-5 py-2 rounded-xl font-bold text-xs">ZIP</button>
                                        </div>
                                    </div>

                                    <div ref={slideRef} className={`w-[480px] h-[600px] ${stylesConfig[currentStyle].container} rounded-[40px] shadow-2xl flex flex-col ${stylesConfig[currentStyle].padding} relative overflow-hidden transition-all duration-500`}>
                                        <div className="flex justify-between items-center z-10 flex-none mb-6">
                                            <span className={`text-[9px] uppercase tracking-[0.4em] opacity-40 ${stylesConfig[currentStyle].fontBody}`}>Self Love Club</span>
                                            <div className={`w-2 h-2 rounded-full ${stylesConfig[currentStyle].accent}`}></div>
                                        </div>

                                        <AutoFitContent isCenter={currentSlide === 6}>
                                            <div className={`w-12 h-1 flex-none ${stylesConfig[currentStyle].accent} mb-4 ${currentSlide === 6 ? 'mx-auto' : ''}`}></div>
                                            {currentSlide === 0 ? (
                                                <>
                                                    <h3 className={`text-4xl sm:text-5xl flex-none leading-[1.05] ${stylesConfig[currentStyle].fontHeading}`}>{slides[currentSlide].title}</h3>
                                                    <p className={`text-lg sm:text-xl opacity-60 italic ${stylesConfig[currentStyle].fontBody}`}>{slides[currentSlide].subtitle}</p>
                                                </>
                                            ) : (
                                                <div className={`text-xl sm:text-2xl opacity-90 ${stylesConfig[currentStyle].fontBody}`}>
                                                    {formatText(slides[currentSlide].body)}
                                                </div>
                                            )}
                                        </AutoFitContent>

                                        <div className={`flex items-center justify-between border-t ${stylesConfig[currentStyle].border} pt-6 mt-auto flex-none z-10`}>
                                            <div className="flex items-center gap-3">
                                                <img src="/assets/images/andres-ramirez-portrait.jpg" className={`w-12 h-12 grayscale-editorial object-cover`} />
                                                <div className="flex flex-col">
                                                    <span className={`text-[10px] font-bold tracking-wider uppercase ${stylesConfig[currentStyle].fontBody}`}>Andrés Ramírez</span>
                                                    <span className={`text-[8px] font-semibold opacity-40 uppercase tracking-widest ${stylesConfig[currentStyle].fontBody}`}>Clarity Strategist</span>
                                                </div>
                                            </div>
                                            <div className={`px-4 py-1.5 rounded-full text-[8px] ${stylesConfig[currentStyle].tag}`}>0{currentSlide + 1}</div>
                                        </div>
                                    </div>

                                    <div className="flex items-center gap-6 bg-surface p-3 rounded-full border border-slate-800 shadow-xl">
                                        <button onClick={() => setCurrentSlide(p => Math.max(0, p - 1))} className="w-10 h-10 rounded-full bg-[#0b1121] flex items-center justify-center text-slate-400"><i className="fa-solid fa-chevron-left"></i></button>
                                        <div className="flex gap-2">{slides.map((_, i) => (<div key={i} onClick={() => setCurrentSlide(i)} className={`h-1.5 rounded-full cursor-pointer ${currentSlide === i ? 'w-8 bg-kinetic' : 'w-2 bg-slate-600'}`} />))}</div>
                                        <button onClick={() => setCurrentSlide(p => Math.min(6, p + 1))} className="w-10 h-10 rounded-full bg-[#0b1121] flex items-center justify-center text-slate-400"><i className="fa-solid fa-chevron-right"></i></button>
                                    </div>
                                </div>
                            ) : (
                                <div className="h-[600px] w-full max-w-[480px] flex flex-col justify-center items-center text-center p-12 border border-slate-800 rounded-[40px] bg-surface/50">
                                    <i className="fa-solid fa-layer-group text-5xl text-slate-700 mb-6"></i>
                                    <h3 className="text-2xl font-serif text-white italic">Kinetic Strategy</h3>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
