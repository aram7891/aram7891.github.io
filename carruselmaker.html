<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinetic Clarity Engine - Self Love Club</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        kinetic: '#a855f7',
                        kineticDark: '#0f172a',
                        surface: '#1e293b'
                    },
                    fontFamily: {
                        serif: ['"Playfair Display"', 'serif'],
                        sans: ['"Inter"', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- html-to-image -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.js"></script>

    <!-- React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- PWA + Icono (tu foto logo.PNG como muñeco en el escritorio) -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="logo.PNG">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <!-- JSZip para descargar las 7 diapositivas juntas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        body { background-color: #0f172a; color: #f8fafc; margin: 0; padding: 0; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const TEXT_MODEL = "gemini-2.5-flash"; 
        
        const fetchWithRetry = async (url, options, maxRetries = 3) => {
            let retries = 0;
            while (retries < maxRetries) {
                try {
                    const response = await fetch(url, options);
                    if (response.ok) return await response.json();
                    
                    if (response.status === 400) throw new Error("API Key inválida o mal copiada. Revísala.");
                    if (response.status === 403) throw new Error("Permiso denegado. Verifica tu API Key.");
                    if (response.status === 404) throw new Error("Modelo no encontrado.");
                    if (response.status === 429) {
                        const delay = Math.pow(2, retries) * 1000;
                        await new Promise(res => setTimeout(res, delay));
                        retries++;
                        continue;
                    }
                    throw new Error(`Error de servidor (${response.status}).`);
                } catch (err) {
                    if (retries === maxRetries - 1) throw err;
                    retries++;
                }
            }
        };

        const App = () => {
            const [essay, setEssay] = useState("");
            const [userApiKey, setUserApiKey] = useState("");
            const [selectedModel, setSelectedModel] = useState("gemini-2.5-flash");
            const [loading, setLoading] = useState(false);
            const [slides, setSlides] = useState(null);
            const [currentSlide, setCurrentSlide] = useState(0);
            const [error, setError] = useState(null);
            const [exporting, setExporting] = useState(false);
            const [currentStyle, setCurrentStyle] = useState("Kinetic");
            const [polishing, setPolishing] = useState(false);
            const [isSpeaking, setIsSpeaking] = useState(false);
            const [listingModels, setListingModels] = useState(false);

            const slideRef = useRef(null);

            const stylesConfig = {
                Kinetic: { container: "bg-[#0f172a] text-[#f8fafc]", accent: "bg-[#a855f7]", textAccent: "text-[#a855f7]", border: "border-slate-800", fontHeading: "font-serif", fontBody: "font-sans", tag: "bg-[#a855f7] text-white", logoFilter: "invert brightness-200" },
                Brutalist: { container: "bg-white text-black border-[6px] border-black", accent: "bg-yellow-400", textAccent: "text-black underline decoration-yellow-400 decoration-8", border: "border-black", fontHeading: "font-sans font-black uppercase tracking-tighter", fontBody: "font-sans font-bold", tag: "bg-black text-white", logoFilter: "contrast-150" },
                DarkMode: { container: "bg-slate-950 text-white", accent: "bg-blue-500", textAccent: "text-blue-400", border: "border-slate-800", fontHeading: "font-sans font-black", fontBody: "font-sans", tag: "bg-white text-black", logoFilter: "invert brightness-200" },
                Stoic: { container: "bg-[#f4f1ea] text-[#2c2c2c]", accent: "bg-[#8b7e66]", textAccent: "text-[#5d5444]", border: "border-[#e0ddd5]", fontHeading: "font-serif italic font-bold", fontBody: "font-serif italic", tag: "bg-[#2c2c2c] text-white", logoFilter: "sepia contrast-110" },
                Modern: { container: "bg-gradient-to-br from-indigo-50 via-white to-blue-50 text-slate-900", accent: "bg-indigo-600", textAccent: "text-indigo-600", border: "border-indigo-100", fontHeading: "font-sans font-extrabold tracking-tight", fontBody: "font-sans", tag: "bg-indigo-900 text-white", logoFilter: "" }
            };

            // ✅ NUEVA FUNCIÓN: Descargar las 7 diapositivas en un solo ZIP
            const downloadAllAsZip = async () => {
                if (!slides) {
                    alert("Primero genera el carrusel de 7 diapositivas.");
                    return;
                }
                if (!window.htmlToImage) {
                    alert("El exportador de imágenes aún está cargando. Espera unos segundos.");
                    return;
                }

                setExporting(true);
                const zip = new JSZip();
                const originalSlide = currentSlide;

                try {
                    for (let i = 0; i < slides.length; i++) {
                        setCurrentSlide(i);
                        await new Promise(resolve => setTimeout(resolve, 450));
                        const dataUrl = await window.htmlToImage.toJpeg(slideRef.current, { quality: 1, pixelRatio: 3 });
                        const res = await fetch(dataUrl);
                        const blob = await res.blob();
                        zip.file(`SLC-Slide-${slides[i].slideNumber}.jpg`, blob);
                    }

                    const content = await zip.generateAsync({type: "blob"});
                    const link = document.createElement("a");
                    link.href = URL.createObjectURL(content);
                    link.download = "Presentacion_SelfLoveClub_7_Diapositivas.zip";
                    link.click();
                } catch (err) {
                    console.error(err);
                    alert("Hubo un problema al generar el ZIP. Inténtalo de nuevo.");
                } finally {
                    setCurrentSlide(originalSlide);
                    setExporting(false);
                }
            };

            const listAvailableModels = async () => {
                if (!userApiKey.trim()) {
                    alert("Primero pega tu API Key");
                    return;
                }
                setListingModels(true);
                try {
                    const url = `https://generativelanguage.googleapis.com/v1beta/models?key=${userApiKey.trim()}`;
                    const data = await fetch(url).then(res => res.ok ? res.json() : { error: res.status });
                    
                    if (data.error) throw new Error("No se pudo obtener la lista");
                    
                    const modelNames = data.models ? data.models.map(m => m.name.replace("models/", "")) : ["No se encontraron modelos"];
                    alert(`✅ Modelos disponibles para tu API Key:\n\n${modelNames.join("\n")}\n\n🔥 Recomendado: gemini-2.5-flash`);
                } catch (err) {
                    alert("❌ Error al listar modelos: " + err.message);
                } finally {
                    setListingModels(false);
                }
            };

            const generateCarousel = async () => {
                if (!essay.trim()) return;
                if (!userApiKey.trim()) {
                    setError("Por favor, ingresa tu API Key.");
                    return;
                }

                setLoading(true);
                setError(null);
                setCurrentSlide(0);

                const url = `https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${userApiKey.trim()}`;

                const payload = {
                    contents: [{
                        parts: [{
                            text: `Crea EXACTAMENTE 7 láminas de carrusel para el Self Love Club basado en este ensayo:

${essay}

Formato JSON:
{
  "slides": [
    {
      "title": "",
      "subtitle": "",
      "body": "",
      "slideNumber": 1
    }
  ]
}

Reglas:
- Todo en español
- Tono motivacional y de claridad kinética
- 7 slides exactos
- Slide 1: introducción poderosa
- Slides 2-6: insights clave o consejos prácticos
- Slide 7: cierre impactante con llamada a acción`
                        }]
                    }]
                };

                try {
                    const data = await fetchWithRetry(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const responseText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (!responseText) throw new Error("La API no devolvió contenido.");

                    const jsonMatch = responseText.match(/\{[\s\S]*\}/);
                    if (!jsonMatch) throw new Error("No vino JSON válido.");

                    const parsed = JSON.parse(jsonMatch[0]);

                    if (!parsed.slides || parsed.slides.length !== 7) {
                        throw new Error("No hay 7 slides.");
                    }

                    setSlides(parsed.slides);
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            const polishSlide = async () => {
                if (!slides || !userApiKey.trim()) return;

                setPolishing(true);
                const currentData = slides[currentSlide];

                const url = `https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${userApiKey.trim()}`;

                const payload = {
                    contents: [{
                        parts: [{
                            text: `Mejora este slide y devuélvelo en JSON:

${JSON.stringify(currentData)}

Formato:
{
 "title": "",
 "subtitle": "",
 "body": ""
}`
                        }]
                    }]
                };

                try {
                    const data = await fetchWithRetry(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const responseText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    const jsonMatch = responseText.match(/\{[\s\S]*\}/);
                    if (!jsonMatch) throw new Error("JSON inválido");

                    const refined = JSON.parse(jsonMatch[0]);

                    const newSlides = [...slides];
                    newSlides[currentSlide] = {
                        ...currentData,
                        ...refined,
                        slideNumber: currentData.slideNumber
                    };

                    setSlides(newSlides);
                } catch (err) {
                    console.error(err);
                } finally {
                    setPolishing(false);
                }
            };

            const toggleNarration = () => {
                if (!slides) return;
                if (isSpeaking) { window.speechSynthesis.cancel(); setIsSpeaking(false); return; }
                if (!('speechSynthesis' in window)) { alert("Tu navegador no soporta narración de voz nativa."); return; }

                const fullText = slides.map(s => `${s.title}. ${s.subtitle || ''} ${s.body || ''}`).join(' ');
                const utterance = new SpeechSynthesisUtterance(fullText);
                utterance.lang = 'es-ES'; 
                utterance.onend = () => setIsSpeaking(false);
                utterance.onerror = () => setIsSpeaking(false);
                window.speechSynthesis.speak(utterance);
                setIsSpeaking(true);
            };

            useEffect(() => {
                return () => { if ('speechSynthesis' in window) window.speechSynthesis.cancel(); };
            }, []);

            const exportAsJpg = async () => {
                if (!window.htmlToImage) { alert("El exportador aún está cargando. Intenta en unos segundos."); return; }
                setExporting(true);
                try {
                    const dataUrl = await window.htmlToImage.toJpeg(slideRef.current, { quality: 1, pixelRatio: 3 });
                    const link = document.createElement('a');
                    link.download = `SLC-Slide-${slides[currentSlide].slideNumber}.jpg`;
                    link.href = dataUrl;
                    link.click();
                } catch (err) {
                    alert("Ocurrió un problema al descargar la imagen.");
                } finally {
                    setExporting(false);
                }
            };

            return (
                <div className="min-h-screen bg-kineticDark text-slate-200 font-sans selection:bg-kinetic selection:text-white pb-20">
                    <nav className="border-b border-slate-800 bg-[#0b1121] py-5 px-8 flex justify-between items-center sticky top-0 z-50 shadow-lg">
                        <div className="flex items-center gap-4">
                            <div className="bg-kinetic/10 p-2.5 rounded-lg border border-kinetic/20"><i className="fa-solid fa-wand-magic-sparkles text-kinetic"></i></div>
                            <span className="font-serif font-bold text-2xl tracking-wide text-white">Kinetic Clarity</span>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="text-right hidden sm:block">
                                <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Self Love Club</p>
                                <p className="text-sm font-serif text-slate-300">Andrés Ramírez</p>
                            </div>
                            <img src="/assets/images/andres-ramirez-portrait.jpg" className="w-11 h-11 rounded-full border-2 border-slate-700 shadow-md object-cover" onError={(e) => e.target.src="https://ui-avatars.com/api/?name=AR&background=a855f7&color=fff"} alt="Andrés Ramírez" />
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto p-8 mt-6 grid grid-cols-1 lg:grid-cols-12 gap-12">
                        <div className="lg:col-span-5 space-y-6">
                            <div className="bg-surface p-8 rounded-3xl shadow-2xl border border-slate-800 relative overflow-hidden">
                                <div className="absolute top-0 right-0 w-64 h-64 bg-kinetic/5 rounded-full blur-[80px] -mr-20 -mt-20 pointer-events-none"></div>
                                <h2 className="text-3xl font-serif font-bold mb-2 text-white">Generador de Activos</h2>
                                <p className="text-slate-400 text-sm mb-8 font-light">Transforma conocimiento en carruseles.</p>
                                
                                <div className="space-y-6 relative z-10">
                                    <div className="space-y-2">
                                        <div className="flex justify-between items-center">
                                            <label className="text-[10px] font-bold uppercase tracking-widest text-slate-500"><i className="fa-solid fa-key mr-1"></i> API Key de Gemini</label>
                                            <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noreferrer" className="text-[10px] text-kinetic hover:underline font-bold">Obtener Gratis Aquí</a>
                                        </div>
                                        <input type="password" className="w-full bg-[#0b1121] border border-slate-700 rounded-xl p-3 text-sm focus:border-kinetic focus:outline-none text-slate-300" placeholder="Pega tu API Key obligatoriamente aquí..." value={userApiKey} onChange={(e) => setUserApiKey(e.target.value)} />
                                    </div>

                                    <div className="space-y-2">
                                        <label className="text-[10px] font-bold uppercase tracking-widest text-slate-500"><i className="fa-solid fa-cube mr-1"></i> Modelo Gemini</label>
                                        <select 
                                            value={selectedModel}
                                            onChange={(e) => setSelectedModel(e.target.value)}
                                            className="w-full bg-[#0b1121] border border-slate-700 rounded-xl p-3 text-sm focus:border-kinetic focus:outline-none text-slate-300"
                                        >
                                            <option value="gemini-2.5-flash">gemini-2.5-flash (recomendado)</option>
                                            <option value="gemini-2.5-flash-lite">gemini-2.5-flash-lite (más rápido y barato)</option>
                                            <option value="gemini-1.5-flash">gemini-1.5-flash (si tu key es vieja)</option>
                                        </select>
                                        <button 
                                            onClick={listAvailableModels}
                                            disabled={listingModels || !userApiKey.trim()}
                                            className="w-full text-xs font-bold bg-[#0b1121] hover:bg-slate-800 border border-slate-700 py-2 rounded-xl flex items-center justify-center gap-2"
                                        >
                                            {listingModels ? <i className="fa-solid fa-circle-notch fa-spin"></i> : <i className="fa-solid fa-list"></i>}
                                            {listingModels ? "Cargando modelos..." : "🔎 Ver Modelos Disponibles para mi Key"}
                                        </button>
                                    </div>

                                    <div className="space-y-3">
                                        <label className="text-[10px] font-bold uppercase tracking-widest text-slate-500"><i className="fa-solid fa-palette mr-1"></i> Dirección de Arte</label>
                                        <div className="grid grid-cols-3 gap-3">
                                            {Object.keys(stylesConfig).map(s => (
                                                <button key={s} onClick={() => setCurrentStyle(s)} className={`py-2.5 rounded-xl text-[10px] font-bold transition-all border ${currentStyle === s ? 'bg-kinetic text-white border-kinetic shadow-lg' : 'bg-[#0b1121] text-slate-400 border-slate-700'}`}>{s.toUpperCase()}</button>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="space-y-2">
                                        <label className="text-[10px] font-bold uppercase tracking-widest text-slate-500"><i className="fa-solid fa-file-lines mr-1"></i> Ensayo</label>
                                        <textarea className="w-full h-48 p-5 bg-[#0b1121] border border-slate-700 rounded-2xl focus:border-kinetic outline-none text-sm text-slate-300 leading-relaxed font-light" placeholder="Pega tu ensayo..." value={essay} onChange={(e) => setEssay(e.target.value)} />
                                    </div>

                                    {error && <div className="p-3 bg-red-500/10 border border-red-500/20 rounded-xl text-red-400 text-xs font-medium"><i className="fa-solid fa-circle-exclamation mr-1"></i> {error}</div>}

                                    <button onClick={generateCarousel} disabled={loading || !essay || !userApiKey} className="w-full py-4 bg-white text-kineticDark rounded-xl font-bold flex items-center justify-center gap-3 hover:bg-slate-200 disabled:opacity-50 transition-all shadow-xl">
                                        {loading ? <i className="fa-solid fa-circle-notch fa-spin"></i> : <i className="fa-solid fa-wand-magic-sparkles"></i>}
                                        {loading ? "SINTETIZANDO..." : "GENERAR CARRUSEL"}
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div className="lg:col-span-7 flex flex-col items-center">
                            {slides ? (
                                <div className="flex flex-col items-center gap-8 w-full">
                                    <div className="w-full max-w-[480px] flex justify-between items-center bg-surface p-3 rounded-2xl border border-slate-800 shadow-xl">
                                        <div className="flex gap-2">
                                            <button onClick={polishSlide} disabled={polishing} className="flex items-center gap-2 bg-[#0b1121] text-slate-300 px-4 py-2 rounded-xl text-xs font-bold hover:bg-slate-800 border border-slate-700">{polishing ? <i className="fa-solid fa-circle-notch fa-spin"></i> : <i className="fa-solid fa-pen-nib"></i>} Pulir</button>
                                            <button onClick={toggleNarration} className="flex items-center gap-2 bg-[#0b1121] text-slate-300 px-4 py-2 rounded-xl text-xs font-bold hover:bg-slate-800 border border-slate-700">{isSpeaking ? <i className="fa-solid fa-stop text-red-400"></i> : <i className="fa-solid fa-volume-high"></i>} {isSpeaking ? "Detener" : "Narrar"}</button>
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <button onClick={exportAsJpg} disabled={exporting} className="bg-kinetic text-white px-5 py-2 rounded-xl font-bold text-xs flex items-center gap-2 hover:bg-purple-500">{exporting ? <i className="fa-solid fa-circle-notch fa-spin"></i> : <i className="fa-solid fa-download"></i>} JPG</button>
                                            <button onClick={downloadAllAsZip} disabled={exporting} className="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2 rounded-xl font-bold text-xs flex items-center gap-2">
                                                {exporting ? <i className="fa-solid fa-circle-notch fa-spin"></i> : <i className="fa-solid fa-file-zipper"></i>} ZIP (todas)
                                            </button>
                                        </div>
                                    </div>

                                    <div ref={slideRef} className={`w-[480px] h-[600px] ${stylesConfig[currentStyle].container} rounded-[40px] shadow-2xl flex flex-col justify-between p-14 relative overflow-hidden transition-all duration-500`} style={currentStyle === 'Brutalist' ? { borderRadius: '0px' } : {}}>
                                        <div className="flex justify-between items-center z-10">
                                            <span className={`text-[9px] font-black tracking-[0.4em] uppercase opacity-40 ${stylesConfig[currentStyle].fontBody}`}>{slides[currentSlide].slideNumber === 7 ? "Clarity Strategist" : "Self Love Club"}</span>
                                            <div className={`w-2 h-2 rounded-full ${stylesConfig[currentStyle].accent}`}></div>
                                        </div>

                                        <div className="z-10 space-y-6">
                                            <div className={`w-12 h-1 ${stylesConfig[currentStyle].accent} mb-4`}></div>
                                            {slides[currentSlide].slideNumber === 1 ? (
                                                <div className="space-y-6">
                                                    <h3 className={`text-5xl leading-[1.05] ${stylesConfig[currentStyle].fontHeading}`}>{slides[currentSlide].title}</h3>
                                                    <p className={`text-xl opacity-60 font-medium italic ${stylesConfig[currentStyle].fontBody}`}>{slides[currentSlide].subtitle}</p>
                                                </div>
                                            ) : slides[currentSlide].slideNumber === 7 ? (
                                                <div className="space-y-8 flex flex-col items-center text-center">
                                                    <h3 className={`text-4xl ${stylesConfig[currentStyle].fontHeading}`}>{slides[currentSlide].title}</h3>
                                                    {slides[currentSlide].body && (
                                                        <p className={`text-xl opacity-80 leading-relaxed max-w-[340px] ${stylesConfig[currentStyle].fontBody}`}>
                                                            {slides[currentSlide].body}
                                                        </p>
                                                    )}
                                                </div>
                                            ) : (
                                                <div className="space-y-4">
                                                    <h3 className={`text-3xl leading-tight ${stylesConfig[currentStyle].fontHeading}`}>{slides[currentSlide].title}</h3>
                                                    <p className={`text-lg opacity-80 leading-relaxed ${stylesConfig[currentStyle].fontBody}`}>{slides[currentSlide].body}</p>
                                                </div>
                                            )}
                                        </div>

                                        <div className={`flex items-center justify-between border-t ${stylesConfig[currentStyle].border} pt-8 z-10`}>
                                            {slides[currentSlide].slideNumber === 7 ? (
                                                <div className="flex items-center gap-4">
                                                    <img src="/assets/images/andres-ramirez-portrait.jpg" className="w-12 h-12 rounded-full border border-slate-300 object-cover" onError={(e) => e.target.src="https://ui-avatars.com/api/?name=AR&background=a855f7&color=fff"} />
                                                    <div className="flex flex-col"><span className={`text-xs uppercase font-bold ${stylesConfig[currentStyle].fontBody}`}>Andrés Ramírez</span><span className="text-[9px] font-bold opacity-50 uppercase tracking-widest">Strategist</span></div>
                                                </div>
                                            ) : (
                                                <div className="flex items-center gap-4">
                                                    <img src="/assets/images/slc-logo.png" className={`w-12 h-12 object-contain opacity-90 ${stylesConfig[currentStyle].logoFilter}`} onError={(e) => e.target.src="https://ui-avatars.com/api/?name=SLC&background=000&color=fff"} />
                                                    <div className="flex flex-col">
                                                        <span className={`text-[10px] uppercase tracking-widest font-bold ${stylesConfig[currentStyle].fontBody}`}>Self Love Club</span>
                                                        <span className="text-[9px] font-bold opacity-40 italic">Tools</span>
                                                    </div>
                                                </div>
                                            )}
                                            <div className={`px-4 py-1.5 rounded-full text-[10px] font-black ${stylesConfig[currentStyle].tag}`}>0{slides[currentSlide].slideNumber}</div>
                                        </div>
                                        <div className={`absolute -bottom-20 -right-20 w-80 h-80 opacity-20 rounded-full blur-[100px] pointer-events-none ${stylesConfig[currentStyle].accent}`}></div>
                                    </div>

                                    <div className="flex items-center gap-6 bg-surface p-3 rounded-full border border-slate-800 shadow-xl">
                                        <button onClick={() => setCurrentSlide(p => Math.max(0, p - 1))} className="w-10 h-10 rounded-full bg-[#0b1121] flex items-center justify-center text-slate-400 hover:text-white disabled:opacity-30" disabled={currentSlide === 0}><i className="fa-solid fa-chevron-left"></i></button>
                                        <div className="flex gap-2">{slides.map((_, i) => (<div key={i} onClick={() => setCurrentSlide(i)} className={`h-1.5 rounded-full cursor-pointer ${currentSlide === i ? 'w-8 bg-kinetic' : 'w-2 bg-slate-600 hover:bg-slate-400'}`} />))}</div>
                                        <button onClick={() => setCurrentSlide(p => Math.min(6, p + 1))} className="w-10 h-10 rounded-full bg-[#0b1121] flex items-center justify-center text-slate-400 hover:text-white disabled:opacity-30" disabled={currentSlide === 6}><i className="fa-solid fa-chevron-right"></i></button>
                                    </div>
                                </div>
                            ) : (
                                <div className="h-[600px] w-full max-w-[480px] flex flex-col justify-center items-center text-center p-12 border border-slate-800 rounded-[40px] bg-surface/50 relative overflow-hidden">
                                    <i className="fa-solid fa-layer-group text-5xl text-slate-700 mb-6"></i>
                                    <h3 className="text-2xl font-serif text-white">Kinetic Strategy</h3>
                                    <p className="text-slate-400 text-sm mt-3 font-light">Ingresa tu API Key, elige modelo y genera tus activos.</p>
                                </div>
                            )}
                        </div>
                    </main>

                    <footer className="mt-20 py-8 border-t border-slate-800 text-center">
                        <div className="flex justify-center gap-8 text-xs font-black text-slate-500 uppercase tracking-widest">
                            <a href="https://threads.net/@aram7891" target="_blank" rel="noreferrer" className="hover:text-kinetic transition-colors"><i className="fa-brands fa-threads text-lg"></i> @aram7891</a>
                            <a href="https://instagram.com/selfloveclubusa" target="_blank" rel="noreferrer" className="hover:text-kinetic transition-colors"><i className="fa-brands fa-instagram text-lg"></i> @selfloveclubusa</a>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
