<script type="text/babel">
    const { useState, useEffect, useLayoutEffect, useRef } = React;

    const fetchWithRetry = async (url, options, maxRetries = 3) => {
        let retries = 0;
        while (retries < maxRetries) {
            try {
                const response = await fetch(url, options);
                if (response.ok) return await response.json();
                
                if (response.status === 400) throw new Error("API Key inválida o mal copiada. Revísala.");
                if (response.status === 403) throw new Error("Permiso denegado. Verifica tu API Key.");
                if (response.status === 404) throw new Error("Modelo no encontrado.");
                if (response.status === 429) {
                    const delay = Math.pow(2, retries) * 1000;
                    await new Promise(res => setTimeout(res, delay));
                    retries++;
                    continue;
                }
                throw new Error(`Error de servidor (${response.status}).`);
            } catch (err) {
                if (retries === maxRetries - 1) throw err;
                retries++;
            }
        }
    };

    const AutoFitContent = ({ children, isCenter }) => {
        const containerRef = useRef(null);
        const contentRef = useRef(null);
        const [scale, setScale] = useState(1);

        useLayoutEffect(() => {
            setScale(1);
        }, [children]);

        useLayoutEffect(() => {
            const container = containerRef.current;
            const content = contentRef.current;
            if (!container || !content) return;

            const measureAndScale = () => {
                const containerH = container.clientHeight;
                const contentH = content.scrollHeight;

                if (contentH > containerH && containerH > 0) {
                    const newScale = containerH / contentH;
                    setScale(newScale * 0.95); 
                }
            };
            
            requestAnimationFrame(measureAndScale);
        }, [children]);

        return (
            <div ref={containerRef} className={`w-full flex-1 min-h-0 flex flex-col ${isCenter ? 'items-center justify-center' : 'justify-center'} overflow-hidden`}>
                <div 
                    ref={contentRef} 
                    style={{ 
                        transform: `scale(${scale})`, 
                        transformOrigin: isCenter ? 'center center' : 'left center',
                        width: scale < 1 ? `${100 / scale}%` : '100%',
                    }} 
                    className={`flex flex-col gap-4 ${isCenter ? 'items-center text-center' : ''}`}
                >
                    {children}
                </div>
            </div>
        );
    };

                fontHeading: "font-cormorant italic font-bold tracking-wide",
                fontBody: "font-instrument",

                padding: "px-16 py-12"
            },
            Kinetic: {

        // MOTOR DE RENDERIZADO ELEGANTE
        const formatText = (text) => {
            if (!text) return null;
            return text.split('\n').map((line, i) => {
                if (!line.trim()) return <div key={i} className="h-3"></div>;

                const parts = line.split(/(\*\*.*?\*\*)/g);
                const formattedLine = parts.map((part, j) => {
                    if (part.startsWith('**') && part.endsWith('**')) {
                        return <strong key={j} className="font-bold opacity-100">{part.slice(2, -2)}</strong>;
                    }
                    return part;
                });

                if (/^[-•]|\d+\./.test(line.trim())) {
                    let cleanText = line.replace(/^[-•\d.]+\s*/, '');
                    const listParts = cleanText.split(/(\*\*.*?\*\*)/g).map((part, j) => {
                        if (part.startsWith('**') && part.endsWith('**')) {
                            return <strong key={j} className="font-bold opacity-100">{part.slice(2, -2)}</strong>;
                        }
                        return part;
                    });

                    return (
                        <div key={i} className="flex gap-4 my-2 pl-2">
                            <span className={`opacity-40 select-none ${stylesConfig[currentStyle].accent} w-1.5 h-1.5 rounded-full mt-2.5 flex-none`}></span>
                            <p className="leading-relaxed">{listParts}</p>
                        </div>
                    );
                }

                return <p key={i} className="mb-2 leading-relaxed">{formattedLine}</p>;
            });
        };

        const downloadAllAsZip = async () => {
            if (!slides) {
                alert("Primero genera el carrusel de 7 diapositivas.");
                return;
            }
            if (!window.htmlToImage) {
                alert("El exportador de imágenes aún está cargando. Espera unos segundos.");
                return;
            }

            setExporting(true);
            const zip = new JSZip();
            const originalSlide = currentSlide;

            try {
                for (let i = 0; i < slides.length; i++) {
                    setCurrentSlide(i);
                    await new Promise(resolve => setTimeout(resolve, 450));
                    const dataUrl = await window.htmlToImage.toJpeg(slideRef.current, { quality: 1, pixelRatio: 3 });
                    const res = await fetch(dataUrl);
                    const blob = await res.blob();
                    zip.file(`SLC-Slide-${slides[i].slideNumber}.jpg`, blob);
                }

                const content = await zip.generateAsync({type: "blob"});
                const link = document.createElement("a");
                link.href = URL.createObjectURL(content);
                link.download = "Presentacion_SelfLoveClub.zip";
                link.click();
            } catch (err) {
                console.error(err);
                alert("Hubo un problema al generar el ZIP. Inténtalo de nuevo.");
            } finally {
                setCurrentSlide(originalSlide);
                setExporting(false);
            }
        };

            if (!userApiKey.trim()) {
                alert("Primero pega tu API Key");
                return;
            }
            setListingModels(true);
            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models?key=${userApiKey.trim()}`;
                const data = await fetch(url).then(res => res.ok ? res.json() : { error: res.status });
                
                if (data.error) throw new Error("No se pudo obtener la lista");
                
                const modelNames = data.models ? data.models.map(m => m.name.replace("models/", "")) : ["No se encontraron modelos"];
                alert(`✅ Modelos disponibles para tu API Key:\n\n${modelNames.join("\n")}\n\n🔥 Recomendado: gemini-2.5-flash`);
            } catch (err) {
                alert("❌ Error al listar modelos: " + err.message);
            } finally {
                setListingModels(false);
            }
        };

        const generateCarousel = async () => {

            setError(null);
            setCurrentSlide(0);

            const url = `https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${userApiKey.trim()}`;

            const payload = {
                contents: [{
                    parts: [{
                        text: "Create EXACTLY 7 carousel slides for Self Love Club based on the following text.\n\nCRITICAL RULE: This must be a SINGLE CONTINUOUS NARRATIVE THREAD, not 7 independent ideas.\n\nFormatting rules:\n- NEVER output massive blocks of text\n- Use double line breaks to separate paragraphs\n- Use bullet points (•) for lists\n- Bold key terms using **term**\n\nRules:\n- Respond in the same language as input\n- Slide 1: Strong title and subtitle, leave body empty\n- Slides 2-6: NO title/subtitle, only body text continuing smoothly\n- Slide 7: Strong closing title and call to action\n\nReturn JSON format:\n{\n  slides: [\n    {\n      title: string,\n      subtitle: string,\n      body: string,\n      slideNumber: number\n    }\n  ]\n}\n\nInput text:\n" + essay
                    }]
                }],
                generationConfig: {
                    responseMimeType: "application/json"
                }
            };

            try {
                const data = await fetchWithRetry(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },

                const responseText = data.candidates?.[0]?.content?.parts?.[0]?.text;

                if (!parsed.slides || parsed.slides.length !== 7) {
                    throw new Error("No hay 7 slides.");

                setSlides(parsed.slides);
            } catch (err) {
                setError(err.message);
            } finally {
                setLoading(false);
            }
        };

        const polishSlide = async () => {
            if (!slides || !userApiKey.trim()) return;

            setPolishing(true);
            const currentData = slides[currentSlide];

            const url = `https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${userApiKey.trim()}`;

            const payload = {
                contents: [{
                    parts: [{
                        text: "Improve the wording of this specific slide while keeping the exact same language as the original.\nMaintain the continuous narrative flow (if it has no title, don't add one, just polish the body). Make it punchy and concise.\nCRITICAL FORMATTING: Use line breaks for paragraphs, (•) for lists, and (**text**) for bold definitions. DO NOT output a massive block of text.\n\n" + JSON.stringify(currentData) + "\n\nReturn JSON:\n{\n  title: string,\n  subtitle: string,\n  body: string\n}"

                const refined = JSON.parse(responseText);

                const newSlides = [...slides];
                newSlides[currentSlide] = {
                    ...currentData,
                    ...refined,
                    slideNumber: currentData.slideNumber
                };

                setSlides(newSlides);
            } catch (err) {
                console.error(err);
            } finally {
                setPolishing(false);
            }

            const fullText = slides.map(s => `${s.title || ''}. ${s.subtitle || ''} ${s.body || ''}`).join(' ');
            const utterance = new SpeechSynthesisUtterance(fullText);
            utterance.lang = 'es-ES'; 
            utterance.onend = () => setIsSpeaking(false);
            utterance.onerror = () => setIsSpeaking(false);
            window.speechSynthesis.speak(utterance);

            return () => { if ('speechSynthesis' in window) window.speechSynthesis.cancel(); };
        }, []);

            setExporting(true);
            try {
                const dataUrl = await window.htmlToImage.toJpeg(slideRef.current, { quality: 1, pixelRatio: 3 });
                const link = document.createElement('a');
                link.download = `SLC-Slide-${slides[currentSlide].slideNumber}.jpg`;
                link.href = dataUrl;
                link.click();
            } catch (err) {
                alert("Ocurrió un problema al descargar la imagen.");
            } finally {
                setExporting(false);
            }
        };

        return (
            <div className="min-h-screen bg-kineticDark text-slate-200 font-sans selection:bg-kinetic selection:text-white pb-20">

                        </div>
                        <img

                            className="w-11 h-11 rounded-full border-2 border-slate-700 shadow-md object-cover" 
                            onError={(e) => e.target.src="https://ui-avatars.com/api/?name=AR&background=a855f7&color=fff"}

                                    </div>
                                    <div className="flex items-center gap-2">
                                        <button onClick={exportAsJpg} disabled={exporting} className="bg-kinetic text-white px-5 py-2 rounded-xl font-bold text-xs flex items-center gap-2 hover:bg-purple-500">{exporting ? <i className="fa-solid fa-circle-notch fa-spin"></i> : <i className="fa-solid fa-download"></i>} JPG</button>
                                        <button onClick={downloadAllAsZip} disabled={exporting} className="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2 rounded-xl font-bold text-xs flex items-center gap-2">
                                            {exporting ? <i className="fa-solid fa-circle-notch fa-spin"></i> : <i className="fa-solid fa-file-zipper"></i>} ZIP (todas)
                                        </button>
                                    </div>
                                </div>

                                {/* ✅ LÁMINA EDITORIAL AUSTERO - MÁRGENES GENEROSOS, CERO DECORATIVOS */}
                                <div ref={slideRef} className={`w-[480px] h-[600px] ${stylesConfig[currentStyle].container} rounded-[40px] shadow-2xl flex flex-col ${stylesConfig[currentStyle].padding} relative overflow-hidden transition-all duration-500`} style={currentStyle === 'Brutalist' ? { borderRadius: '0px' } : {}}>
                                    
                                    {/* HEADER */}
                                    <div className="flex justify-between items-center z-10 flex-none">
                                        {slides[currentSlide].slideNumber === 7 ? (
                                            <span className={`text-[9px] uppercase tracking-[0.4em] opacity-40 ${stylesConfig[currentStyle].fontBody}`}>Clarity Strategist</span>
                                        ) : (
                                            <span className={`text-[9px] uppercase tracking-[0.4em] opacity-40 ${stylesConfig[currentStyle].fontBody}`}>Self Love Club</span>
                                        )}
                                        <div className={`w-2 h-2 rounded-full ${stylesConfig[currentStyle].accent}`}></div>
                                    </div>

                                    {/* CUERPO CENTRAL CON AUTO-ESCALADO */}
                                    <AutoFitContent isCenter={slides[currentSlide].slideNumber === 7}>
                                        <div className={`w-12 h-1 flex-none ${stylesConfig[currentStyle].accent} mb-4 ${slides[currentSlide].slideNumber === 7 ? 'mx-auto' : ''}`}></div>
                                        
                                        {slides[currentSlide].slideNumber === 1 ? (
                                            <>
                                                <h3 className={`text-4xl sm:text-5xl flex-none leading-[1.05] ${stylesConfig[currentStyle].fontHeading}`}>{slides[currentSlide].title}</h3>
                                                <p className={`text-lg sm:text-xl opacity-60 italic ${stylesConfig[currentStyle].fontBody}`}>{slides[currentSlide].subtitle}</p>
                                            </>
                                        ) : slides[currentSlide].slideNumber === 7 ? (
                                            <>
                                                <h3 className={`text-3xl sm:text-4xl flex-none ${stylesConfig[currentStyle].fontHeading}`}>{slides[currentSlide].title}</h3>
                                                {slides[currentSlide].body && (
                                                    <div className={`text-lg sm:text-xl opacity-80 max-w-[340px] ${stylesConfig[currentStyle].fontBody}`}>
                                                        {formatText(slides[currentSlide].body)}
                                                    </div>
                                                )}
                                            </>
                                        ) : (
                                            <>
                                                {slides[currentSlide].title && (
                                                    <h3 className={`text-2xl sm:text-3xl flex-none leading-tight ${stylesConfig[currentStyle].fontHeading}`}>{slides[currentSlide].title}</h3>
                                                )}
                                                <div className={`${slides[currentSlide].title ? 'text-base sm:text-lg' : 'text-xl sm:text-2xl'} opacity-90 ${stylesConfig[currentStyle].fontBody}`}>
                                                    {formatText(slides[currentSlide].body)}
                                                </div>
                                            </>
                                        )}
                                    </AutoFitContent>

                                    {/* FOOTER - DIFERENCIADO ENTRE MÓDULOS Y CIERRE */}
                                    <div className={`flex items-center justify-between border-t ${stylesConfig[currentStyle].border} pt-6 mt-auto flex-none z-10`}>
                                        {slides[currentSlide].slideNumber === 7 ? (
                                            // ✅ SLIDE 7: CARA PROMINENTE EN B&N
                                            <div className="flex items-center gap-4 flex-1">
                                                <img 
                                                    src="assets/images/andres-ramirez-portrait.jpg" 
                                                    className="w-16 h-16 rounded-none border-2 border-current object-cover grayscale-editorial" 
                                                    onError={(e) => e.target.src="https://ui-avatars.com/api/?name=AR&background=F7F4EF&color=1A1814"} 
                                                    alt="Andrés Ramírez" 
                                                />
                                                <div className="flex flex-col">
                                                    <span className={`text-sm font-bold tracking-wider uppercase ${stylesConfig[currentStyle].fontBody}`}>Andrés Ramírez</span>
                                                    <span className={`text-[10px] font-semibold opacity-60 uppercase tracking-widest ${stylesConfig[currentStyle].fontBody}`}>Clarity Strategist</span>
                                                </div>
                                            </div>
                                        ) : (
                                            // ✅ SLIDES 1-6: LOGO SLC DISCRETO EN B&N
                                            <div className="flex items-center gap-3">
                                                <img src="assets/images/slc-logo.png" className={`w-10 h-10 object-contain opacity-35 grayscale-editorial`} onError={(e) => e.target.src="https://ui-avatars.com/api/?name=SLC&background=F7F4EF&color=1A1814"} />
                                                <div className="flex flex-col">
                                                    <span className={`text-[9px] uppercase tracking-widest font-bold ${stylesConfig[currentStyle].fontBody}`}>Self Love Club</span>
                                                    <span className="text-[8px] font-semibold opacity-40 italic uppercase tracking-widest">Protocol</span>
                                                </div>
                                            </div>
                                        )}
                                        <div className={`px-4 py-1.5 rounded-full text-[8px] ${stylesConfig[currentStyle].tag}`}>0{slides[currentSlide].slideNumber}</div>
                                    </div>
                                </div>

                                <div className="flex items-center gap-6 bg-surface p-3 rounded-full border border-slate-800 shadow-xl">
                                    <button onClick={() => setCurrentSlide(p => Math.max(0, p - 1))} className="w-10 h-10 rounded-full bg-[#0b1121] flex items-center justify-center text-slate-400 hover:text-white disabled:opacity-30" disabled={currentSlide === 0}><i className="fa-solid fa-chevron-left"></i></button>
                                    <div className="flex gap-2">{slides.map((_, i) => (<div key={i} onClick={() => setCurrentSlide(i)} className={`h-1.5 rounded-full cursor-pointer ${currentSlide === i ? 'w-8 bg-kinetic' : 'w-2 bg-slate-600 hover:bg-slate-400'}`} />))}</div>
                                    <button onClick={() => setCurrentSlide(p => Math.min(6, p + 1))} className="w-10 h-10 rounded-full bg-[#0b1121] flex items-center justify-center text-slate-400 hover:text-white disabled:opacity-30" disabled={currentSlide === 6}><i className="fa-solid fa-chevron-right"></i></button>
                                </div>
                            </div>
                        ) : (
                            <div className="h-[600px] w-full max-w-[480px] flex flex-col justify-center items-center text-center p-12 border border-slate-800 rounded-[40px] bg-surface/50 relative overflow-hidden">
                                <i className="fa-solid fa-layer-group text-5xl text-slate-700 mb-6"></i>
                                <h3 className="text-2xl font-serif text-white">Kinetic Strategy</h3>
                                <p className="text-slate-400 text-sm mt-3 font-light">Ingresa tu API Key, elige modelo y genera tus activos.</p>
                            </div>
                        )}
                    </div>
                </main>
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
