<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Kinetic Clarity Engine — Clarity Strategist</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

  <style>
    .font-serif { font-family: 'Playfair Display', serif; }
    .font-sans { font-family: 'Inter', sans-serif; }
    /* Animación sutil para el motor */
    @keyframes pulse-soft {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    .engine-active { animation: pulse-soft 3s infinite; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans selection:bg-purple-200">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
  import React, { useState, useRef, useEffect } from 'https://esm.sh/react@18';
  import { createRoot } from 'https://esm.sh/react-dom@18/client';
  import { Sparkles, Loader2, Image as ImageIcon, Type, Send, ChevronLeft, ChevronRight, Key, Eye, EyeOff, AlertTriangle, Download, Film } from 'https://esm.sh/lucide-react@0.263';

  const MODEL_NAME = "gemini-2.0-pro-exp-02-05"; // El "pro" actual de Google
  const ANDRES_PHOTO_PROD = "/assets/images/andres-ramirez-portrait.jpg";
  const ANDRES_PHOTO_FALLBACK = "https://ui-avatars.com/api/?name=Andres+Ramirez&background=0f172a&color=fff&size=128";

  const BRAND = {
    PAPER: "#FAFAFA",
    INK: "#1A1A1A",
    SUBTLE: "#71717A",
    DIVIDER: "#E4E4E7",
    ACCENT: "#A67C52"
  };

  const VIDEO_BG_COLOR = "#0f172a";

  const App = () => {
    const [apiKey, setApiKey] = useState(localStorage.getItem('kinetic_api_key') || "");
    const [showKey, setShowKey] = useState(false);
    const [essay, setEssay] = useState("");
    const [loading, setLoading] = useState(false);
    const [slides, setSlides] = useState(null);
    const [currentSlide, setCurrentSlide] = useState(0);
    const [error, setError] = useState(null);
    const [exporting, setExporting] = useState(false);
    const [currentStyle, setCurrentStyle] = useState("Kinetic");
    const slideRef = useRef(null);

    useEffect(() => {
      if (apiKey) localStorage.setItem('kinetic_api_key', apiKey);
    }, [apiKey]);

    const stylesConfig = {
      Kinetic: {
        container: "bg-[#0f172a] text-[#f8fafc]",
        accent: "bg-[#a855f7]",
        textAccent: "text-[#a855f7]",
        border: "border-slate-800",
        fontHeading: "font-serif",
        fontBody: "font-sans",
        tag: "bg-[#a855f7] text-white"
      },
      ClarityWhite: {
        container: "bg-white text-slate-900",
        accent: "bg-blue-600",
        textAccent: "text-blue-600",
        border: "border-slate-100",
        fontHeading: "font-sans font-black",
        fontBody: "font-sans",
        tag: "bg-slate-900 text-white"
      },
      NoirGold: {
        container: "bg-[#050816] text-[#f9fafb]",
        accent: "bg-[#fbbf24]",
        textAccent: "text-[#fbbf24]",
        border: "border-[#111827]",
        fontHeading: "font-serif",
        fontBody: "font-sans",
        tag: "bg-[#fbbf24] text-black"
      }
    };

    const systemInstruction = `
Eres un estratega de contenido de élite para Andrés Ramírez (Clarity Strategist).
Transforma el texto del usuario en EXACTAMENTE 7 láminas de alto impacto visual para Instagram.

REGLAS:
1. Mantén el idioma original del texto.
2. Tono: Inspirador, sistémico, premium.
3. Slide 1: Título tipo Hook (máx 10 palabras) + subtítulo intrigante.
4. Slides 2-6: Desarrollo del concepto. 2-4 frases densas y valiosas.
5. Slides 2 y 6 deben incluir una imagen relevante (campo "image") usando URLs de Unsplash (ej: https://images.unsplash.com/photo-XXX?auto=format&fit=crop&w=800&q=80).
6. Slide 7: Cierre potente y directo con llamado a la acción.
7. Devuelve un JSON válido.
`;

    const generateCarousel = async () => {
      if (!essay.trim()) return;
      setLoading(true);
      setError(null);
      
      try {
        const response = await fetch(
          `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${apiKey.trim()}`,
          { 
            method: "POST", 
            headers: { "Content-Type": "application/json" }, 
            body: JSON.stringify({
              contents: [{ parts: [{ text: `Contenido:\n\n${essay}` }] }],
              systemInstruction: { parts: [{ text: systemInstruction }] },
              generationConfig: {
                responseMimeType: "application/json",
                responseSchema: {
                  type: "OBJECT",
                  properties: {
                    slides: {
                      type: "ARRAY",
                      items: {
                        type: "OBJECT",
                        properties: {
                          title: { type: "STRING" },
                          subtitle: { type: "STRING" },
                          body: { type: "STRING" },
                          image: { type: "STRING" },
                          slideNumber: { type: "NUMBER" }
                        },
                        required: ["title", "slideNumber"]
                      }
                    }
                  }
                }
              }
            }) 
          }
        );

        if (!response.ok) throw new Error("Error en la conexión con la API de Google.");
        
        const result = await response.json();
        const data = JSON.parse(result.candidates[0].content.parts[0].text);
        setSlides(data.slides);
        setCurrentSlide(0);
      } catch (e) {
        setError(e.message);
      } finally {
        setLoading(false);
      }
    };

    const exportAsJpg = async () => {
      if (!slideRef.current) return;
      setExporting(true);
      const { toJpeg } = await import('https://cdn.skypack.dev/html-to-image');
      const dataUrl = await toJpeg(slideRef.current, { quality: 0.95, pixelRatio: 3 });
      const link = document.createElement("a");
      link.download = `Clarity-Slide-${currentSlide + 1}.jpg`;
      link.href = dataUrl;
      link.click();
      setExporting(false);
    };

    const handleImageUpload = (file) => {
      if (!file || !slides) return;
      const reader = new FileReader();
      reader.onload = () => {
        const updated = [...slides];
        updated[currentSlide] = { ...updated[currentSlide], image: reader.result };
        setSlides(updated);
      };
      reader.readAsDataURL(file);
    };

    const currentTheme = stylesConfig[currentStyle];

    return (
      <div className="min-h-screen">
        <nav className="bg-white border-b border-slate-200 py-4 px-6 md:px-12 flex justify-between items-center sticky top-0 z-50 shadow-sm">
          <div className="flex items-center gap-3">
            <div className="bg-slate-900 p-2 rounded-xl">
              <Sparkles className="text-purple-400 w-5 h-5" />
            </div>
            <span className="font-black text-lg tracking-tighter uppercase">Kinetic Engine</span>
          </div>
          <div className="flex items-center gap-4">
            <div className="text-right hidden sm:block">
              <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Self Love Club</p>
              <p className="text-sm font-bold text-slate-800">Andrés Ramírez</p>
            </div>
            <img 
              src={ANDRES_PHOTO_PROD} 
              className="w-10 h-10 rounded-full border-2 border-slate-100 object-cover" 
              onError={(e)=>{e.target.onerror=null; e.target.src=ANDRES_PHOTO_FALLBACK}} 
              alt="Andrés Ramírez" 
            />
          </div>
        </nav>

        <main className="max-w-7xl mx-auto p-6 md:p-10 grid grid-cols-1 lg:grid-cols-12 gap-10">
          <div className="lg:col-span-5 space-y-6">
            <div className="bg-white p-5 rounded-3xl border border-slate-200 shadow-sm flex flex-col gap-3">
              <div className="flex items-center gap-2 text-slate-700">
                <Key className="w-4 h-4 text-purple-600" />
                <span className="text-xs font-bold uppercase tracking-widest text-slate-400">Configuración</span>
              </div>
              <div className="relative">
                <input 
                  type={showKey ? "text" : "password"} 
                  value={apiKey} 
                  onChange={(e) => setApiKey(e.target.value)} 
                  placeholder="API Key de Google..." 
                  className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-xs focus:ring-2 focus:ring-purple-500 outline-none font-mono" 
                />
                <button onClick={() => setShowKey(!showKey)} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400">
                  {showKey ? <EyeOff size={16}/> : <Eye size={16}/>}
                </button>
              </div>
            </div>

            <div className="bg-white p-8 rounded-[32px] border border-slate-100 shadow-xl">
              <h2 className="text-xl font-black mb-6 flex items-center gap-3"><Type className="text-blue-600" /> Contenido Maestro</h2>
              
              <div className="flex gap-2 mb-6">
                {Object.keys(stylesConfig).map(style => (
                  <button 
                    key={style} 
                    onClick={() => setCurrentStyle(style)} 
                    className={`flex-1 py-3 rounded-xl text-[10px] font-black transition-all border ${currentStyle === style ? "bg-slate-900 text-white border-slate-900" : "bg-slate-50 text-slate-400 hover:bg-slate-100"}`}
                  >
                    {style.toUpperCase()}
                  </button>
                ))}
              </div>

              <textarea 
                className="w-full h-80 p-6 bg-slate-50 border border-slate-200 rounded-2xl outline-none text-sm transition-all text-slate-700 mb-6" 
                placeholder="Pega tu ensayo o idea aquí, chamo..." 
                value={essay} 
                onChange={(e)=>setEssay(e.target.value)} 
              />

              <button 
                onClick={generateCarousel} 
                disabled={loading || !essay.trim()} 
                className="w-full py-5 bg-blue-600 text-white rounded-2xl font-black flex items-center justify-center gap-3 hover:bg-slate-900 transition-all disabled:opacity-50"
              >
                {loading ? <Loader2 className="animate-spin" /> : <Send size={18} />} 
                {loading ? "ESTRATIFICANDO..." : "GENERAR CARRUSEL"}
              </button>
            </div>
          </div>

          <div className="lg:col-span-7 flex flex-col items-center">
            {slides ? (
              <div className="w-full max-w-[480px] space-y-6">
                <div className="flex justify-between items-center bg-white p-3 rounded-2xl border border-slate-200 shadow-sm w-full">
                  <div className="flex items-center gap-1">
                    <button onClick={() => setCurrentSlide(s => Math.max(0, s - 1))} className="p-2 hover:bg-slate-100 rounded-lg"><ChevronLeft size={20}/></button>
                    <span className="text-[10px] font-black uppercase px-2 text-slate-500">{currentSlide + 1} / 7</span>
                    <button onClick={() => setCurrentSlide(s => Math.min(6, s + 1))} className="p-2 hover:bg-slate-100 rounded-lg"><ChevronRight size={20}/></button>
                  </div>
                  <div className="flex gap-2">
                    <button onClick={exportAsJpg} className="bg-purple-600 text-white px-4 py-2 rounded-xl font-bold text-[10px] flex items-center gap-2">
                      <Download size={14} /> JPG
                    </button>
                    <button className="bg-amber-500 text-white px-4 py-2 rounded-xl font-bold text-[10px] flex items-center gap-2 opacity-50 cursor-not-allowed">
                      <Film size={14} /> MP4 (Beta)
                    </button>
                  </div>
                </div>

                <div ref={slideRef} className={`w-[480px] h-[600px] ${currentTheme.container} rounded-[40px] shadow-2xl flex flex-col justify-between p-12 relative overflow-hidden transition-all duration-500`}>
                  <div className="flex justify-between items-center z-10">
                    <div className={`text-[9px] font-black tracking-[0.4em] uppercase opacity-40 ${currentTheme.fontBody}`}>Self Love Club</div>
                    <div className={`w-8 h-1 ${currentTheme.accent} rounded-full`} />
                  </div>

                  <div className="z-10 flex-1 flex flex-col justify-center">
                    {slides[currentSlide].image && (
                      <img src={slides[currentSlide].image} alt="" className="w-full h-44 object-cover rounded-2xl mb-8 shadow-lg" />
                    )}
                    <h3 className={`text-4xl leading-[1.1] font-black mb-4 ${currentTheme.fontHeading}`}>
                      {slides[currentSlide].title}
                    </h3>
                    <p className={`text-lg opacity-80 leading-relaxed font-medium ${currentTheme.fontBody}`}>
                      {slides[currentSlide].body || slides[currentSlide].subtitle}
                    </p>
                  </div>

                  <div className={`flex items-center justify-between border-t ${currentTheme.border} pt-6 z-10`}>
                    <div className="flex items-center gap-3">
                      <img 
                        src={ANDRES_PHOTO_PROD} 
                        className="w-10 h-10 rounded-full border border-white/10 object-cover" 
                        onError={(e)=>{e.target.onerror=null; e.target.src=ANDRES_PHOTO_FALLBACK}} 
                      />
                      <div>
                        <p className={`font-black text-[10px] uppercase tracking-tight ${currentTheme.fontBody}`}>Andrés Ramírez</p>
                        <p className={`text-[8px] font-bold opacity-40 uppercase ${currentTheme.fontBody}`}>Clarity Strategist</p>
                      </div>
                    </div>
                    <div className={`px-4 py-1.5 rounded-full text-[9px] font-black ${currentTheme.tag}`}>0{slides[currentSlide].slideNumber}</div>
                  </div>
                </div>

                <div className="bg-white p-4 rounded-2xl border border-slate-200">
                  <p className="text-[10px] font-bold text-slate-400 uppercase mb-2">Personalizar imagen</p>
                  <input type="file" accept="image/*" onChange={(e) => handleImageUpload(e.target.files[0])} className="text-xs file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-[10px] file:font-black file:bg-slate-100 file:text-slate-600 hover:file:bg-slate-200 cursor-pointer" />
                </div>
              </div>
            ) : (
              <div className="w-full max-w-[480px] aspect-[4/5] bg-white border-4 border-dashed border-slate-200 rounded-[40px] flex flex-col items-center justify-center text-slate-300 p-10 text-center">
                <div className="bg-slate-50 p-8 rounded-full mb-4">
                  <Sparkles size={40} className="text-slate-200" />
                </div>
                <p className="font-bold uppercase tracking-widest text-xs">Esperando combustible...</p>
              </div>
            )}
          </div>
        </main>

        <footer className="py-12 text-center">
          <div className="flex flex-col items-center gap-4">
            <img 
              src={ANDRES_PHOTO_PROD} 
              className="w-8 h-8 rounded-full grayscale opacity-50" 
              onError={(e)=>{e.target.onerror=null; e.target.src=ANDRES_PHOTO_FALLBACK}} 
            />
            <div className="flex gap-4 text-[10px] font-black tracking-widest text-slate-400 uppercase">
              <a href="https://threads.net/@aram7891" target="_blank">Threads</a>
              <span>•</span>
              <a href="https://instagram.com/selfloveclubusa" target="_blank">Instagram</a>
            </div>
          </div>
        </footer>
      </div>
    );
  };

  const root = createRoot(document.getElementById('root'));
  root.render(<App />);
  </script>
</body>
</html>
