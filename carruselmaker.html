<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Kinetic Clarity Engine — Clarity Strategist</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

  <style>
    .font-serif { font-family: 'Playfair Display', serif; }
    .font-sans { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans selection:bg-purple-200">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
  import React, { useState, useRef, useEffect } from 'https://esm.sh/react@18';
  import { createRoot } from 'https://esm.sh/react-dom@18/client';
  import { Sparkles, Loader2, Image as ImageIcon, Type, Send, ChevronLeft, ChevronRight, Key, Eye, EyeOff, AlertTriangle, Video } from 'https://esm.sh/lucide-react@0.263';

  const MODEL_NAME = "gemini-2.5-pro";
  const ANDRES_PHOTO_PROD = "/assets/images/andres-ramirez-portrait.jpg";
  const ANDRES_PHOTO_FALLBACK = "https://ui-avatars.com/api/?name=Andres+Ramirez&background=0f172a&color=fff&size=128";

  // Galería curada de Unsplash (Minimalista, Negocios, Claridad) - No requiere API Key
  const UNSPLASH_GALLERY = [
    "https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=600&auto=format&fit=crop",
    "https://images.unsplash.com/photo-1507608616759-54f48f0af0ee?q=80&w=600&auto=format&fit=crop",
    "https://images.unsplash.com/photo-1497215728101-856f4ea42174?q=80&w=600&auto=format&fit=crop",
    "https://images.unsplash.com/photo-1513694203232-719a280e022f?q=80&w=600&auto=format&fit=crop",
    "https://images.unsplash.com/photo-1499750310107-5fef28a66643?q=80&w=600&auto=format&fit=crop",
    "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=600&auto=format&fit=crop",
    "https://images.unsplash.com/photo-1500462918059-b1a0cb512f1d?q=80&w=600&auto=format&fit=crop",
    "https://images.unsplash.com/photo-1459156212016-c812468e2115?q=80&w=600&auto=format&fit=crop"
  ];

  const getRandomImage = () => UNSPLASH_GALLERY[Math.floor(Math.random() * UNSPLASH_GALLERY.length)];

  const App = () => {
    const [apiKey, setApiKey] = useState(localStorage.getItem('kinetic_api_key') || "");
    const [showKey, setShowKey] = useState(false);
    const [essay, setEssay] = useState("");
    const [loading, setLoading] = useState(false);
    const [slides, setSlides] = useState(null);
    const [currentSlide, setCurrentSlide] = useState(0);
    const [error, setError] = useState(null);
    const [exporting, setExporting] = useState(false);
    const [exportProgress, setExportProgress] = useState("");
    const [currentStyle, setCurrentStyle] = useState("Kinetic");
    const slideRef = useRef(null);

    useEffect(() => { if (apiKey) localStorage.setItem('kinetic_api_key', apiKey); }, [apiKey]);

    // Estilos RADICALMENTE diferenciados
    const stylesConfig = {
      Kinetic: { 
        container: "bg-zinc-50 text-zinc-900", // Ahora es CLARO y moderno
        accent: "bg-purple-600", 
        border: "border-zinc-200", 
        fontHeading: "font-sans font-black tracking-tighter uppercase", 
        fontBody: "font-sans text-zinc-700 font-medium", 
        tag: "bg-purple-600 text-white font-bold rounded-none" 
      },
      ClarityWhite: { 
        container: "bg-white text-slate-900", 
        accent: "bg-blue-600", 
        border: "border-slate-200", 
        fontHeading: "font-sans font-black tracking-tight", 
        fontBody: "font-sans text-slate-600 font-medium", 
        tag: "bg-blue-600 text-white font-bold rounded-none" 
      },
      NoirGold: { 
        container: "bg-black text-[#fdfbf7]", // OSCURO puro con Oro
        accent: "bg-[#d4af37]", 
        border: "border-[#333333]", 
        fontHeading: "font-serif font-bold", 
        fontBody: "font-serif text-[#cccccc] italic", 
        tag: "bg-[#d4af37] text-black font-bold rounded-none" 
      }
    };

    const generateCarousel = async () => {
      if (!essay.trim() || !apiKey.trim()) {
        setError("Por favor ingresa tu API Key y el contenido");
        return;
      }
      setLoading(true);
      setError(null);

      // Instrucciones estrictas sobre la ESTRUCTURA: Solo láminas 2 y 6 son tipo 'image'
      const systemInstruction = `Eres un estratega de contenido para Andrés Ramírez. Crea EXACTAMENTE 7 láminas para un carrusel a partir del texto del usuario. 
      Devuelve SOLO un JSON válido con esta estructura exacta y estricta:
      {"slides": [
        {"type": "text", "title": "Título impactante", "body": "Subtítulo corto", "slideNumber": 1},
        {"type": "image", "title": "Título", "body": "Texto principal (MÁXIMO 20 palabras)", "slideNumber": 2},
        {"type": "text", "title": "Título", "body": "Texto principal (MÁXIMO 25 palabras)", "slideNumber": 3},
        {"type": "text", "title": "Título", "body": "Texto principal (MÁXIMO 25 palabras)", "slideNumber": 4},
        {"type": "text", "title": "Título", "body": "Texto principal (MÁXIMO 25 palabras)", "slideNumber": 5},
        {"type": "image", "title": "Título", "body": "Texto principal (MÁXIMO 20 palabras)", "slideNumber": 6},
        {"type": "text", "title": "Conclusión", "body": "Llamado a la acción (MÁXIMO 20 palabras)", "slideNumber": 7}
      ]}`;

      try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${apiKey.trim()}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contents: [{ parts: [{ text: essay }] }],
            systemInstruction: { parts: [{ text: systemInstruction }] },
            generationConfig: { responseMimeType: "application/json", temperature: 0.5 }
          })
        });

        const result = await response.json();
        if (result.error) throw new Error(result.error.message);

        let rawText = result.candidates[0].content.parts[0].text;
        rawText = rawText.replace(/```json/g, '').replace(/```/g, '');
        
        const data = JSON.parse(rawText);
        if (!data.slides || data.slides.length !== 7) throw new Error("No se generaron 7 slides correctamente.");

        // Inyectar imágenes estéticas de Unsplash automáticamente SOLO donde type === 'image'
        const slidesWithImages = data.slides.map(slide => {
          if (slide.type === 'image') {
            return { ...slide, image: getRandomImage() };
          }
          return slide; // Las láminas de texto no llevan imagen
        });

        setSlides(slidesWithImages);
        setCurrentSlide(0);
      } catch (e) {
        setError(e.message || "Error procesando el contenido.");
      } finally {
        setLoading(false);
      }
    };

    const exportAsJpg = async () => {
      if (!slideRef.current || !slides) return;
      setExporting(true);
      try {
        const { toJpeg } = await import('https://cdn.skypack.dev/html-to-image');
        const dataUrl = await toJpeg(slideRef.current, { quality: 0.95, pixelRatio: 3 });
        const link = document.createElement("a");
        link.download = `Clarity-Slide-${currentSlide + 1}.jpg`;
        link.href = dataUrl;
        link.click();
      } catch (e) { alert("Error exportando JPG"); }
      finally { setExporting(false); }
    };

    const exportAllSlides = async () => {
      if (!slides) return;
      setExporting(true);
      setExportProgress("Generando ZIP...");
      try {
        const { toJpeg } = await import('https://cdn.skypack.dev/html-to-image');
        const zip = new JSZip();
        for (let i = 0; i < slides.length; i++) {
          setCurrentSlide(i);
          await new Promise(r => setTimeout(r, 600)); 
          const dataUrl = await toJpeg(slideRef.current, { quality: 0.95, pixelRatio: 3 });
          zip.file(`slide-${i+1}.jpg`, dataUrl.split(",")[1], { base64: true });
        }
        const blob = await zip.generateAsync({ type: "blob" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "Carrusel-Clarity.zip";
        link.click();
      } catch (e) { alert("Error creando ZIP"); }
      finally { 
        setExporting(false); 
        setExportProgress("");
      }
    };

    const exportVideo = async () => {
      if (!slides || !slideRef.current) return alert("Genera primero el carrusel");
      setExporting(true);
      
      try {
        const { toCanvas } = await import('https://cdn.skypack.dev/html-to-image');
        
        const recordCanvas = document.createElement('canvas');
        recordCanvas.width = slideRef.current.offsetWidth * 2;
        recordCanvas.height = slideRef.current.offsetHeight * 2;
        const ctx = recordCanvas.getContext('2d');

        const stream = recordCanvas.captureStream(30);
        const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
        const chunks = [];
        recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };

        const exportPromise = new Promise((resolve) => {
          recorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Clarity-Carousel-Video.webm`;
            a.click();
            resolve();
          };
        });

        recorder.start();

        for (let i = 0; i < slides.length; i++) {
          setCurrentSlide(i);
          setExportProgress(`Grabando lámina ${i + 1} de ${slides.length}...`);
          
          await new Promise(r => setTimeout(r, 1000));
          const frameCanvas = await toCanvas(slideRef.current, { pixelRatio: 2 });

          for (let f = 0; f < 100; f++) {
            ctx.drawImage(frameCanvas, 0, 0);
            await new Promise(r => setTimeout(r, 33)); 
          }
        }

        setExportProgress("Finalizando video...");
        recorder.stop();
        await exportPromise;

      } catch (e) {
        console.error(e);
        alert("Ocurrió un error al generar el video. Intenta nuevamente.");
      } finally {
        setExporting(false);
        setExportProgress("");
      }
    };

    const handleImageUpload = (file) => {
      if (!file || !slides) return;
      const reader = new FileReader();
      reader.onload = () => {
        const updated = [...slides];
        updated[currentSlide] = {...updated[currentSlide], image: reader.result};
        setSlides(updated);
      };
      reader.readAsDataURL(file);
    };

    const currentTheme = stylesConfig[currentStyle];
    const currentSlideData = slides ? slides[currentSlide] : null;

    return (
      <div className="min-h-screen">
        <nav className="bg-white border-b border-slate-200 py-4 px-6 flex justify-between items-center sticky top-0 z-50 shadow-sm">
          <div className="flex items-center gap-3">
            <div className="bg-slate-900 p-2 rounded-xl"><Sparkles className="text-purple-400 w-5 h-5" /></div>
            <span className="font-black text-lg tracking-tighter uppercase">Kinetic Engine</span>
          </div>
          <div className="flex items-center gap-4">
            <div className="text-right hidden sm:block">
              <p className="text-xs font-bold text-slate-800">Andrés Ramírez</p>
              <p className="text-[10px] text-slate-500">Clarity Strategist</p>
            </div>
            <img src={ANDRES_PHOTO_PROD} className="w-10 h-10 rounded-full border-2 border-slate-100 object-cover" onError={e => e.target.src = ANDRES_PHOTO_FALLBACK} alt="Andres Ramirez" />
          </div>
        </nav>

        <main className="max-w-7xl mx-auto p-6 md:p-10 grid grid-cols-1 lg:grid-cols-12 gap-10">
          {/* Panel Izquierdo */}
          <div className="lg:col-span-5 space-y-6">
            <div className="bg-white p-5 rounded-3xl border border-slate-200 shadow-sm">
              <Key className="w-4 h-4 text-purple-600 mb-2" />
              <div className="relative">
                <input type={showKey ? "text" : "password"} value={apiKey} onChange={e => setApiKey(e.target.value)} placeholder="Pega tu Gemini API Key" className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-mono" />
                <button onClick={() => setShowKey(!showKey)} className="absolute right-4 top-4 text-slate-400">{showKey ? <EyeOff size={18}/> : <Eye size={18}/>}</button>
              </div>
            </div>

            <div className="bg-white p-8 rounded-[32px] border border-slate-100 shadow-xl">
              <div className="flex gap-2 mb-6">
                {Object.keys(stylesConfig).map(s => (
                  <button key={s} onClick={() => setCurrentStyle(s)} className={`flex-1 py-3 rounded-xl text-xs font-black transition-all ${currentStyle === s ? "bg-slate-900 text-white shadow-md" : "bg-slate-100 text-slate-600 hover:bg-slate-200"}`}>{s}</button>
                ))}
              </div>
              <textarea className="w-full h-80 p-6 bg-slate-50 border border-slate-200 rounded-2xl text-sm leading-relaxed" value={essay} onChange={e => setEssay(e.target.value)} placeholder="Pega el contenido para las láminas aquí..." />
              <button onClick={generateCarousel} disabled={loading || !essay} className="w-full mt-6 py-5 bg-blue-600 hover:bg-blue-700 transition-colors text-white rounded-2xl font-black flex items-center justify-center gap-3 disabled:opacity-50">
                {loading ? <Loader2 className="animate-spin w-5 h-5" /> : "GENERAR CARRUSEL (IA)"}
              </button>
              {error && <p className="text-red-600 mt-4 text-sm font-medium">{error}</p>}
            </div>
          </div>

          {/* Panel de Vista Previa */}
          <div className="lg:col-span-7 flex flex-col items-center">
            {slides ? (
              <div className="w-full max-w-[480px] space-y-6">
                
                <div className="flex flex-col gap-4 bg-white p-5 rounded-3xl border border-slate-200 shadow-sm">
                  <div className="flex items-center justify-between">
                    <div className="flex items-center gap-2 bg-slate-100 rounded-xl px-2 py-1">
                      <button onClick={() => setCurrentSlide(s => Math.max(0,s-1))} disabled={exporting} className="p-2 hover:bg-white rounded-lg disabled:opacity-30"><ChevronLeft size={20}/></button>
                      <span className="font-black text-sm px-2">{currentSlide+1} / 7</span>
                      <button onClick={() => setCurrentSlide(s => Math.min(6,s+1))} disabled={exporting} className="p-2 hover:bg-white rounded-lg disabled:opacity-30"><ChevronRight size={20}/></button>
                    </div>
                    
                    <div className="flex gap-2">
                       <button onClick={exportAsJpg} disabled={exporting} className="bg-slate-900 text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-slate-800 disabled:opacity-50">JPG</button>
                       <button onClick={exportAllSlides} disabled={exporting} className="bg-slate-900 text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-slate-800 disabled:opacity-50">ZIP</button>
                    </div>
                  </div>

                  <button onClick={exportVideo} disabled={exporting} className="w-full bg-purple-600 hover:bg-purple-700 text-white px-5 py-3 rounded-xl text-sm font-bold flex items-center justify-center gap-2 disabled:opacity-50 transition-colors">
                    {exporting ? <Loader2 className="animate-spin w-4 h-4" /> : <Video className="w-4 h-4" />}
                    {exportProgress || "EXPORTAR COMO VIDEO (WEBM)"}
                  </button>
                </div>

                {/* CONTENEDOR DE LA LÁMINA */}
                <div ref={slideRef} className={`w-[480px] h-[600px] ${currentTheme.container} border ${currentTheme.border} shadow-2xl p-8 flex flex-col relative overflow-hidden transition-colors duration-300`}>
                  
                  {/* Header (Fijo) */}
                  <div className="flex justify-between items-center z-10 w-full shrink-0 h-6">
                    <div className="text-[10px] font-black tracking-widest opacity-50 uppercase">Self Love Club</div>
                    <div className={`w-10 h-1.5 ${currentTheme.accent}`} />
                  </div>

                  {/* Contenido Dinámico (Solo muestra imagen si es tipo 'image') */}
                  <div className="flex-1 flex flex-col items-center justify-center text-center gap-6 my-4 w-full px-4">
                    
                    {currentSlideData.type === 'image' && currentSlideData.image && (
                      <img 
                        src={currentSlideData.image} 
                        crossOrigin="anonymous" 
                        /* 100% Cuadrada. Sin bordes redondeados. */
                        className="w-64 h-64 aspect-square object-cover rounded-none shrink-0 border border-slate-500/20" 
                        alt="Slide visual"
                      />
                    )}

                    <div className="flex flex-col gap-3 w-full">
                      <h3 className={`leading-[1.1] ${currentTheme.fontHeading} ${currentSlideData.type === 'image' ? 'text-[28px]' : 'text-[38px]'}`}>
                        {currentSlideData.title}
                      </h3>
                      <p className={`opacity-90 ${currentTheme.fontBody} leading-snug mx-auto ${currentSlideData.type === 'image' ? 'text-[15px] max-w-[90%]' : 'text-[18px] max-w-[100%]'}`}>
                        {currentSlideData.body}
                      </p>
                    </div>

                  </div>

                  {/* Footer (Fijo) */}
                  <div className={`flex justify-between items-center border-t ${currentTheme.border} pt-4 w-full shrink-0 h-14`}>
                    <div className="flex items-center gap-3 text-left">
                      <img src={ANDRES_PHOTO_PROD} className="w-10 h-10 rounded-full object-cover shrink-0" onError={e => e.target.src = ANDRES_PHOTO_FALLBACK} alt="Andres Ramirez" />
                      <div className="flex flex-col justify-center">
                        <p className="font-bold text-[13px] leading-tight mb-0.5">Andrés Ramírez</p>
                        <p className="text-[9px] font-semibold opacity-70 tracking-wide">IG: @selfloveclubusa | TH: @aram7891</p>
                      </div>
                    </div>
                    <div className={`px-4 py-1.5 text-xs font-black tracking-widest ${currentTheme.tag}`}>
                      0{currentSlideData.slideNumber}
                    </div>
                  </div>
                </div>

                {/* Opción de sobrescribir la imagen si al usuario no le gusta la que eligió Unsplash */}
                {currentSlideData.type === 'image' && (
                  <div className="flex items-center justify-center gap-2 text-sm text-slate-500">
                    <ImageIcon className="w-4 h-4" />
                    <span>Cambiar esta imagen:</span>
                    <input type="file" accept="image/*" onChange={e => handleImageUpload(e.target.files[0])} className="text-xs file:mr-4 file:py-1 file:px-3 file:rounded-none file:border file:border-slate-300 file:text-xs file:font-semibold file:bg-white file:text-slate-700 hover:file:bg-slate-50 cursor-pointer" />
                  </div>
                )}
              </div>
            ) : (
              <div className="w-[480px] h-[600px] border-4 border-dashed border-slate-300 rounded-[40px] flex flex-col items-center justify-center text-slate-400 gap-4 bg-slate-50">
                <Sparkles className="w-12 h-12 text-slate-300" />
                <p className="font-medium text-sm text-center px-10">Motor calibrado.<br/>Láminas 2 y 6 con fotos reales.<br/>Pega tu contenido y genera.</p>
              </div>
            )}
          </div>
        </main>
      </div>
    );
  };

  const root = createRoot(document.getElementById('root'));
  root.render(<App />);
  </script>
</body>
</html>
