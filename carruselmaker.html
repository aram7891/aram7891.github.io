<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Kinetic Clarity Engine — Clarity Strategist</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

  <style>
    .font-serif { font-family: 'Playfair Display', serif; }
    .font-sans { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans selection:bg-purple-200">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
  import React, { useState, useRef, useEffect } from 'https://esm.sh/react@18';
  import { createRoot } from 'https://esm.sh/react-dom@18/client';
  import { Sparkles, Loader2, Image as ImageIcon, Type, Send, ChevronLeft, ChevronRight, Key, Eye, EyeOff, AlertTriangle } from 'https://esm.sh/lucide-react@0.263';

  // ==================== CONFIG ====================
  const MODEL_NAME = "gemini-2.5-pro"; // Mejorado
  const ANDRES_PHOTO_PROD = "/assets/images/andres-ramirez-portrait.jpg";
  const ANDRES_PHOTO_FALLBACK = "https://ui-avatars.com/api/?name=Andres+Ramirez&background=0f172a&color=fff&size=128";

  const BRAND = {
    PAPER: "#FAFAFA",
    INK: "#1A1A1A",
    SUBTLE: "#71717A",
    DIVIDER: "#E4E4E7",
    ACCENT: "#A67C52"
  };

  const VIDEO_BG_COLOR = BRAND.INK;

  const App = () => {
    const [apiKey, setApiKey] = useState(localStorage.getItem('kinetic_api_key') || "");
    const [showKey, setShowKey] = useState(false);
    const [essay, setEssay] = useState("");
    const [loading, setLoading] = useState(false);
    const [slides, setSlides] = useState(null);
    const [currentSlide, setCurrentSlide] = useState(0);
    const [error, setError] = useState(null);
    const [exporting, setExporting] = useState(false);
    const [currentStyle, setCurrentStyle] = useState("Kinetic");
    const slideRef = useRef(null);

    useEffect(() => {
      if (apiKey) localStorage.setItem('kinetic_api_key', apiKey);
    }, [apiKey]);

    const handleKeyChange = (e) => setApiKey(e.target.value);

    const stylesConfig = {
      Kinetic: {
        container: "bg-[#0f172a] text-[#f8fafc]",
        accent: "bg-[#a855f7]",
        textAccent: "text-[#a855f7]",
        border: "border-slate-800",
        fontHeading: "font-serif",
        fontBody: "font-sans",
        tag: "bg-[#a855f7] text-white",
        logoInvert: "invert brightness-150"
      },
      ClarityWhite: {
        container: "bg-white text-slate-900",
        accent: "bg-blue-600",
        textAccent: "text-blue-600",
        border: "border-slate-100",
        fontHeading: "font-sans font-black",
        fontBody: "font-sans",
        tag: "bg-slate-900 text-white",
        logoInvert: ""
      },
      NoirGold: {
        container: "bg-[#050816] text-[#f9fafb]",
        accent: "bg-[#fbbf24]",
        textAccent: "text-[#fbbf24]",
        border: "border-[#111827]",
        fontHeading: "font-serif",
        fontBody: "font-sans",
        tag: "bg-[#fbbf24] text-black",
        logoInvert: "invert brightness-200"
      }
    };

    const systemInstruction = `
Eres un estratega de contenido de élite para Andrés Ramírez (Clarity Strategist).
Transforma el texto del usuario en EXACTAMENTE 7 láminas de alto impacto visual para Instagram.

REGLAS:
1. Mantén el idioma original del texto.
2. Tono: Inspirador, sistémico, premium.
3. Slide 1: Título tipo Hook (máx 10 palabras) + subtítulo intrigante.
4. Slides 2-6: Desarrollo del concepto. 2-4 frases densas y valiosas.
5. Slides 2 y 6 deben incluir una imagen relevante (campo "image") con URL pública.
6. Slide 7: Cierre potente y directo.
7. Devuelve un JSON válido.
`;

    const generateCarousel = async () => {
      if (!essay.trim()) return;
      setLoading(true);
      setError(null);
      const cleanApiKey = apiKey.trim();
      if (!cleanApiKey) {
        setError("Chamo, necesitas ingresar tu API Key arriba.");
        setLoading(false);
        return;
      }

      const payload = {
        contents: [{ parts: [{ text: `Contenido:\n\n${essay}` }] }],
        systemInstruction: { parts: [{ text: systemInstruction }] },
        generationConfig: {
          responseMimeType: "application/json",
          responseSchema: {
            type: "OBJECT",
            properties: {
              slides: {
                type: "ARRAY",
                items: {
                  type: "OBJECT",
                  properties: {
                    title: { type: "STRING" },
                    subtitle: { type: "STRING" },
                    body: { type: "STRING" },
                    image: { type: "STRING" },
                    slideNumber: { type: "NUMBER" }
                  },
                  required: ["title", "slideNumber"]
                }
              }
            }
          }
        }
      };

      try {
        const response = await fetch(
          `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${cleanApiKey}`,
          { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) }
        );

        if (response.ok) {
          const result = await response.json();
          const data = JSON.parse(result.candidates[0].content.parts[0].text);
          if (Array.isArray(data.slides) && data.slides.length === 7) {
            setSlides(data.slides);
            setCurrentSlide(0);
          } else {
            setError("El modelo no devolvió 7 slides. Intenta de nuevo.");
          }
        } else {
          const err = await response.json().catch(() => ({}));
          throw new Error(err.error?.message || `Error ${response.status}`);
        }
      } catch (e) {
        setError(`Google dice: "${e.message}"`);
      } finally {
        setLoading(false);
      }
    };

    // ==================== TUS FUNCIONES ORIGINALES (sin cambios) ====================
    const exportAsJpg = async () => {
      if (!slideRef.current || !slides) return;
      setExporting(true);
      try {
        const { toJpeg } = await import('https://cdn.skypack.dev/html-to-image');
        const dataUrl = await toJpeg(slideRef.current, {
          quality: 0.95,
          pixelRatio: 3,
          backgroundColor: currentStyle === "ClarityWhite" ? BRAND.PAPER : VIDEO_BG_COLOR
        });
        const link = document.createElement("a");
        link.download = `Clarity-Slide-${slides[currentSlide].slideNumber}.jpg`;
        link.href = dataUrl;
        link.click();
      } catch (e) {
        alert("Error exportando JPG.");
      } finally {
        setExporting(false);
      }
    };

    const exportAllSlides = async () => {
      if (!slides || !slides.length) return;
      setExporting(true);
      try {
        const { toJpeg } = await import('https://cdn.skypack.dev/html-to-image');
        const zip = new JSZip();
        for (let i = 0; i < slides.length; i++) {
          setCurrentSlide(i);
          await new Promise(r => setTimeout(r, 350));
          const dataUrl = await toJpeg(slideRef.current, {
            quality: 0.95,
            pixelRatio: 3,
            backgroundColor: currentStyle === "ClarityWhite" ? BRAND.PAPER : VIDEO_BG_COLOR
          });
          zip.file(`slide-${i + 1}.jpg`, dataUrl.split(",")[1], { base64: true });
        }
        const blob = await zip.generateAsync({ type: "blob" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "Carrusel-Clarity.zip";
        link.click();
      } catch (e) {
        alert("Error exportando ZIP.");
      } finally {
        setExporting(false);
      }
    };

    // ==================== VIDEO EXPORT (completo como tenías) ====================
    const drawSlideFrame = (ctx, canvasW, canvasH, slideObj, progress, direction, bgColor) => {
      ctx.fillStyle = bgColor;
      ctx.fillRect(0, 0, canvasW, canvasH);

      const padding = Math.round(canvasW * 0.08);
      const contentW = canvasW - padding * 2;
      const contentH = canvasH - padding * 2;

      const easeOut = (t) => 1 - Math.pow(1 - t, 3);
      const slideProgress = easeOut(Math.min(Math.max(progress, 0), 1));
      const offsetX = direction * (1 - slideProgress) * (canvasW * 0.6);

      const cardX = padding + offsetX;
      const cardY = padding;
      const imageHeight = Math.round(contentH * 0.45);

      if (slideObj.image) {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.src = slideObj.image;
        if (img.complete && img.naturalWidth) {
          ctx.save();
          const r = 20;
          ctx.beginPath();
          ctx.roundRect(cardX, cardY, contentW, imageHeight, r);
          ctx.clip();
          ctx.drawImage(img, cardX, cardY, contentW, imageHeight);
          ctx.restore();
        } else {
          ctx.fillStyle = "#A67C5230";
          ctx.fillRect(cardX, cardY, contentW, imageHeight);
        }
      }

      let textY = cardY + imageHeight + 40;
      ctx.fillStyle = "#FAFAFA";
      ctx.font = `bold ${Math.round(canvasW * 0.06)}px Playfair Display, serif`;
      wrapText(ctx, slideObj.title || "", cardX + 30, textY, contentW - 60, Math.round(canvasW * 0.08));
      textY += 90;

      ctx.fillStyle = "#FAFAFAEE";
      ctx.font = `600 ${Math.round(canvasW * 0.035)}px Inter, sans-serif`;
      wrapText(ctx, slideObj.body || slideObj.subtitle || "", cardX + 30, textY, contentW - 60, Math.round(canvasW * 0.055));
    };

    const wrapText = (ctx, text, x, y, maxWidth, lineHeight) => {
      if (!text) return;
      const words = text.split(' ');
      let line = '';
      for (let n = 0; n < words.length; n++) {
        const testLine = line + words[n] + ' ';
        const metrics = ctx.measureText(testLine);
        if (metrics.width > maxWidth && n > 0) {
          ctx.fillText(line, x, y);
          line = words[n] + ' ';
          y += lineHeight;
        } else {
          line = testLine;
        }
      }
      ctx.fillText(line, x, y);
    };

    const exportVideo = async (mode = 'vertical') => {
      if (!slides || !slides.length) {
        alert("Genera el carrusel primero.");
        return;
      }
      setExporting(true);
      try {
        const { createFFmpeg, fetchFile } = await import('https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.11.8/dist/ffmpeg.min.mjs');
        const ffmpeg = createFFmpeg({ log: true });
        await ffmpeg.load();

        const canvasW = 1080;
        const canvasH = mode === 'vertical' ? 1920 : 1080;
        const canvas = document.createElement('canvas');
        canvas.width = canvasW;
        canvas.height = canvasH;
        const ctx = canvas.getContext('2d');

        const fps = 30;
        const slideDuration = 1.4;
        const totalFramesPerSlide = Math.round(slideDuration * fps);

        const preloadPromises = slides.map(s => {
          return new Promise(res => {
            if (!s.image) return res();
            const img = new Image();
            img.crossOrigin = "anonymous";
            img.onload = res;
            img.onerror = res;
            img.src = s.image;
          });
        });
        await Promise.all(preloadPromises);

        for (let i = 0; i < slides.length; i++) {
          const slide = slides[i];
          const direction = i % 2 === 0 ? -1 : 1;
          for (let f = 0; f < totalFramesPerSlide; f++) {
            const progress = f / (totalFramesPerSlide - 1);
            drawSlideFrame(ctx, canvasW, canvasH, slide, progress, direction, VIDEO_BG_COLOR);
            const dataUrl = canvas.toDataURL('image/png');
            const binary = atob(dataUrl.split(',')[1]);
            const array = new Uint8Array(binary.length);
            for (let j = 0; j < binary.length; j++) array[j] = binary.charCodeAt(j);
            await ffmpeg.FS('writeFile', `frame_${String(i*totalFramesPerSlide + f).padStart(5,'0')}.png`, array);
          }
        }

        await ffmpeg.run('-framerate', String(fps), '-i', 'frame_%05d.png', '-c:v', 'libx264', '-pix_fmt', 'yuv420p', '-crf', '18', 'out.mp4');

        const data = ffmpeg.FS('readFile', 'out.mp4');
        const videoBlob = new Blob([data.buffer], { type: 'video/mp4' });
        const url = URL.createObjectURL(videoBlob);
        const a = document.createElement('a');
        a.href = url;
        a.download = mode === 'vertical' ? 'carrusel_vertical.mp4' : 'carrusel_cuadrado.mp4';
        a.click();
      } catch (e) {
        console.error(e);
        alert("Error generando video. Revisa consola.");
      } finally {
        setExporting(false);
      }
    };

    const exportVideoVertical = () => exportVideo('vertical');
    const exportVideoSquare = () => exportVideo('square');

    const handleImageUpload = (file) => {
      if (!file || !slides) return;
      const reader = new FileReader();
      reader.onload = () => {
        const updated = [...slides];
        updated[currentSlide] = { ...updated[currentSlide], image: reader.result };
        setSlides(updated);
      };
      reader.readAsDataURL(file);
    };

    const currentTheme = stylesConfig[currentStyle];

    return (
      <div className="min-h-screen">
        {/* Header igual que el tuyo */}
        <nav className="bg-white border-b border-slate-200 py-4 px-6 md:px-12 flex justify-between items-center sticky top-0 z-50 shadow-sm">
          <div className="flex items-center gap-3">
            <div className="bg-slate-900 p-2 rounded-xl">
              <Sparkles className="text-purple-400 w-5 h-5" />
            </div>
            <span className="font-black text-lg tracking-tighter uppercase hidden sm:block">Kinetic Engine</span>
          </div>
          <div className="flex items-center gap-4">
            <div className="text-right hidden sm:block">
              <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Self Love Club</p>
              <p className="text-sm font-bold text-slate-800">Andrés Ramírez</p>
            </div>
            <img src={ANDRES_PHOTO_PROD} className="w-10 h-10 rounded-full border-2 border-slate-100 object-cover" onError={(e)=>{e.target.onerror=null; e.target.src=ANDRES_PHOTO_FALLBACK}} alt="Andrés Ramírez" />
          </div>
        </nav>

        <main className="max-w-7xl mx-auto p-6 md:p-10 grid grid-cols-1 lg:grid-cols-12 gap-10">
          {/* Panel izquierdo (igual) */}
          <div className="lg:col-span-5 space-y-6">
            {/* API Key */}
            <div className="bg-white p-5 rounded-3xl border border-slate-200 shadow-sm flex flex-col gap-3">
              <div className="flex items-center gap-2 text-slate-700">
                <Key className="w-4 h-4 text-purple-600" />
                <span className="text-xs font-bold uppercase tracking-widest">Motor de Conexión</span>
              </div>
              <div className="relative">
                <input type={showKey ? "text" : "password"} value={apiKey} onChange={handleKeyChange} placeholder="Pega tu Google AI API Key aquí..." className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-xs focus:outline-none focus:ring-2 focus:ring-purple-500 font-mono text-slate-600 pr-10" />
                <button onClick={() => setShowKey(!showKey)} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">{showKey ? <EyeOff size={16}/> : <Eye size={16}/>}</button>
              </div>
              <p className="text-[10px] text-slate-400">Tu llave se guarda localmente.</p>
            </div>

            {/* Textarea y generar */}
            <div className="bg-white p-8 rounded-[32px] border border-slate-100 shadow-xl shadow-slate-200/50">
              <h2 className="text-xl font-black mb-6 flex items-center gap-3 text-slate-800"><Type className="text-blue-600 w-5 h-5" /> Entrada de Claridad</h2>
              
              <div className="flex gap-2 mb-6">
                {Object.keys(stylesConfig).map(style => (
                  <button key={style} onClick={() => setCurrentStyle(style)} className={`flex-1 py-3 rounded-xl text-[10px] font-black transition-all border ${currentStyle === style ? "bg-slate-900 text-white border-slate-900 shadow-md scale-[1.02]" : "bg-slate-50 text-slate-400 border-slate-100 hover:bg-slate-100"}`}>{style.toUpperCase()}</button>
                ))}
              </div>

              <textarea className="w-full h-80 p-6 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-600 outline-none text-sm transition-all leading-relaxed text-slate-700" placeholder="Pega aquí el contenido..." value={essay} onChange={(e)=>setEssay(e.target.value)} />

              <button onClick={generateCarousel} disabled={loading || !essay.trim()} className="w-full mt-6 py-5 bg-blue-600 text-white rounded-2xl font-black flex items-center justify-center gap-3 hover:bg-slate-900 transition-all shadow-lg shadow-blue-200 disabled:opacity-50">
                {loading ? <Loader2 className="animate-spin" /> : <Send size={18} />} {loading ? "ESTRATIFICANDO..." : "GENERAR CARRUSEL"}
              </button>

              {error && <div className="mt-4 p-4 bg-red-50 border border-red-200 rounded-xl"><p className="text-[11px] font-bold text-red-600 text-center uppercase">{error}</p></div>}
            </div>
          </div>

          {/* Preview Area */}
          <div className="lg:col-span-7 flex flex-col items-center">
            {slides ? (
              <div className="w-full max-w-[480px] space-y-6">
                <div className="flex flex-wrap gap-2 justify-between items-center bg-white p-3 rounded-2xl border border-slate-200 shadow-sm w-full">
                  <div className="flex items-center gap-1">
                    <button onClick={() => setCurrentSlide(s => Math.max(0, s - 1))} className="p-2 hover:bg-slate-100 rounded-lg text-slate-600"><ChevronLeft size={20}/></button>
                    <span className="text-[10px] font-black uppercase tracking-widest px-2 text-slate-500">{currentSlide + 1} / 7</span>
                    <button onClick={() => setCurrentSlide(s => Math.min(6, s + 1))} className="p-2 hover:bg-slate-100 rounded-lg text-slate-600"><ChevronRight size={20}/></button>
                  </div>

                  <div className="flex flex-wrap gap-2">
                    <button onClick={exportAsJpg} disabled={exporting} className="bg-purple-600 text-white px-5 py-2 rounded-xl font-bold text-[10px] flex items-center gap-2 hover:bg-black transition-all shadow-md">{exporting ? <Loader2 className="animate-spin w-3 h-3" /> : <ImageIcon size={14} />} JPG</button>
                    <button onClick={exportAllSlides} disabled={exporting} className="bg-blue-600 text-white px-5 py-2 rounded-xl font-bold text-[10px] flex items-center gap-2 hover:bg-black transition-all shadow-md">{exporting ? <Loader2 className="animate-spin w-3 h-3" /> : <ImageIcon size={14} />} TODO</button>
                    
                    <div className="flex items-center gap-1 text-amber-600 text-[10px] font-bold"><AlertTriangle size={14} /> Video puede tardar 20-40 seg</div>

                    <button onClick={exportVideoVertical} disabled={exporting} className="bg-green-600 text-white px-4 py-2 rounded-xl font-bold text-[10px] flex items-center gap-2 hover:bg-green-800 transition-all shadow-md">{exporting ? <Loader2 className="animate-spin w-3 h-3" /> : "VERTICAL"}</button>
                    <button onClick={exportVideoSquare} disabled={exporting} className="bg-amber-600 text-white px-4 py-2 rounded-xl font-bold text-[10px] flex items-center gap-2 hover:bg-amber-800 transition-all shadow-md">{exporting ? <Loader2 className="animate-spin w-3 h-3" /> : "CUADRADO"}</button>
                  </div>
                </div>

                {/* Tu slide canvas original */}
                <div ref={slideRef} className={`w-[480px] h-[600px] ${currentTheme.container} rounded-[40px] shadow-2xl flex flex-col justify-between p-12 relative overflow-hidden transition-all duration-500`}>
                  {/* ... TODO tu código del slide (header, contenido, footer) exactamente como lo tenías ... */}
                  <div className="flex justify-between items-center z-10">
                    <div className={`text-[9px] font-black tracking-[0.4em] uppercase opacity-40 ${currentTheme.fontBody}`}>Self Love Club</div>
                    <div className={`w-8 h-1 ${currentTheme.accent} rounded-full`} />
                  </div>

                  <div className="z-10 space-y-6 flex-1 flex flex-col justify-center">
                    {currentSlide === 0 ? (
                      <div className="space-y-6">
                        {slides[currentSlide].image && <img src={slides[currentSlide].image} alt="" className="w-full h-48 object-cover rounded-2xl shadow-md mb-6" />}
                        <h3 className={`text-4xl md:text-5xl leading-[1.05] font-black ${currentTheme.fontHeading} tracking-tight`}>{slides[currentSlide].title}</h3>
                        <p className={`text-xl opacity-70 font-medium italic leading-relaxed ${currentTheme.fontBody}`}>{slides[currentSlide].subtitle}</p>
                      </div>
                    ) : currentSlide === 6 ? (
                      <div className="space-y-6 flex flex-col items-center text-center">
                        {slides[currentSlide].image && <img src={slides[currentSlide].image} alt="" className="w-full h-48 object-cover rounded-2xl shadow-md mb-6" />}
                        <h3 className={`text-4xl font-black leading-tight ${currentTheme.fontHeading}`}>{slides[currentSlide].title}</h3>
                        <p className={`text-xl opacity-90 leading-relaxed font-medium ${currentTheme.fontBody}`}>{slides[currentSlide].body}</p>
                      </div>
                    ) : (
                      <div className="space-y-5">
                        {slides[currentSlide].image && <img src={slides[currentSlide].image} alt="" className="w-full h-48 object-cover rounded-2xl shadow-md mb-6" />}
                        <h3 className={`text-3xl font-bold leading-[1.1] ${currentTheme.fontHeading}`}>{slides[currentSlide].title}</h3>
                        <p className={`text-lg leading-relaxed opacity-85 font-medium ${currentTheme.fontBody}`}>{slides[currentSlide].body}</p>
                      </div>
                    )}
                  </div>

                  <div className={`flex items-center justify-between border-t ${currentTheme.border} pt-6 z-10`}>
                    <div className="flex items-center gap-3">
                      <img src={ANDRES_PHOTO_PROD} className="w-10 h-10 rounded-full border border-white/20 object-cover aspect-square shadow-sm" onError={(e)=>{e.target.onerror=null; e.target.src=ANDRES_PHOTO_FALLBACK}} alt="Andrés Ramírez" />
                      <div>
                        <p className={`font-black text-[10px] uppercase tracking-tight ${currentTheme.fontBody}`}>Andrés Ramírez</p>
                        <p className={`text-[8px] font-bold opacity-40 uppercase tracking-widest ${currentTheme.fontBody}`}>Clarity Strategist</p>
                      </div>
                    </div>
                    <div className={`px-4 py-1.5 rounded-full text-[9px] font-black ${currentTheme.tag} ${currentTheme.fontBody}`}>0{slides[currentSlide].slideNumber}</div>
                  </div>

                  <div className="absolute top-0 right-0 w-64 h-64 bg-current opacity-[0.03] rounded-full translate-x-1/2 -translate-y-1/2 pointer-events-none" />
                </div>

                <div className="flex justify-center gap-2">
                  {slides.map((_, i) => <div key={i} className={`h-1 rounded-full transition-all duration-300 ${currentSlide === i ? "w-10 bg-slate-900" : "w-2 bg-slate-200"}`} />)}
                </div>

                <div className="mt-4">
                  <label className="text-xs font-bold">Subir imagen manual para esta slide</label>
                  <input type="file" accept="image/*" onChange={(e) => handleImageUpload(e.target.files[0])} className="block mt-2 text-sm" />
                </div>
              </div>
            ) : (
              <div className="w-full max-w-[480px] aspect-[4/5] bg-white border-4 border-dashed border-slate-200 rounded-[40px] flex flex-col items-center justify-center text-slate-300 p-10 text-center">
                <div className="bg-slate-50 p-10 rounded-full mb-6 border border-slate-100 shadow-inner">
                  <ImageIcon size={48} strokeWidth={1} className="text-slate-300" />
                </div>
