<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kinetic Clarity Engine — Clarity Strategist</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Fuentes Premium -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&display=swap">
  
  <!-- Babel: El traductor que hace que React funcione en el navegador -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    .font-serif { font-family: 'Playfair Display', serif; }
    .font-sans { font-family: 'Inter', sans-serif; }
  </style>
</head>

<body class="bg-slate-50 text-slate-900 font-sans selection:bg-purple-200">
  <!-- Aquí es donde React inyectará toda la aplicación -->
  <div id="root"></div>

  <!-- Script principal de React con Babel -->
  <script type="text/babel" data-type="module">
    import React, { useState, useRef, useEffect } from 'https://esm.sh/react@18';
    import { createRoot } from 'https://esm.sh/react-dom@18/client';
    import { 
      Sparkles, Loader2, Image as ImageIcon, 
      Type, Send, ChevronLeft, ChevronRight, Key, Eye, EyeOff
    } from 'https://esm.sh/lucide-react@0.263';

    // CORRECCIÓN 1: Usar el modelo público estable.
    const MODEL_NAME = "gemini-1.5-flash";

    const ANDRES_PHOTO_PROD = "/assets/images/andres-ramirez-portrait.jpg"; 
    const ANDRES_PHOTO_FALLBACK = "https://ui-avatars.com/api/?name=Andres+Ramirez&background=0f172a&color=fff&size=128";

    const App = () => {
      // =========================================================================
      // ⚠️ SI QUIERES DEJAR LA LLAVE FIJA, PÉGALA ENTRE LAS COMILLAS DE ABAJO ⚠️
      // =========================================================================
      const [apiKey, setApiKey] = useState(""); // <-- Ejemplo: useState("AIzaSy...");
      // =========================================================================
      
      const [showKey, setShowKey] = useState(false);
      const [essay, setEssay] = useState("");
      const [loading, setLoading] = useState(false);
      const [slides, setSlides] = useState(null);
      const [currentSlide, setCurrentSlide] = useState(0);
      const [error, setError] = useState(null);
      const [exporting, setExporting] = useState(false);
      const [currentStyle, setCurrentStyle] = useState("Kinetic");

      const slideRef = useRef(null);

      // Cargar la llave guardada al iniciar (si se usó la interfaz visual)
      useEffect(() => {
        const savedKey = localStorage.getItem('kinetic_api_key');
        if (savedKey && !apiKey) setApiKey(savedKey);
      }, []);

      const handleKeyChange = (e) => {
        const val = e.target.value;
        setApiKey(val);
        localStorage.setItem('kinetic_api_key', val); // Guarda localmente en TU navegador
      };

      const stylesConfig = {
        Kinetic: {
          container: "bg-[#0f172a] text-[#f8fafc]",
          accent: "bg-[#a855f7]",
          textAccent: "text-[#a855f7]",
          border: "border-slate-800",
          fontHeading: "font-serif",
          fontBody: "font-sans",
          tag: "bg-[#a855f7] text-white",
          logoInvert: "invert brightness-150"
        },
        ClarityWhite: {
          container: "bg-white text-slate-900",
          accent: "bg-blue-600",
          textAccent: "text-blue-600",
          border: "border-slate-100",
          fontHeading: "font-sans font-black",
          fontBody: "font-sans",
          tag: "bg-slate-900 text-white",
          logoInvert: ""
        },
        NoirGold: {
          container: "bg-[#050816] text-[#f9fafb]",
          accent: "bg-[#fbbf24]",
          textAccent: "text-[#fbbf24]",
          border: "border-[#111827]",
          fontHeading: "font-serif",
          fontBody: "font-sans",
          tag: "bg-[#fbbf24] text-black",
          logoInvert: "invert brightness-200"
        }
      };

      const systemInstruction = `
        Eres un estratega de contenido de élite para Andrés Ramírez (Clarity Strategist).
        Transforma el texto del usuario en EXACTAMENTE 7 láminas de alto impacto visual para Instagram.

        REGLAS:
        1. Mantén el idioma original del texto (Español o Inglés).
        2. Tono: Inspirador, sistémico, premium.
        3. Slide 1: Título tipo Hook (máx 10 palabras) y un subtítulo intrigante.
        4. Slides 2-6: Desarrollo del concepto. 2-4 frases densas y valiosas.
        5. Slide 7: Cierre potente y directo. Sin iconos ni arrobas en el texto generado, el diseño base ya tiene la foto de Andrés. Solo texto accionable.
        6. Devuelve un JSON válido.
      `;

      const generateCarousel = async () => {
        if (!essay.trim()) return;
        setLoading(true);
        setError(null);

        // Validación estricta de la llave
        if (!apiKey.trim()) {
          setError("Chamo, necesitas ingresar tu API Key en la configuración arriba para usar el motor.");
          setLoading(false);
          return;
        }

        const payload = {
          contents: [{ parts: [{ text: `Contenido:\n\n${essay}` }] }],
          systemInstruction: { parts: [{ text: systemInstruction }] },
          generationConfig: {
            responseMimeType: "application/json",
            responseSchema: {
              type: "OBJECT",
              properties: {
                slides: {
                  type: "ARRAY",
                  items: {
                    type: "OBJECT",
                    properties: {
                      title: { type: "STRING" },
                      subtitle: { type: "STRING" },
                      body: { type: "STRING" },
                      slideNumber: { type: "NUMBER" }
                    },
                    required: ["title", "slideNumber"]
                  }
                }
              }
            }
          }
        };

        let delay = 1000;
        for (let i = 0; i < 5; i++) {
          try {
            const response = await fetch(
              `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${apiKey}`,
              {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
              }
            );
            
            if (response.ok) {
              const result = await response.json();
              const data = JSON.parse(result.candidates[0].content.parts[0].text);
              setSlides(data.slides);
              setCurrentSlide(0);
              setLoading(false);
              return;
            } else {
              // CORRECCIÓN 2: Capturar errores de HTTP (como llave inválida)
              const errData = await response.json();
              console.error("Error de API Gemini:", errData);
              throw new Error(errData.error?.message || "Error HTTP");
            }
          } catch (e) {
            console.error(`Fallo en el intento ${i + 1}:`, e);
            if (i === 4) {
                setError(`Fallo la conexión. Revisa que tu API Key sea correcta. Detalle en consola (F12).`);
            }
          }
          await new Promise(r => setTimeout(r, delay));
          delay *= 2;
        }
        setLoading(false);
      };

      const exportAsJpg = async () => {
        if (!slideRef.current) return;
        setExporting(true);
        try {
          const { toJpeg } = await import('https://cdn.skypack.dev/html-to-image');
          const dataUrl = await toJpeg(slideRef.current, {
            quality: 0.95,
            pixelRatio: 3,
            backgroundColor: currentStyle === "ClarityWhite" ? "#ffffff" : "#0f172a"
          });
          const link = document.createElement("a");
          link.download = `Clarity-Slide-${slides[currentSlide].slideNumber}.jpg`;
          link.href = dataUrl;
          link.click();
        } catch (e) {
          console.error(e);
          alert("Error exportando JPG. Asegúrate de que las imágenes estén en tu servidor local.");
        } finally {
          setExporting(false);
        }
      };

      const currentTheme = stylesConfig[currentStyle];

      return (
        <div className="min-h-screen">
          {/* Header General */}
          <nav className="bg-white border-b border-slate-200 py-4 px-6 md:px-12 flex justify-between items-center sticky top-0 z-50 shadow-sm">
            <div className="flex items-center gap-3">
              <div className="bg-slate-900 p-2 rounded-xl">
                <Sparkles className="text-purple-400 w-5 h-5" />
              </div>
              <span className="font-black text-lg tracking-tighter uppercase hidden sm:block">Kinetic Engine</span>
            </div>
            <div className="flex items-center gap-4">
              <div className="text-right hidden sm:block">
                <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Self Love Club</p>
                <p className="text-sm font-bold text-slate-800">Andrés Ramírez</p>
              </div>
              <img 
                src={ANDRES_PHOTO_PROD}
                className="w-10 h-10 rounded-full border-2 border-slate-100 object-cover"
                onError={(e) => {
                  e.target.onerror = null; 
                  e.target.src = ANDRES_PHOTO_FALLBACK;
                }}
                alt="Andrés Ramírez"
              />
            </div>
          </nav>

          <main className="max-w-7xl mx-auto p-6 md:p-10 grid grid-cols-1 lg:grid-cols-12 gap-10">
            {/* Input Area */}
            <div className="lg:col-span-5 space-y-6">
              
              {/* Módulo de Seguridad para API Key */}
              <div className="bg-white p-5 rounded-3xl border border-slate-200 shadow-sm flex flex-col gap-3">
                <div className="flex items-center gap-2 text-slate-700">
                  <Key className="w-4 h-4 text-purple-600" />
                  <span className="text-xs font-bold uppercase tracking-widest">Motor de Conexión</span>
                </div>
                <div className="relative">
                  <input 
                    type={showKey ? "text" : "password"} 
                    value={apiKey}
                    onChange={handleKeyChange}
                    placeholder="Pega tu Google AI API Key aquí..." 
                    className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-xs focus:outline-none focus:ring-2 focus:ring-purple-500 font-mono text-slate-600 pr-10"
                  />
                  <button 
                    onClick={() => setShowKey(!showKey)}
                    className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600"
                  >
                    {showKey ? <EyeOff size={16} /> : <Eye size={16} />}
                  </button>
                </div>
                <p className="text-[10px] text-slate-400">Tu llave se guarda encriptada localmente en este navegador. Nunca es pública.</p>
              </div>

              <div className="bg-white p-8 rounded-[32px] border border-slate-100 shadow-xl shadow-slate-200/50">
                <h2 className="text-xl font-black mb-6 flex items-center gap-3 text-slate-800">
                  <Type className="text-blue-600 w-5 h-5" />
                  Entrada de Claridad
                </h2>
                
                <div className="flex gap-2 mb-6">
                  {Object.keys(stylesConfig).map(style => (
                    <button 
                      key={style}
                      onClick={() => setCurrentStyle(style)}
                      className={`flex-1 py-3 rounded-xl text-[10px] font-black transition-all border ${
                        currentStyle === style ? "bg-slate-900 text-white border-slate-900 shadow-md scale-[1.02]" : "bg-slate-50 text-slate-400 border-slate-100 hover:bg-slate-100"
                      }`}
                    >
                      {style.toUpperCase()}
                    </button>
                  ))}
                </div>

                <textarea
                  className="w-full h-80 p-6 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-600 outline-none text-sm transition-all leading-relaxed text-slate-700"
                  placeholder="Pega aquí el contenido a transformar..."
                  value={essay}
                  onChange={(e) => setEssay(e.target.value)}
                />

                <button
                  onClick={generateCarousel}
                  disabled={loading || !essay.trim()}
                  className="w-full mt-6 py-5 bg-blue-600 text-white rounded-2xl font-black flex items-center justify-center gap-3 hover:bg-slate-900 transition-all shadow-lg shadow-blue-200 disabled:opacity-50"
                >
                  {loading ? <Loader2 className="animate-spin" /> : <Send size={18} />}
                  {loading ? "ESTRATIFICANDO..." : "GENERAR CARRUSEL"}
                </button>

                {error && <p className="mt-4 text-xs font-bold text-red-500 text-center uppercase">{error}</p>}
              </div>
            </div>

            {/* Preview Area */}
            <div className="lg:col-span-7 flex flex-col items-center">
              {slides ? (
                <div className="w-full max-w-[480px] space-y-6">
                  {/* Toolbar */}
                  <div className="flex justify-between items-center bg-white p-3 rounded-2xl border border-slate-200 shadow-sm w-full">
                    <div className="flex items-center gap-1">
                      <button onClick={() => setCurrentSlide(s => Math.max(0, s - 1))} className="p-2 hover:bg-slate-100 rounded-lg disabled:opacity-10 text-slate-600"><ChevronLeft size={20}/></button>
                      <span className="text-[10px] font-black uppercase tracking-widest px-2 text-slate-500">{currentSlide + 1} / 7</span>
                      <button onClick={() => setCurrentSlide(s => Math.min(6, s + 1))} className="p-2 hover:bg-slate-100 rounded-lg disabled:opacity-10 text-slate-600"><ChevronRight size={20}/></button>
                    </div>
                    <button 
                      onClick={exportAsJpg}
                      disabled={exporting}
                      className="bg-purple-600 text-white px-5 py-2 rounded-xl font-bold text-[10px] flex items-center gap-2 hover:bg-black transition-all shadow-md"
                    >
                      {exporting ? <Loader2 className="animate-spin w-3 h-3" /> : <ImageIcon size={14} />}
                      EXPORTAR JPG
                    </button>
                  </div>

                  {/* Slide Canvas */}
                  <div 
                    ref={slideRef}
                    className={`w-[480px] h-[600px] ${currentTheme.container} rounded-[40px] shadow-2xl flex flex-col justify-between p-12 relative overflow-hidden transition-all duration-500`}
                  >
                    <div className="flex justify-between items-center z-10">
                      <div className={`text-[9px] font-black tracking-[0.4em] uppercase opacity-40 ${currentTheme.fontBody}`}>Self Love Club</div>
                      <div className={`w-8 h-1 ${currentTheme.accent} rounded-full`} />
                    </div>

                    <div className="z-10 space-y-6 flex-1 flex flex-col justify-center">
                      {currentSlide === 0 ? (
                        <div className="space-y-6">
                          <div className={`w-10 h-1 ${currentTheme.accent} mb-4 opacity-50`} />
                          <h3 className={`text-4xl md:text-5xl leading-[1.05] font-black ${currentTheme.fontHeading} tracking-tight`}>
                            {slides[currentSlide].title}
                          </h3>
                          <p className={`text-xl opacity-70 font-medium italic leading-relaxed ${currentTheme.fontBody}`}>
                            {slides[currentSlide].subtitle}
                          </p>
                        </div>
                      ) : currentSlide === 6 ? (
                        <div className="space-y-6 flex flex-col items-center text-center">
                          <h3 className={`text-4xl font-black leading-tight ${currentTheme.fontHeading}`}>
                            {slides[currentSlide].title}
                          </h3>
                          <p className={`text-xl opacity-90 leading-relaxed font-medium ${currentTheme.fontBody}`}>
                            {slides[currentSlide].body}
                          </p>
                        </div>
                      ) : (
                        <div className="space-y-5">
                          <div className={`w-10 h-1 ${currentTheme.accent} mb-4 opacity-50`} />
                          <h3 className={`text-3xl font-bold leading-[1.1] ${currentTheme.fontHeading}`}>
                            {slides[currentSlide].title}
                          </h3>
                          <p className={`text-lg leading-relaxed opacity-85 font-medium ${currentTheme.fontBody}`}>
                            {slides[currentSlide].body}
                          </p>
                        </div>
                      )}
                    </div>

                    <div className={`flex items-center justify-between border-t ${currentTheme.border} pt-6 z-10`}>
                      <div className="flex items-center gap-3">
                        <img 
                          src={ANDRES_PHOTO_PROD} 
                          className="w-10 h-10 rounded-full border border-white/20 object-cover aspect-square shadow-sm" 
                          onError={(e) => {
                            e.target.onerror = null; 
                            e.target.src = ANDRES_PHOTO_FALLBACK;
                          }}
                          alt="Andrés Ramírez"
                        />
                        <div>
                          <p className={`font-black text-[10px] uppercase tracking-tight ${currentTheme.fontBody}`}>Andrés Ramírez</p>
                          <p className={`text-[8px] font-bold opacity-40 uppercase tracking-widest ${currentTheme.fontBody}`}>Clarity Strategist</p>
                        </div>
                      </div>
                      <div className={`px-4 py-1.5 rounded-full text-[9px] font-black ${currentTheme.tag} ${currentTheme.fontBody}`}>
                        0{slides[currentSlide].slideNumber}
                      </div>
                    </div>

                    <div className="absolute top-0 right-0 w-64 h-64 bg-current opacity-[0.03] rounded-full translate-x-1/2 -translate-y-1/2 pointer-events-none" />
                  </div>

                  {/* Progress Dots */}
                  <div className="flex justify-center gap-2">
                    {slides.map((_, i) => (
                      <div key={i} className={`h-1 rounded-full transition-all duration-300 ${currentSlide === i ? "w-10 bg-slate-900" : "w-2 bg-slate-200"}`} />
                    ))}
                  </div>
                </div>
              ) : (
                <div className="w-full max-w-[480px] aspect-[4/5] bg-white border-4 border-dashed border-slate-200 rounded-[40px] flex flex-col items-center justify-center text-slate-300 p-10 text-center">
                  <div className="bg-slate-50 p-10 rounded-full mb-6 border border-slate-100 shadow-inner">
                    <ImageIcon size={48} strokeWidth={1} className="text-slate-300" />
                  </div>
                  <h3 className="font-black text-xl uppercase tracking-tighter text-slate-400">Motor en Reposo</h3>
                  <p className="text-sm mt-2 opacity-60 text-slate-400 font-medium">Inserta contenido para activar el motor de claridad cinética.</p>
                </div>
              )}
            </div>
          </main>
          
          <footer className="py-10 text-center opacity-30">
            <p className="text-[9px] font-black tracking-[0.4em] uppercase text-slate-600">Andrés Ramírez • @aram7891 • @selfloveclubusa</p>
          </footer>
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
