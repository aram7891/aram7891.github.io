<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinetic Clarity Engine - Self Love Club</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        kinetic: '#a855f7',
                        kineticDark: '#0f172a',
                        surface: '#1e293b'
                    },
                    fontFamily: {
                        serif: ['"Playfair Display"', 'serif'],
                        sans: ['"Inter"', 'sans-serif'],
                        cormorant: ['"Cormorant Garamond"', 'serif'],
                        instrument: ['"Instrument Sans"', 'sans-serif'],
                        dm: ['"DM Mono"', 'monospace']
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;600;800&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Instrument+Sans:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; margin: 0; padding: 0; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        .grayscale-editorial { filter: grayscale(100%) contrast(1.15); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useLayoutEffect, useRef } = React;

        const AutoFitContent = ({ children, isCenter }) => {
            const containerRef = useRef(null);
            const contentRef = useRef(null);
            const [scale, setScale] = useState(1);
            useLayoutEffect(() => { setScale(1); }, [children]);
            useLayoutEffect(() => {
                const container = containerRef.current;
                const content = contentRef.current;
                if (!container || !content) return;
                const measureAndScale = () => {
                    const containerH = container.clientHeight;
                    const contentH = content.scrollHeight;
                    if (contentH > containerH && containerH > 0) {
                        const newScale = containerH / contentH;
                        setScale(newScale * 0.95); 
                    }
                };
                requestAnimationFrame(measureAndScale);
            }, [children]);

            return (
                <div ref={containerRef} className={`w-full flex-1 min-h-0 flex flex-col ${isCenter ? 'items-center justify-center' : 'justify-center'} overflow-hidden`}>
                    <div ref={contentRef} style={{ transform: `scale(${scale})`, transformOrigin: isCenter ? 'center center' : 'left center', width: scale < 1 ? `${100 / scale}%` : '100%' }} className={`flex flex-col gap-4 ${isCenter ? 'items-center text-center' : ''}`}>
                        {children}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [essay, setEssay] = useState("");
            const [userApiKey, setUserApiKey] = useState("");
            const [selectedModel, setSelectedModel] = useState("gemini-2.0-flash");
            const [loading, setLoading] = useState(false);
            const [slides, setSlides] = useState(null);
            const [currentSlide, setCurrentSlide] = useState(0);
            const [error, setError] = useState(null);
            const [exporting, setExporting] = useState(false);
            const [currentStyle, setCurrentStyle] = useState("Editorial");
            const [polishing, setPolishing] = useState(false);
            const slideRef = useRef(null);

            const stylesConfig = {
                Editorial: { container: "bg-[#F7F4EF] text-[#1A1814]", accent: "bg-[#8B6F4E]", border: "border-[#8B6F4E]", fontHeading: "font-cormorant italic font-bold tracking-wide", fontBody: "font-instrument", tag: "bg-[#C4A882] text-[#1A1814] font-dm text-[8px]", padding: "px-16 py-12" },
                Kinetic: { container: "bg-[#0f172a] text-[#f8fafc]", accent: "bg-[#a855f7]", border: "border-slate-800", fontHeading: "font-serif", fontBody: "font-sans", tag: "bg-[#a855f7] text-white font-dm text-[9px]", padding: "px-12 py-10" },
                Brutalist: { container: "bg-white text-black border-[6px] border-black", accent: "bg-yellow-400", border: "border-black", fontHeading: "font-sans font-black uppercase tracking-tighter", fontBody: "font-sans font-bold", tag: "bg-black text-white font-dm text-[9px]", padding: "px-14 py-10" },
                DarkMode: { container: "bg-slate-950 text-white", accent: "bg-blue-500", border: "border-slate-800", fontHeading: "font-sans font-black", fontBody: "font-sans", tag: "bg-white text-black font-dm text-[9px]", padding: "px-12 py-10" }
            };

            const formatText = (text) => {
                if (!text) return null;
                return text.split('\n').map((line, i) => {
                    if (!line.trim()) return <div key={i} className="h-3"></div>;
                    const parts = line.split(/(\*\*.*?\*\*)/g).map((part, j) => (part.startsWith('**') && part.endsWith('**')) ? <strong key={j} className="font-bold">{part.slice(2, -2)}</strong> : part);
                    if (/^[-•]|\d+\./.test(line.trim())) {
                        return <div key={i} className="flex gap-4 my-2 pl-2"><span className={`opacity-40 ${stylesConfig[currentStyle].accent} w-1.5 h-1.5 rounded-full mt-2.5 flex-none`}></span><p className="leading-relaxed">{parts}</p></div>;
                    }
                    return <p key={i} className="mb-2 leading-relaxed">{parts}</p>;
                });
            };

            const exportAsJpg = async () => {
                if (!window.htmlToImage) return;
                setExporting(true);
                try {
                    const dataUrl = await window.htmlToImage.toJpeg(slideRef.current, { quality: 0.95, pixelRatio: 3, useCORS: true, cacheBust: true });
                    const link = document.createElement('a');
                    link.download = `SLC-Slide-0${slides[currentSlide].slideNumber}.jpg`;
                    link.href = dataUrl;
                    link.click();
                } catch (err) { console.error(err); } finally { setExporting(false); }
            };

            const downloadAllAsZip = async () => {
                if (!slides) return;
                setExporting(true);
                const zip = new JSZip();
                const originalSlide = currentSlide;
                try {
                    for (let i = 0; i < slides.length; i++) {
                        setCurrentSlide(i);
                        await new Promise(res => setTimeout(res, 700));
                        const dataUrl = await window.htmlToImage.toJpeg(slideRef.current, { quality: 0.95, pixelRatio: 3, useCORS: true, cacheBust: true });
                        zip.file(`Slide-0${i+1}.jpg`, dataUrl.split(',')[1], {base64: true});
                    }
                    const content = await zip.generateAsync({type: "blob"});
                    const link = document.createElement("a");
                    link.href = URL.createObjectURL(content);
                    link.download = "Carrusel-SLC.zip";
                    link.click();
                } catch (err) { console.error(err); } finally { setCurrentSlide(originalSlide); setExporting(false); }
            };

            const generateCarousel = async () => {
                if (!essay.trim() || !userApiKey.trim()) return;
                setLoading(true); setError(null);
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${userApiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: "Create EXACTLY 7 carousel slides in JSON format {slides:[{title, subtitle, body, slideNumber}]} for: " + essay }] }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    const data = await response.json();
                    const parsed = JSON.parse(data.candidates[0].content.parts[0].text);
                    setSlides(parsed.slides);
                } catch (err) { setError("Error de API"); } finally { setLoading(false); }
            };

            return (
                <div className="min-h-screen bg-kineticDark text-slate-200 font-sans selection:bg-kinetic selection:text-white pb-20">
                    <nav className="border-b border-slate-800 bg-[#0b1121] py-5 px-8 flex justify-between items-center sticky top-0 z-50">
                        <span className="font-serif font-bold text-2xl text-white">Kinetic Clarity</span>
                        <img src="/assets/images/andres-ramirez-portrait.jpg" className="w-11 h-11 rounded-full border-2 border-slate-700 object-cover" />
                    </nav>

                    <main className="max-w-7xl mx-auto p-8 grid grid-cols-1 lg:grid-cols-12 gap-12">
                        <div className="lg:col-span-5 space-y-6">
                            <div className="bg-surface p-8 rounded-3xl border border-slate-800">
                                <input type="password" title="API Key" className="w-full bg-[#0b1121] border border-slate-700 rounded-xl p-3 mb-4 text-sm" placeholder="API Key..." value={userApiKey} onChange={(e) => setUserApiKey(e.target.value)} />
                                <textarea title="Ensayo" className="w-full h-48 p-5 bg-[#0b1121] border border-slate-700 rounded-2xl mb-4 text-sm" placeholder="Tu texto aquí..." value={essay} onChange={(e) => setEssay(e.target.value)} />
                                <button onClick={generateCarousel} className="w-full py-4 bg-white text-kineticDark rounded-xl font-bold">GENERAR</button>
                            </div>
                        </div>

                        <div className="lg:col-span-7 flex flex-col items-center">
                            {slides && (
                                <>
                                    <div className="flex gap-4 mb-8">
                                        <button onClick={exportAsJpg} className="bg-kinetic px-6 py-2 rounded-xl font-bold text-xs">DESCARGAR JPG</button>
                                        <button onClick={downloadAllAsZip} className="bg-emerald-600 px-6 py-2 rounded-xl font-bold text-xs">ZIP COMPLETO</button>
                                    </div>
                                    <div ref={slideRef} className={`w-[480px] h-[600px] ${stylesConfig[currentStyle].container} rounded-[40px] flex flex-col ${stylesConfig[currentStyle].padding} relative overflow-hidden`}>
                                        <AutoFitContent isCenter={currentSlide === 6}>
                                            <h3 className={`text-4xl ${stylesConfig[currentStyle].fontHeading}`}>{slides[currentSlide].title}</h3>
                                            <div className={`${stylesConfig[currentStyle].fontBody}`}>{formatText(slides[currentSlide].body)}</div>
                                        </AutoFitContent>
                                        <div className={`flex items-center justify-between border-t ${stylesConfig[currentStyle].border} pt-6 mt-auto`}>
                                            <div className="flex items-center gap-4">
                                                <img src="/assets/images/andres-ramirez-portrait.jpg" className="w-12 h-12 grayscale-editorial object-cover" />
                                                <span className="text-xs font-bold uppercase">Andrés Ramírez</span>
                                            </div>
                                            <div className={`px-4 py-1.5 rounded-full ${stylesConfig[currentStyle].tag}`}>0{currentSlide + 1}</div>
                                        </div>
                                    </div>
                                </>
                            )}
                        </div>
                    </main>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
