<!DOCTYPE html>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;600;800&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Instrument+Sans:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; margin: 0; padding: 0; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        .grayscale-editorial { filter: grayscale(100%) contrast(1.15); }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useLayoutEffect, useRef } = React;

        // Componente para ajustar el contenido automáticamente al tamaño del slide
        const AutoFitContent = ({ children, isCenter }) => {
            const containerRef = useRef(null);
            const contentRef = useRef(null);
            const [scale, setScale] = useState(1);
            
            useLayoutEffect(() => { setScale(1); }, [children]);
            
            useLayoutEffect(() => {
                const container = containerRef.current;
                const content = contentRef.current;
                if (!container || !content) return;
                
                const measureAndScale = () => {
                    const containerH = container.clientHeight;
                    const contentH = content.scrollHeight;
                    if (contentH > containerH && containerH > 0) {
                        const newScale = Math.max(0.4, (containerH / contentH) * 0.95);
                        setScale(newScale); 
                    }
                };
                
                const timeoutId = setTimeout(measureAndScale, 50);
                return () => clearTimeout(timeoutId);
            }, [children]);

            return (
                <div ref={containerRef} className={`w-full flex-1 min-h-0 flex flex-col ${isCenter ? 'items-center justify-center' : 'justify-center'} overflow-hidden`}>
                    <div ref={contentRef} style={{ 
                        transform: `scale(${scale})`, 
                        transformOrigin: isCenter ? 'center center' : 'left center', 
                        width: scale < 1 ? `${100 / scale}%` : '100%' 
                    }} className={`flex flex-col gap-4 ${isCenter ? 'items-center text-center' : ''}`}>
                        {children}
                    </div>
                </div>
            );
        };

        // NUEVO: Modal para Batch Management
        const BatchModal = ({ isOpen, onClose, batch, onDelete, onRegenerate, onExport }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-[100] p-4">
                    <div className="bg-surface border border-slate-700 rounded-3xl max-w-2xl w-full max-h-[80vh] overflow-y-auto p-8 fade-in">
                        <div className="flex justify-between items-center mb-6">
                            <h3 className="text-2xl font-serif font-bold text-white">Mis Carruseles</h3>
                            <button onClick={onClose} className="text-slate-400 hover:text-white text-2xl">✕</button>
                        </div>
                        
                        {batch && batch.length > 0 ? (
                            <div className="space-y-3">
                                {batch.map((item, idx) => (
                                    <div key={idx} className="bg-[#0b1121] border border-slate-700 rounded-2xl p-4 flex justify-between items-center hover:border-kinetic transition-all">
                                        <div className="flex-1">
                                            <h4 className="font-bold text-white truncate">{item.title || `Carrusel ${idx + 1}`}</h4>
                                            <p className="text-xs text-slate-500">
                                                {item.slides?.length} slides • {new Date(item.date).toLocaleDateString('es-ES')}
                                            </p>
                                        </div>
                                        <div className="flex gap-2">
                                            <button 
                                                onClick={() => onRegenerate(idx)}
                                                className="px-3 py-1 bg-kinetic text-white text-xs font-bold rounded-lg hover:brightness-110"
                                                title="Regenerar"
                                            >
                                                <i className="fa-solid fa-redo"></i>
                                            </button>
                                            <button 
                                                onClick={() => onExport(idx)}
                                                className="px-3 py-1 bg-emerald-600 text-white text-xs font-bold rounded-lg hover:brightness-110"
                                                title="Exportar ZIP"
                                            >
                                                <i className="fa-solid fa-download"></i>
                                            </button>
                                            <button 
                                                onClick={() => onDelete(idx)}
                                                className="px-3 py-1 bg-red-600/30 text-red-400 text-xs font-bold rounded-lg hover:bg-red-600/50"
                                                title="Eliminar"
                                            >
                                                <i className="fa-solid fa-trash"></i>
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="text-center py-12 text-slate-500">
                                <i className="fa-solid fa-inbox text-4xl mb-4 block"></i>
                                <p>No hay carruseles guardados aún</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // NUEVO: Modal para Video Compilation Options
        const VideoCompilationModal = ({ isOpen, onClose, onCreateGif, onDownloadImages, isProcessing }) => {
            const [slideDelay, setSlideDelay] = useState(2);
            const [format, setFormat] = useState("gif");

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-[100] p-4">
                    <div className="bg-surface border border-slate-700 rounded-3xl max-w-md w-full p-8 fade-in">
                        <h3 className="text-2xl font-serif font-bold text-white mb-6">Compilar Story a Video</h3>
                        
                        <div className="space-y-6">
                            <div className="space-y-2">
                                <label className="text-[10px] uppercase tracking-widest text-slate-500 font-bold">Formato</label>
                                <div className="flex gap-2">
                                    <button 
                                        onClick={() => setFormat("gif")}
                                        className={`flex-1 py-2 rounded-lg text-[10px] font-bold border transition-all ${format === "gif" ? 'bg-kinetic text-white border-kinetic' : 'bg-[#0b1121] text-slate-400 border-slate-700'}`}
                                    >
                                        🎬 GIF Animado
                                    </button>
                                    <button 
                                        onClick={() => setFormat("images")}
                                        className={`flex-1 py-2 rounded-lg text-[10px] font-bold border transition-all ${format === "images" ? 'bg-kinetic text-white border-kinetic' : 'bg-[#0b1121] text-slate-400 border-slate-700'}`}
                                    >
                                        🖼️ Imágenes ZIP
                                    </button>
                                </div>
                            </div>

                            {format === "gif" && (
                                <div className="space-y-2">
                                    <label className="text-[10px] uppercase tracking-widest text-slate-500 font-bold">Segundos por slide</label>
                                    <div className="flex items-center gap-4">
                                        <input 
                                            type="range" 
                                            min="0.5" 
                                            max="5" 
                                            step="0.5" 
                                            value={slideDelay}
                                            onChange={(e) => setSlideDelay(parseFloat(e.target.value))}
                                            className="flex-1"
                                        />
                                        <span className="text-white font-bold w-12 text-right">{slideDelay}s</span>
                                    </div>
                                </div>
                            )}

                            <div className="flex gap-2 pt-4">
                                <button 
                                    onClick={onClose}
                                    className="flex-1 py-3 bg-slate-800 text-white rounded-xl font-bold text-[10px] uppercase hover:bg-slate-700 transition-all"
                                    disabled={isProcessing}
                                >
                                    Cancelar
                                </button>
                                <button 
                                    onClick={() => format === "gif" ? onCreateGif(slideDelay) : onDownloadImages()}
                                    disabled={isProcessing}
                                    className="flex-1 py-3 bg-kinetic text-white rounded-xl font-bold text-[10px] uppercase hover:brightness-110 transition-all disabled:opacity-50"
                                >
                                    {isProcessing ? <i className="fa-solid fa-spinner fa-spin mr-2"></i> : "CREAR"}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [essay, setEssay] = useState("");
            const [userApiKey, setUserApiKey] = useState("");
            const [selectedModel, setSelectedModel] = useState("gemini-2.0-flash");
            const [availableModels, setAvailableModels] = useState([
                { id: "gemini-2.0-flash", name: "gemini-2.0-flash" },
                { id: "gemini-2.0-pro-exp-02-05", name: "gemini-2.0-pro (mejor redacción)" }
            ]);
            const [loading, setLoading] = useState(false);
            const [slides, setSlides] = useState(null);
            const [currentSlide, setCurrentSlide] = useState(0);
            const [error, setError] = useState(null);
            const [exporting, setExporting] = useState(false);
            const [currentStyle, setCurrentStyle] = useState("Editorial");
            const [polishing, setPolishing] = useState(false);
            const [isSpeaking, setIsSpeaking] = useState(false);
            const [listingModels, setListingModels] = useState(false);
            const [formatType, setFormatType] = useState("post");
            const [batchData, setBatchData] = useState(JSON.parse(localStorage.getItem('cl_batch') || '[]'));
            const [showBatchModal, setShowBatchModal] = useState(false);
            const [showVideoModal, setShowVideoModal] = useState(false);
            const [processingVideo, setProcessingVideo] = useState(false);
            const slideRef = useRef(null);

            // NUEVO: Quick Presets
            const quickPresets = {
                selfLoveCoach: {
                    title: "Self Love Coach",
                    text: "Soy un coach especializado en autoamor y bienestar emocional. Mi enfoque es ayudar a las personas a construir una relación más profunda y auténtica consigo mismas. Trabajo desde una perspectiva integral que combina psicología, mindfulness y prácticas transformadoras de bienestar."
                },
                mindfulness: {
                    title: "Mindfulness & Wellness",
                    text: "Comparto prácticas de mindfulness, meditación y presencia consciente para ayudarte a conectar contigo mismo. Mi objetivo es enseñar herramientas prácticas que reduzcan el estrés, aumenten la claridad mental y cultiven la paz interior en tu día a día."
                },
                businessGrowth: {
                    title: "Business & Growth",
                    text: "Soy experto en estrategia empresarial y crecimiento personal. Ayudo a emprendedores y profesionales a escalar sus negocios mientras mantienen su bienestar emocional. Mis contenidos combinan táctica empresarial con mentalidad de abundancia."
                },
                relationshipHealing: {
                    title: "Relationship Healing",
                    text: "Mi especialidad es sanar relaciones tóxicas y construir vínculos saludables. Trabajo con el análisis de patrones relacionales, comunicación asertiva y el poder de establecer límites sanos que respeten tu dignidad."
                }
            };

            const stylesConfig = {
                Editorial: { container: "bg-[#F7F4EF] text-[#1A1814]", accent: "bg-[#8B6F4E]", textAccent: "text-[#8B6F4E]", border: "border-[#8B6F4E]", fontHeading: "font-cormorant italic font-bold tracking-wide", fontBody: "font-instrument", tag: "bg-[#C4A882] text-[#1A1814] font-dm text-[8px] font-semibold", logoFilter: "grayscale-editorial opacity-35", padding: "px-16 py-12" },
                Kinetic: { container: "bg-[#0f172a] text-[#f8fafc]", accent: "bg-[#a855f7]", textAccent: "text-[#a855f7]", border: "border-slate-800", fontHeading: "font-serif", fontBody: "font-sans", tag: "bg-[#a855f7] text-white font-dm text-[9px]", logoFilter: "invert brightness-200", padding: "px-12 py-10" },
                Brutalist: { container: "bg-white text-black border-[6px] border-black", accent: "bg-yellow-400", textAccent: "text-black underline decoration-yellow-400 decoration-8", border: "border-black", fontHeading: "font-sans font-black uppercase tracking-tighter", fontBody: "font-sans font-bold", tag: "bg-black text-white font-dm text-[9px] font-bold", logoFilter: "contrast-150", padding: "px-14 py-10" },
                DarkMode: { container: "bg-slate-950 text-white", accent: "bg-blue-500", textAccent: "text-blue-400", border: "border-slate-800", fontHeading: "font-sans font-black", fontBody: "font-sans", tag: "bg-white text-black font-dm text-[9px]", logoFilter: "invert brightness-200", padding: "px-12 py-10" },
                Stoic: { container: "bg-[#f4f1ea] text-[#2c2c2c]", accent: "bg-[#8b7e66]", textAccent: "text-[#5d5444]", border: "border-[#8b7e66]", fontHeading: "font-serif italic font-bold", fontBody: "font-serif italic", tag: "bg-[#2c2c2c] text-white font-dm text-[9px]", logoFilter: "sepia contrast-110", padding: "px-14 py-10" },
                Modern: { container: "bg-gradient-to-br from-indigo-50 via-white to-blue-50 text-slate-900", accent: "bg-indigo-600", textAccent: "text-indigo-600", border: "border-indigo-100", fontHeading: "font-sans font-extrabold tracking-tight", fontBody: "font-sans", tag: "bg-indigo-900 text-white font-dm text-[9px]", logoFilter: "", padding: "px-12 py-10" }
            };

            const formatText = (text) => {
                if (!text) return null;
                return text.split('\n').map((line, i) => {
                    if (!line.trim()) return <div key={i} className="h-3"></div>;
                    
                    const parts = line.split(/(\*\*.*?\*\*)/g).map((part, j) => 
                        (part.startsWith('**') && part.endsWith('**')) 
                            ? <strong key={j} className="font-bold opacity-100">{part.slice(2, -2)}</strong> 
                            : part
                    );
                    
                    const isListItem = /^[-•●\*]\s+/.test(line.trim()) || /^\d+\.\s+/.test(line.trim());
                    
                    if (isListItem) {
                        const normalizedLine = line.trim().replace(/^[-•●\*]\s+/, '').replace(/^\d+\.\s+/, '');
                        return (
                            <div key={i} className="flex gap-4 my-2 pl-2">
                                <span className={`opacity-40 select-none ${stylesConfig[currentStyle].accent} w-1.5 h-1.5 rounded-full mt-2.5 flex-none`}></span>
                                <p className="leading-relaxed">{normalizedLine}</p>
                            </div>
                        );
                    }
                    
                    return <p key={i} className="mb-2 leading-relaxed">{parts}</p>;
                });
            };

            const getSlidesDimensions = () => {
                if (formatType === "story") {
                    return { width: "w-[270px]", height: "h-[480px]", padding: "px-8 py-6" };
                } else {
                    return { width: "w-[480px]", height: "h-[600px]", padding: "px-16 py-12" };
                }
            };

            const slideDimensions = getSlidesDimensions();

            // NUEVO: Crear GIF animado
            const createGifAnimation = async (delaySeconds) => {
                setProcessingVideo(true);
                try {
                    const gif = new GIF({
                        workers: 2,
                        quality: 10,
                        width: formatType === "story" ? 270 : 480,
                        height: formatType === "story" ? 480 : 600,
                        workerScript: 'https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js'
                    });

                    const originalSlide = currentSlide;
                    for (let i = 0; i < slides.length; i++) {
                        setCurrentSlide(i);
                        await new Promise(res => setTimeout(res, 100));
                        
                        if (slideRef.current) {
                            const canvas = await window.htmlToImage.toCanvas(slideRef.current);
                            gif.addFrame(canvas, { delay: delaySeconds * 1000 });
                        }
                    }

                    gif.on('finished', function(blob) {
                        const link = document.createElement('a');
                        link.href = URL.createObjectURL(blob);
                        link.download = `SLC-Story-Animation-${Date.now()}.gif`;
                        link.click();
                        setCurrentSlide(originalSlide);
                        setProcessingVideo(false);
                        setShowVideoModal(false);
                        setError(null);
                    });

                    gif.on('error', function(error) {
                        setError("Error al crear GIF: " + error.message);
                        setCurrentSlide(originalSlide);
                        setProcessingVideo(false);
                    });

                    gif.render();
                } catch (err) {
                    setError("Error al procesar video: " + err.message);
                    setProcessingVideo(false);
                }
            };

            // NUEVO: Descargar imágenes secuenciales
            const downloadSequentialImages = async () => {
                setProcessingVideo(true);
                try {
                    const zip = new JSZip();
                    const originalSlide = currentSlide;

                    for (let i = 0; i < slides.length; i++) {
                        setCurrentSlide(i);
                        await new Promise(res => setTimeout(res, 500));

                        if (slideRef.current) {
                            const dataUrl = await window.htmlToImage.toJpeg(slideRef.current, { 
                                quality: 0.95, 
                                pixelRatio: 2, 
                                useCORS: true 
                            });
                            zip.file(`slide-${String(i + 1).padStart(2, '0')}.jpg`, dataUrl.split(',')[1], {base64: true});
                        }
                    }

                    const content = await zip.generateAsync({type: "blob"});
                    const link = document.createElement("a");
                    link.href = URL.createObjectURL(content);
                    link.download = "SLC-Story-Images.zip";
                    link.click();

                    setCurrentSlide(originalSlide);
                    setProcessingVideo(false);
                    setShowVideoModal(false);
                } catch (err) {
                    setError("Error al descargar imágenes: " + err.message);
                    setProcessingVideo(false);
                }
            };

            const exportAsJpg = async () => {
                if (!window.htmlToImage || !slideRef.current) return;
                setExporting(true);
                try {
                    const dataUrl = await window.htmlToImage.toJpeg(slideRef.current, { 
                        quality: 0.95, 
                        pixelRatio: 3, 
                        useCORS: true, 
                        cacheBust: true 
                    });
                    const link = document.createElement('a');
                    link.download = `SLC-Slide-0${slides[currentSlide].slideNumber || currentSlide + 1}.jpg`;
                    link.href = dataUrl; 
                    link.click();
                } catch (err) { 
                    setError("Error al exportar JPG: " + err.message); 
                } finally { 
                    setExporting(false); 
                }
            };

            const downloadAllAsZip = async () => {
                if (!slides) return;
                setExporting(true);
                const zip = new JSZip();
                const originalSlide = currentSlide;
                try {
                    for (let i = 0; i < slides.length; i++) {
                        setCurrentSlide(i);
                        await new Promise(res => setTimeout(res, 800));
                        const dataUrl = await window.htmlToImage.toJpeg(slideRef.current, { quality: 0.95, pixelRatio: 3, useCORS: true, cacheBust: true });
                        zip.file(`SLC-Slide-0${i+1}.jpg`, dataUrl.split(',')[1], {base64: true});
                    }
                    const content = await zip.generateAsync({type: "blob"});
                    const link = document.createElement("a"); 
                    link.href = URL.createObjectURL(content); 
                    link.download = "Presentacion_SelfLoveClub.zip"; 
                    link.click();
                } catch (err) { 
                    setError("Error al generar ZIP: " + err.message); 
                } finally { 
                    setCurrentSlide(originalSlide); 
                    setExporting(false); 
                }
            };

            const listAvailableModels = async () => {
                if (!userApiKey.trim()) {
                    setError("⚠️ Chamo, ingresa la API Key para buscar modelos.");
                    return;
                }
                setListingModels(true);
                setError(null);
                try {
                    const url = `https://generativelanguage.googleapis.com/v1beta/models?key=${userApiKey.trim()}`;
                    const res = await fetch(url);
                    const data = await res.json();
                    
                    if (data.error) throw new Error(data.error.message);
                    
                    if (data.models) {
                        const filtered = data.models
                            .filter(m => m.supportedGenerationMethods.includes("generateContent"))
                            .map(m => ({ id: m.name.replace("models/", ""), name: m.displayName || m.name.replace("models/", "") }));
                        setAvailableModels(filtered);
                    }
                } catch (err) { 
                    setError("No se pudieron cargar los modelos: " + err.message); 
                } finally { 
                    setListingModels(false); 
                }
            };

            const generateCarousel = async () => {
                if (!userApiKey.trim()) { setError("⚠️ Falta API Key."); return; }
                if (!essay.trim()) { setError("⚠️ Escribe algo en el ensayo."); return; }
                
                setLoading(true); 
                setError(null);

                let slideCount = 7;
                let formatInstructions = "un carrusel de Instagram de **exactamente 7 láminas** que sea visualmente dinámico, elegante y adictivo de leer.";
                let ctaInstruction = "Cierre potente + CTA estratégico enfocado en los productos o comunidad de Self Love Club (SIN mencionar nombres personales). **CRÍTICO: 'Self Love Club' DEBE estar siempre en la MISMA LÍNEA, NUNCA separado**. Ejemplos: 'Descubre cómo en Self Love Club transformas tu relación contigo mismo.' o 'Tu próximo nivel espera en Self Love Club.'";
                let densityInstruction = "Máximo 4 líneas de texto por lámina, con variación de densidad.";

                if (formatType === "story") {
                    slideCount = 4;
                    formatInstructions = "un carrusel Stories de Instagram de **exactamente 4 láminas** (9:16 vertical) con gancho inicial agresivo, texto muy conciso y CTA claro.";
                    ctaInstruction = "Cierre con CTA urgente y conversión directa a Self Love Club. **CRÍTICO: 'Self Love Club' DEBE estar siempre en la MISMA LÍNEA, NUNCA separado**. Ejemplos: 'Accede ahora a Self Love Club.' o 'Tu transformación comienza en Self Love Club.'";
                    densityInstruction = "Máximo 3 líneas por lámina. Texto MUY conciso (1-2 palabras por línea cuando sea posible).";
                }

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${userApiKey}`, {
                        method: 'POST', 
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `
Actúa como Clarity Strategist senior de Self Love Club (tono profundo, elegante, estratégico y nunca superficial).

Tu misión: transformar el ensayo en ${formatInstructions}

REGLAS OBLIGATORIAS:
- ${densityInstruction}
- Usa saltos de línea naturales (\\n) para que el texto respire. Nunca un párrafo largo.
- Las preguntas deben ir en su propia línea, grandes y potentes.
- **REGLA CRÍTICA PARA LISTAS: SOLO usa guiones (-) para viñetas. UNA SOLA VIÑETA O NÚMERO POR ÍTEM. CERO REDUNDANCIAS TIPOGRÁFICAS. Si es una lista numerada, usa "1. 2. 3." ÚNICAMENTE. Nunca mezcles "-" con "•" con números.**
- Usa **negritas** solo en las frases más importantes.
- Títulos disruptivos pero elegantes (nunca clickbait barato).
- **REGLA CRÍTICA DE COHERENCIA: "Self Love Club" NUNCA debe estar separado en dos líneas. Si una línea termina en "en el" o "en", la siguiente línea DEBE comenzar con "Self Love Club", no con "Self" solamente.**

REGLA ESPECIAL PARA LA LÁMINA 1 (GANCHO):
- Debe tener TÍTULO grande + una pregunta fuerte o un insight poderoso que dé valor inmediato.
- Nunca solo título. La primera lámina tiene que hacer que la persona se detenga y quiera seguir leyendo.

TIPOS DE LÁMINAS QUE DEBES VARIAR:
1. Gancho poderoso (título + pregunta o insight que enganche y dé valor)
2. Pregunta fuerte o insight que golpea
3. Explicación profunda con 2-3 líneas cortas
4. Lista corta y clara (máximo 3-4 ítems, SOLO guiones o SOLO números)
5. El giro / la clave transformadora
6. Ejercicio o acción práctica (con pasos numerados si aplica)
7. ${ctaInstruction}

Ensayo original:
${essay}

Responde ÚNICAMENTE con un JSON válido:
{
  "slides": [
    {
      "title": "Título de la lámina 1",
      "subtitle": "Subtítulo opcional (puede estar vacío)",
      "body": "Línea 1\\nLínea 2\\nLínea 3\\nLínea 4 (usa \\\\n para saltos)"
    }
  ]
}
` }] }],
                            generationConfig: { 
                                responseMimeType: "application/json", 
                                temperature: 0.5
                            }
                        })
                    });
                    
                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);
                    
                    const rawJson = data.candidates[0].content.parts[0].text;
                    const cleanJson = rawJson.replace(/```json|```/g, "").trim();
                    const parsed = JSON.parse(cleanJson);
                    
                    if (parsed.slides && parsed.slides.length === slideCount) {
                        setSlides(parsed.slides);
                        setCurrentSlide(0);
                    } else {
                        throw new Error(`El JSON debe tener exactamente ${slideCount} slides. Recibido: ${parsed.slides?.length || 0}`);
                    }
                } catch (err) { 
                    setError("Error de Generación: " + err.message); 
                } finally { 
                    setLoading(false); 
                }
            };
            
            const polishSlide = async () => {
                if (!slides || !userApiKey.trim()) return;
                setPolishing(true);
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${userApiKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: "Improve the wording of this slide to be more impactful for Instagram. CRITICAL: 'Self Love Club' must never be separated across lines. Return JSON: " + JSON.stringify(slides[currentSlide]) }] }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    const data = await response.json();
                    const cleanJson = data.candidates[0].content.parts[0].text.replace(/```json|```/g, "").trim();
                    const refined = JSON.parse(cleanJson);
                    const newSlides = [...slides]; 
                    newSlides[currentSlide] = { ...slides[currentSlide], ...refined };
                    setSlides(newSlides);
                } catch (err) { 
                    setError("Error al pulir: " + err.message); 
                } finally { 
                    setPolishing(false); 
                }
            };

            const toggleNarration = () => {
                if (!slides) return;
                if (isSpeaking) { window.speechSynthesis.cancel(); setIsSpeaking(false); return; }
                const slide = slides[currentSlide];
                const textToSpeak = `${slide.title || ''}. ${slide.subtitle || ''}. ${slide.body || ''}`;
                const utterance = new SpeechSynthesisUtterance(textToSpeak); 
                utterance.lang = 'es-ES';
                utterance.onend = () => setIsSpeaking(false);
                window.speechSynthesis.speak(utterance); 
                setIsSpeaking(true);
            };

            // NUEVO: Guardar a batch con actualización
            const saveToBatch = () => {
                if (!slides) return;
                const newBatch = [...batchData];
                newBatch.push({ 
                    title: slides[0].title, 
                    slides, 
                    date: new Date().toISOString(),
                    format: formatType,
                    style: currentStyle
                });
                setBatchData(newBatch);
                localStorage.setItem('cl_batch', JSON.stringify(newBatch));
                setError(null);
                alert("¡Carrusel guardado en tu lote! 🚀");
            };

            // NUEVO: Eliminar de batch
            const deleteFromBatch = (idx) => {
                const newBatch = batchData.filter((_, i) => i !== idx);
                setBatchData(newBatch);
                localStorage.setItem('cl_batch', JSON.stringify(newBatch));
            };

            // NUEVO: Regenerar desde batch
            const regenerateFromBatch = (idx) => {
                const item = batchData[idx];
                setSlides(item.slides);
                setCurrentSlide(0);
                setFormatType(item.format);
                setCurrentStyle(item.style);
                setShowBatchModal(false);
            };

            // NUEVO: Exportar batch individual
            const exportBatchItem = async (idx) => {
                const item = batchData[idx];
                const zip = new JSZip();
                try {
                    for (let i = 0; i < item.slides.length; i++) {
                        setCurrentSlide(i);
                        // Aquí habría que renderizar, pero es complejo sin acceso al DOM
                        // Por ahora, solo creamos un JSON con los slides
                    }
                    zip.file('carrusel-data.json', JSON.stringify(item, null, 2));
                    const content = await zip.generateAsync({type: "blob"});
                    const link = document.createElement("a");
                    link.href = URL.createObjectURL(content);
                    link.download = `${item.title.replace(/\s+/g, '-')}-carrusel.zip`;
                    link.click();
                } catch (err) {
                    setError("Error al exportar: " + err.message);
                }
            };

            return (
                <div className="min-h-screen bg-kineticDark text-slate-200 font-sans selection:bg-kinetic selection:text-white pb-20">
                    <nav className="border-b border-slate-800 bg-[#0b1121] py-5 px-8 flex justify-between items-center sticky top-0 z-50 shadow-lg">
                        <div className="flex items-center gap-4">
                            <span className="font-serif font-bold text-2xl tracking-wide text-white">Kinetic Clarity</span>
                        </div>
                        <div className="flex items-center gap-4">
                            <img src="/assets/images/andres-ramirez-portrait.jpg" className="w-11 h-11 rounded-full border-2 border-slate-700 shadow-md object-cover" />
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto p-8 mt-6 grid grid-cols-1 lg:grid-cols-12 gap-12">
                        <div className="lg:col-span-5 space-y-6">
                            <div className="bg-surface p-8 rounded-3xl shadow-2xl border border-slate-800 relative overflow-hidden fade-in">
                                <h2 className="text-3xl font-serif font-bold mb-8 text-white">Panel de Control</h2>
                                <div className="space-y-6 relative z-10">
                                    <div className="space-y-2">
                                        <label className="text-[10px] uppercase tracking-widest text-slate-500 font-bold ml-1">Google API Key</label>
                                        <input type="password" 
                                            className="w-full bg-[#0b1121] border border-slate-700 rounded-xl p-3 text-sm focus:border-kinetic outline-none transition-all" 
                                            placeholder="Ingresa tu clave aquí..." 
                                            value={userApiKey} 
                                            onChange={(e) => setUserApiKey(e.target.value)} 
                                        />
                                    </div>

                                    <div className="space-y-2">
                                        <label className="text-[10px] uppercase tracking-widest text-slate-500 font-bold ml-1">Modelo de Generación</label>
                                        <div className="flex gap-2">
                                            <select 
                                                value={selectedModel} 
                                                onChange={(e) => setSelectedModel(e.target.value)} 
                                                className="flex-1 bg-[#0b1121] border border-slate-700 rounded-xl p-3 text-sm focus:border-kinetic outline-none"
                                            >
                                                {availableModels.map(m => (
                                                    <option key={m.id} value={m.id}>{m.name}</option>
                                                ))}
                                            </select>
                                            <button 
                                                onClick={listAvailableModels}
                                                className="bg-[#0b1121] border border-slate-700 p-3 rounded-xl hover:text-kinetic transition-colors"
                                                title="Refrescar modelos"
                                            >
                                                <i className={`fa-solid fa-rotate ${listingModels ? 'fa-spin' : ''}`}></i>
                                            </button>
                                        </div>
                                    </div>

                                    {error && (
                                        <div className="bg-red-500/10 border border-red-500/50 text-red-400 p-4 rounded-xl text-xs font-medium animate-pulse">
                                            {error}
                                        </div>
                                    )}

                                    <div className="space-y-2">
                                        <label className="text-[10px] uppercase tracking-widest text-slate-500 font-bold ml-1">Formato de Generación</label>
                                        <div className="flex gap-2">
                                            <button 
                                                onClick={() => setFormatType("post")}
                                                className={`flex-1 py-2 rounded-lg text-[10px] font-bold border transition-all ${formatType === "post" ? 'bg-kinetic text-white border-kinetic shadow-lg' : 'bg-[#0b1121] text-slate-400 border-slate-700 hover:border-slate-600'}`}
                                            >
                                                📱 Post (1:1, 7 slides)
                                            </button>
                                            <button 
                                                onClick={() => setFormatType("story")}
                                                className={`flex-1 py-2 rounded-lg text-[10px] font-bold border transition-all ${formatType === "story" ? 'bg-kinetic text-white border-kinetic shadow-lg' : 'bg-[#0b1121] text-slate-400 border-slate-700 hover:border-slate-600'}`}
                                            >
                                                📖 Story (9:16, 4 slides)
                                            </button>
                                        </div>
                                    </div>

                                    <div className="space-y-2">
                                        <label className="text-[10px] uppercase tracking-widest text-slate-500 font-bold ml-1">Quick Presets</label>
                                        <div className="grid grid-cols-2 gap-2">
                                            {Object.entries(quickPresets).map(([key, preset]) => (
                                                <button
                                                    key={key}
                                                    onClick={() => setEssay(preset.text)}
                                                    className="py-2 px-3 rounded-lg text-[9px] font-bold bg-[#0b1121] text-slate-300 border border-slate-700 hover:border-kinetic hover:text-kinetic transition-all"
                                                    title={preset.title}
                                                >
                                                    {preset.title}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="space-y-2">
                                        <label className="text-[10px] uppercase tracking-widest text-slate-500 font-bold ml-1">Estilo Visual</label>
                                        <div className="grid grid-cols-3 gap-2">
                                            {Object.keys(stylesConfig).map(s => (
                                                <button key={s} onClick={() => setCurrentStyle(s)} className={`py-2 rounded-lg text-[10px] font-bold border transition-all ${currentStyle === s ? 'bg-kinetic text-white border-kinetic shadow-lg scale-105' : 'bg-[#0b1121] text-slate-400 border-slate-700'}`}>{s.toUpperCase()}</button>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="space-y-2">
                                        <label className="text-[10px] uppercase tracking-widest text-slate-500 font-bold ml-1">Contenido Base (Ensayo)</label>
                                        <textarea 
                                            className="w-full h-40 p-5 bg-[#0b1121] border border-slate-700 rounded-2xl text-sm focus:border-kinetic outline-none resize-none" 
                                            placeholder="Pega aquí el texto que quieres transformar..." 
                                            value={essay} 
                                            onChange={(e) => setEssay(e.target.value)} 
                                        />
                                    </div>

                                    <div className="flex gap-2">
                                        <button 
                                            onClick={generateCarousel} 
                                            disabled={loading} 
                                            className="flex-1 py-4 bg-white text-kineticDark rounded-xl font-black text-[10px] uppercase tracking-widest hover:bg-kinetic hover:text-white transition-all transform active:scale-95 shadow-xl disabled:opacity-50"
                                        >
                                            {loading ? <i className="fa-solid fa-circle-notch fa-spin mr-2"></i> : "GENERAR"}
                                        </button>
                                        
                                        <button 
                                            onClick={saveToBatch}
                                            disabled={!slides}
                                            className="px-6 py-4 bg-slate-800 text-white rounded-xl font-black text-[10px] uppercase tracking-widest hover:bg-emerald-600 transition-all active:scale-95 disabled:opacity-30"
                                            title="Guardar para programar"
                                        >
                                            <i className="fa-solid fa-bookmark"></i>
                                        </button>
                                        
                                        <button 
                                            onClick={() => setShowBatchModal(true)}
                                            className="px-6 py-4 bg-purple-700 text-white rounded-xl font-black text-[10px] uppercase tracking-widest hover:bg-purple-600 transition-all active:scale-95"
                                            title="Ver mis carruseles"
                                        >
                                            <i className="fa-solid fa-list"></i> {batchData.length}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="lg:col-span-7 flex flex-col items-center">
                            {slides ? (
                                <div className="flex flex-col items-center gap-8 w-full fade-in">
                                    <div className={`w-full flex justify-between items-center bg-surface p-3 rounded-2xl border border-slate-800 shadow-xl flex-wrap gap-2 ${formatType === "story" ? "max-w-[310px]" : "max-w-[520px]"}`}>
                                        <div className="flex gap-2">
                                            <button onClick={polishSlide} disabled={polishing} className="bg-[#0b1121] text-slate-300 px-4 py-2 rounded-xl text-xs font-bold border border-slate-700 hover:border-kinetic transition-all">
                                                {polishing ? <i className="fa-solid fa-wand-magic-sparkles fa-spin"></i> : "Pulir"}
                                            </button>
                                            <button onClick={toggleNarration} className="bg-[#0b1121] text-slate-300 px-4 py-2 rounded-xl text-xs font-bold border border-slate-700 hover:border-kinetic transition-all">
                                                {isSpeaking ? <i className="fa-solid fa-stop"></i> : <i className="fa-solid fa-volume-high"></i>}
                                            </button>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={exportAsJpg} className="bg-kinetic text-white px-5 py-2 rounded-xl font-bold text-xs shadow-lg hover:brightness-110 transition-all">JPG</button>
                                            <button onClick={downloadAllAsZip} className="bg-emerald-600 text-white px-5 py-2 rounded-xl font-bold text-xs shadow-lg hover:brightness-110 transition-all">ZIP</button>
                                            {formatType === "story" && (
                                                <button 
                                                    onClick={() => setShowVideoModal(true)}
                                                    className="bg-orange-600 text-white px-5 py-2 rounded-xl font-bold text-xs shadow-lg hover:brightness-110 transition-all"
                                                >
                                                    🎬 Video
                                                </button>
                                            )}
                                        </div>
                                    </div>

                                    <div ref={slideRef} className={`${slideDimensions.width} ${slideDimensions.height} ${stylesConfig[currentStyle].container} shadow-2xl flex flex-col ${slideDimensions.padding} relative overflow-hidden transition-all duration-700 ease-in-out`}>
                                        <div className="flex justify-between items-center z-10 flex-none mb-6">
                                            <span className={`text-[9px] uppercase tracking-[0.4em] opacity-40 ${stylesConfig[currentStyle].fontBody}`}>Self Love Club</span>
                                            <div className={`w-2 h-2 rounded-full ${stylesConfig[currentStyle].accent}`}></div>
                                        </div>

                                        <AutoFitContent isCenter={currentSlide === 0 || currentSlide === slides.length - 1}>
                                            <div className={`w-12 h-1 flex-none ${stylesConfig[currentStyle].accent} mb-4 ${ (currentSlide === 0 || currentSlide === slides.length - 1) ? 'mx-auto' : ''}`}></div>
                                            { (currentSlide === 0 || (slides[currentSlide].title && !slides[currentSlide].body)) ? (
                                                <div className="space-y-4">
                                                    <h3 className={`text-4xl sm:text-5xl flex-none leading-[1.05] ${stylesConfig[currentStyle].fontHeading}`}>{slides[currentSlide].title}</h3>
                                                    {slides[currentSlide].subtitle && (
                                                        <p className={`text-lg sm:text-xl opacity-60 italic ${stylesConfig[currentStyle].fontBody}`}>{slides[currentSlide].subtitle}</p>
                                                    )}
                                                </div>
                                            ) : (
                                                <div className={`text-xl sm:text-2xl opacity-90 ${stylesConfig[currentStyle].fontBody}`}>
                                                    {formatText(slides[currentSlide].body || slides[currentSlide].content)}
                                                </div>
                                            )}
                                        </AutoFitContent>

                                        <div className={`flex items-center justify-between border-t ${stylesConfig[currentStyle].border} pt-6 mt-auto flex-none z-10`}>
                                            <div className="flex items-center gap-3">
                                                <img src="/assets/images/andres-ramirez-portrait.jpg" className={`w-12 h-12 rounded-full border border-current grayscale-editorial object-cover`} />
                                                <div className="flex flex-col text-left">
                                                    <span className={`text-[10px] font-bold tracking-wider uppercase ${stylesConfig[currentStyle].fontBody}`}>Andrés Ramírez</span>
                                                    <span className={`text-[8px] font-semibold opacity-40 uppercase tracking-widest ${stylesConfig[currentStyle].fontBody}`}>Clarity Strategist</span>
                                                </div>
                                            </div>
                                            <div className={`px-4 py-1.5 rounded-full text-[8px] ${stylesConfig[currentStyle].tag}`}>0{currentSlide + 1}</div>
                                        </div>
                                    </div>

                                    <div className="flex items-center gap-6 bg-surface p-3 rounded-full border border-slate-800 shadow-2xl">
                                        <button onClick={() => setCurrentSlide(p => Math.max(0, p - 1))} className="w-10 h-10 rounded-full bg-[#0b1121] flex items-center justify-center text-slate-400 hover:text-kinetic transition-colors"><i className="fa-solid fa-chevron-left"></i></button>
                                        <div className="flex gap-2">
                                            {slides.map((_, i) => (
                                                <div key={i} onClick={() => setCurrentSlide(i)} className={`h-1.5 rounded-full cursor-pointer transition-all duration-300 ${currentSlide === i ? 'w-8 bg-kinetic shadow-[0_0_10px_rgba(168,85,247,0.5)]' : 'w-2 bg-slate-600 hover:bg-slate-400'}`} />
                                            ))}
                                        </div>
                                        <button onClick={() => setCurrentSlide(p => Math.min(slides.length - 1, p + 1))} className="w-10 h-10 rounded-full bg-[#0b1121] flex items-center justify-center text-slate-400 hover:text-kinetic transition-colors"><i className="fa-solid fa-chevron-right"></i></button>
                                    </div>
                                </div>
                            ) : (
                                <div className={`${slideDimensions.height} w-full ${formatType === "story" ? "max-w-[310px]" : "max-w-[520px]"} flex flex-col justify-center items-center text-center p-12 border border-slate-800 bg-surface/30 backdrop-blur-sm shadow-inner`}>
                                    <div className="w-20 h-20 bg-slate-800/50 rounded-full flex items-center justify-center mb-8 border border-slate-700">
                                        <i className="fa-solid fa-wand-sparkles text-3xl text-slate-500"></i>
                                    </div>
                                    <h3 className="text-2xl font-serif text-white italic mb-2 tracking-wide">Clarity Engine</h3>
                                    <p className="text-slate-500 text-sm max-w-[250px] leading-relaxed">Tu visión estratégica convertida en narrativa visual cinética.</p>
                                    <div className="mt-12 flex gap-2">
                                        <div className="w-2 h-2 rounded-full bg-slate-700 animate-bounce" style={{animationDelay: '0ms'}}></div>
                                        <div className="w-2 h-2 rounded-full bg-slate-700 animate-bounce" style={{animationDelay: '150ms'}}></div>
                                        <div className="w-2 h-2 rounded-full bg-slate-700 animate-bounce" style={{animationDelay: '300ms'}}></div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>

                    <BatchModal 
                        isOpen={showBatchModal}
                        onClose={() => setShowBatchModal(false)}
                        batch={batchData}
                        onDelete={deleteFromBatch}
                        onRegenerate={regenerateFromBatch}
                        onExport={exportBatchItem}
                    />

                    <VideoCompilationModal 
                        isOpen={showVideoModal}
                        onClose={() => setShowVideoModal(false)}
                        onCreateGif={createGifAnimation}
                        onDownloadImages={downloadSequentialImages}
                        isProcessing={processingVideo}
                    />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
