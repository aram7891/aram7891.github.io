<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Kinetic Clarity Engine — Clarity Strategist</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

  <style>
    .font-serif { font-family: 'Playfair Display', serif; }
    .font-sans { font-family: 'Inter', sans-serif; }
    .slide-image {
      width: 100%;
      height: 260px;
      object-fit: cover;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans selection:bg-purple-200">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
  import React, { useState, useRef, useEffect } from 'https://esm.sh/react@18';
  import { createRoot } from 'https://esm.sh/react-dom@18/client';
  import { Sparkles, Loader2, Send, ChevronLeft, ChevronRight, Key, Eye, EyeOff } from 'https://esm.sh/lucide-react@0.263';

  const MODEL_NAME = "gemini-2.5-pro";

  const App = () => {
    const [apiKey, setApiKey] = useState(localStorage.getItem('kinetic_api_key') || "");
    const [showKey, setShowKey] = useState(false);
    const [essay, setEssay] = useState("");
    const [loading, setLoading] = useState(false);
    const [slides, setSlides] = useState(null);
    const [currentSlide, setCurrentSlide] = useState(0);
    const [error, setError] = useState(null);
    const [currentStyle, setCurrentStyle] = useState("Kinetic");
    const slideRef = useRef(null);

    useEffect(() => { if (apiKey) localStorage.setItem('kinetic_api_key', apiKey); }, [apiKey]);

    const stylesConfig = {
      Kinetic: { container: "bg-[#0f172a] text-[#f8fafc]", accent: "bg-[#a855f7]", border: "border-slate-800", fontHeading: "font-serif", fontBody: "font-sans", tag: "bg-[#a855f7] text-white" },
      ClarityWhite: { container: "bg-white text-slate-900", accent: "bg-blue-600", border: "border-slate-100", fontHeading: "font-sans font-black", fontBody: "font-sans", tag: "bg-slate-900 text-white" },
      NoirGold: { container: "bg-[#050816] text-[#f9fafb]", accent: "bg-[#fbbf24]", border: "border-[#111827]", fontHeading: "font-serif", fontBody: "font-sans", tag: "bg-[#fbbf24] text-black" }
    };

    const generateCarousel = async () => {
      if (!essay.trim() || !apiKey.trim()) {
        setError("Falta API Key o contenido");
        return;
      }

      setLoading(true);
      setError(null);

      // === PROMPT MUCHO MÁS FUERTE ===
      const systemInstruction = `Eres un estratega premium para Andrés Ramírez.
Transforma el texto en EXACTAMENTE 7 slides para Instagram.

REGLAS OBLIGATORIAS:
- Slide 1: Hook potente
- Slide 2: Debe tener una imagen relevante (campo "image" con URL real de Unsplash o similar)
- Slides 3,4,5: Contenido normal
- Slide 6: Debe tener una imagen relevante (campo "image")
- Slide 7: Cierre fuerte
- Las imágenes deben estar PERFECTAMENTE relacionadas con el tema de esa slide.
- Usa URLs públicas reales y bonitas.

Devuelve SOLO JSON válido:
{"slides": [ { "title": "", "subtitle": "", "body": "", "image": "https://...", "slideNumber": 1 }, ... ]}`;

      try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${apiKey.trim()}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contents: [{ parts: [{ text: essay }] }],
            systemInstruction: { parts: [{ text: systemInstruction }] },
            generationConfig: { 
              responseMimeType: "application/json",
              temperature: 0.6
            }
          })
        });

        const result = await response.json();
        if (result.error) throw new Error(result.error.message);

        const parsed = JSON.parse(result.candidates[0].content.parts[0].text);
        
        if (!parsed.slides || parsed.slides.length !== 7) {
          throw new Error("Gemini no devolvió 7 slides");
        }

        setSlides(parsed.slides);
        setCurrentSlide(0);
      } catch (e) {
        setError("Error: " + e.message);
      } finally {
        setLoading(false);
      }
    };

    const currentTheme = stylesConfig[currentStyle];

    return (
      <div className="min-h-screen">
        <nav className="bg-white border-b border-slate-200 py-4 px-6 flex justify-between items-center sticky top-0 z-50 shadow-sm">
          <div className="flex items-center gap-3">
            <div className="bg-slate-900 p-2 rounded-xl"><Sparkles className="text-purple-400 w-5 h-5" /></div>
            <span className="font-black text-lg tracking-tighter uppercase">Kinetic Engine</span>
          </div>
          <img src="/assets/images/andres-ramirez-portrait.jpg" className="w-10 h-10 rounded-full border-2 border-slate-100 object-cover" onError={e => e.target.src = "https://ui-avatars.com/api/?name=Andres+Ramirez&background=0f172a&color=fff"} />
        </nav>

        <main className="max-w-7xl mx-auto p-6 md:p-10 grid grid-cols-1 lg:grid-cols-12 gap-10">
          {/* Panel izquierdo */}
          <div className="lg:col-span-5 space-y-6">
            <div className="bg-white p-5 rounded-3xl border border-slate-200 shadow-sm">
              <div className="relative">
                <input 
                  type={showKey ? "text" : "password"} 
                  value={apiKey} 
                  onChange={(e) => setApiKey(e.target.value)} 
                  placeholder="Pega tu Gemini API Key" 
                  className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-mono"
                />
                <button onClick={() => setShowKey(!showKey)} className="absolute right-4 top-4 text-slate-400">{showKey ? "🙈" : "👁️"}</button>
              </div>
            </div>

            <div className="bg-white p-8 rounded-[32px] border border-slate-100 shadow-xl">
              <div className="flex gap-2 mb-6">
                {Object.keys(stylesConfig).map(style => (
                  <button key={style} onClick={() => setCurrentStyle(style)} className={`flex-1 py-3 rounded-xl text-xs font-black ${currentStyle === style ? "bg-slate-900 text-white" : "bg-slate-100"}`}>{style}</button>
                ))}
              </div>

              <textarea 
                className="w-full h-80 p-6 bg-slate-50 border border-slate-200 rounded-2xl text-sm" 
                value={essay} 
                onChange={(e) => setEssay(e.target.value)} 
                placeholder="Pega tu contenido aquí..."
              />

              <button 
                onClick={generateCarousel} 
                disabled={loading || !essay.trim()} 
                className="w-full mt-6 py-5 bg-blue-600 text-white rounded-2xl font-black flex items-center justify-center gap-3 disabled:opacity-50"
              >
                {loading ? <Loader2 className="animate-spin" /> : <Send />} 
                {loading ? "GENERANDO..." : "GENERAR CARRUSEL"}
              </button>

              {error && <p className="text-red-600 mt-4 text-sm font-medium">{error}</p>}
            </div>
          </div>

          {/* Preview con imágenes mejoradas */}
          <div className="lg:col-span-7 flex flex-col items-center">
            {slides ? (
              <div className="w-full max-w-[480px] space-y-6">
                <div className="flex justify-between items-center bg-white p-4 rounded-2xl border">
                  <div className="flex items-center gap-4">
                    <button onClick={() => setCurrentSlide(s => Math.max(0, s-1))}><ChevronLeft size={26}/></button>
                    <span className="font-black text-lg">{currentSlide + 1} / 7</span>
                    <button onClick={() => setCurrentSlide(s => Math.min(6, s+1))}><ChevronRight size={26}/></button>
                  </div>
                </div>

                <div ref={slideRef} className={`w-[480px] h-[600px] ${currentTheme.container} rounded-[40px] shadow-2xl p-10 flex flex-col relative`}>
                  <div className="flex justify-between mb-6">
                    <div className="text-xs font-black tracking-widest opacity-40">Self Love Club</div>
                    <div className={`w-8 h-1 ${currentTheme.accent} rounded-full`} />
                  </div>

                  {/* Imagen mejorada */}
                  {slides[currentSlide].image && (
                    <img src={slides[currentSlide].image} className="slide-image" alt="Imagen temática" />
                  )}

                  <h3 className={`text-4xl font-black mt-6 mb-4 ${currentTheme.fontHeading}`}>{slides[currentSlide].title}</h3>
                  <p className={`text-[17px] leading-relaxed ${currentTheme.fontBody}`}>{slides[currentSlide].body || slides[currentSlide].subtitle}</p>

                  <div className={`mt-auto flex justify-between border-t ${currentTheme.border} pt-6`}>
                    <div className="flex items-center gap-3">
                      <img src="/assets/images/andres-ramirez-portrait.jpg" className="w-10 h-10 rounded-full" onError={e => e.target.src = "https://ui-avatars.com/api/?name=Andres+Ramirez"} />
                      <div>
                        <p className="font-bold">Andrés Ramírez</p>
                        <p className="text-xs opacity-60">Clarity Strategist</p>
                      </div>
                    </div>
                    <div className={`px-5 py-1 rounded-full text-xs font-black ${currentTheme.tag}`}>0{slides[currentSlide].slideNumber}</div>
                  </div>
                </div>
              </div>
            ) : (
              <div className="w-[480px] h-[600px] border-4 border-dashed border-slate-300 rounded-[40px] flex items-center justify-center text-slate-400">
                Genera el carrusel primero
              </div>
            )}
          </div>
        </main>
      </div>
    );
  };

  const root = createRoot(document.getElementById('root'));
  root.render(<App />);
  </script>
</body>
</html>
