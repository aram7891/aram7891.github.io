<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratorio de Claridad</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital@0;1&family=Instrument+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --parchment: #F7F4EF;
            --ink: #1A1814;
            --amber: #8B6F4E;
            --sand: #C4A882;
            --thin-line: 1px solid #D4CFCA;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            background-color: var(--parchment);
            color: var(--ink);
            font-family: 'Instrument Sans', sans-serif;
            font-size: 15px;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* HEADER */
        .header {
            padding: 2.5rem 5%;
            border-bottom: var(--thin-line);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .header-left h1 {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 2rem;
            font-weight: 400;
            color: var(--ink);
            margin-bottom: 0.4rem;
            letter-spacing: -0.5px;
        }

        .header-left p {
            font-size: 13px;
            color: var(--amber);
            font-family: 'Instrument Sans', sans-serif;
            font-weight: 400;
            letter-spacing: 0.3px;
        }

        .header-right {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .lang-toggle {
            display: flex;
            gap: 0.8rem;
            align-items: center;
        }

        .lang-toggle button {
            background: none;
            border: none;
            font-family: 'DM Mono', monospace;
            font-size: 13px;
            font-weight: 500;
            color: var(--sand);
            cursor: pointer;
            padding: 0.3rem 0.6rem;
            transition: all 0.2s ease;
            border-bottom: 2px solid transparent;
        }

        .lang-toggle button.active {
            color: var(--ink);
            border-bottom-color: var(--amber);
        }

        /* MAIN CONTAINER */
        .container {
            display: flex;
            height: calc(100vh - 100px);
        }

        .modules-panel {
            width: 22%;
            border-right: var(--thin-line);
            padding: 2rem 5%;
            overflow-y: auto;
        }

        .modules-panel h3 {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--sand);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1.5rem;
        }

        .module-btn {
            display: block;
            width: 100%;
            padding: 1.2rem;
            margin-bottom: 1rem;
            background: transparent;
            border: var(--thin-line);
            border-left: 3px solid transparent;
            cursor: pointer;
            text-align: left;
            transition: all 0.25s ease;
        }

        .module-btn h4 {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 1.1rem;
            color: var(--ink);
            margin-bottom: 0.3rem;
        }

        .module-btn p {
            font-size: 12px;
            color: var(--sand);
        }

        .module-btn.active {
            border-left-color: var(--amber);
            background-color: rgba(139, 111, 78, 0.05);
        }

        .workspace {
            flex: 1;
            padding: 3rem 5%;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .workspace-header h2 {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .textarea-wrapper textarea {
            width: 100%;
            min-height: 180px;
            padding: 1.5rem;
            font-family: 'Instrument Sans', sans-serif;
            background-color: var(--parchment);
            border: var(--thin-line);
            resize: none;
            color: var(--ink);
        }

        .response-mode-section {
            margin: 2rem 0;
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .segmented-control {
            display: flex;
            border: var(--thin-line);
        }

        .mode-btn {
            padding: 0.6rem 1.2rem;
            border: none;
            background: transparent;
            cursor: pointer;
            font-family: 'Instrument Sans', sans-serif;
            color: var(--sand);
        }

        .mode-btn.active {
            background-color: var(--ink);
            color: var(--parchment);
        }

        .actions {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: var(--thin-line);
            background: var(--parchment);
            cursor: pointer;
            font-weight: 500;
        }

        .btn.primary {
            background-color: var(--ink);
            color: var(--parchment);
        }

        .output-content {
            border: var(--thin-line);
            padding: 1.5rem;
            min-height: 200px;
            white-space: pre-wrap;
        }

        .history-panel {
            width: 20%;
            border-left: var(--thin-line);
            padding: 2rem 5%;
            background-color: rgba(139, 111, 78, 0.02);
        }

        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .modules-panel, .history-panel { width: 100%; border-right: none; }
            .history-panel { display: none; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <h1 data-es="Laboratorio de Claridad" data-en="Laboratory of Clarity">Laboratorio de Claridad</h1>
            <p data-es="Arquitectura mental para decisiones complejas." data-en="Mental architecture for complex decisions.">Arquitectura mental para decisiones complejas.</p>
        </div>
        <div class="header-right">
            <div class="lang-toggle">
                <button id="lang-es" class="active" onclick="setLanguage('es')">ES</button>
                <button id="lang-en" onclick="setLanguage('en')">EN</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="modules-panel">
            <h3 data-es="Módulos" data-en="Modules">Módulos</h3>
            <button class="module-btn active" onclick="selectModule('clarity')">
                <h4 data-es="01. Protocolo de Claridad" data-en="01. Clarity Protocol">01. Protocolo de Claridad</h4>
                <p data-es="Analiza y refina tu pensamiento" data-en="Analyze and refine your thinking">Analiza y refina tu pensamiento</p>
            </button>
            <button class="module-btn" onclick="selectModule('field-note')">
                <h4 data-es="02. Nota de Campo" data-en="02. Field Note">02. Nota de Campo</h4>
                <p data-es="Ensayo premium sobre tema" data-en="Premium essay on topic">Ensayo premium sobre tema</p>
            </button>
            <button class="module-btn" onclick="selectModule('hygiene')">
                <h4 data-es="03. Higiene Decisional" data-en="03. Decision Hygiene">03. Higiene Decisional</h4>
                <p data-es="Evalúa riesgos y sesgos" data-en="Evaluate risks and biases">Evalúa riesgos y sesgos</p>
            </button>
        </div>

        <div class="workspace">
            <div class="workspace-header">
                <h2 id="workspace-title">Protocolo de Claridad</h2>
                <p id="workspace-desc">Análisis estructurado de intención y debilidades lógicas.</p>
            </div>

            <div class="input-section">
                <div class="textarea-wrapper">
                    <textarea id="user-input" placeholder="Escribe aquí..."></textarea>
                </div>
            </div>

            <div class="response-mode-section">
                <label class="mode-label">Tono de respuesta:</label>
                <div class="segmented-control">
                    <button class="mode-btn active" id="mode-soft" onclick="setResponseMode('soft')">Suave</button>
                    <button class="mode-btn" id="mode-brutal" onclick="setResponseMode('brutal')">Brutal</button>
                </div>
            </div>

            <div class="actions">
                <button class="btn primary" onclick="analyzeText()">Analizar</button>
                <button class="btn" onclick="clearInput()">Limpiar</button>
            </div>

            <div class="output-section">
                <div class="output-content" id="output">Listo para analizar.</div>
            </div>
        </div>

        <div class="history-panel">
            <h3>Historial</h3>
            <div id="history-list"></div>
        </div>
    </div>

    <script>
        let currentLanguage = 'es';
        let currentModule = 'clarity';
        let currentResponseMode = 'soft';

        const moduleData = {
            clarity: { es: { title: "Protocolo de Claridad", desc: "Análisis estructurado de intención y debilidades lógicas." }, en: { title: "Clarity Protocol", desc: "Structured analysis of intent and logical weaknesses." }},
            'field-note': { es: { title: "Nota de Campo", desc: "Ensayo premium sobre un tema específico." }, en: { title: "Field Note", desc: "Premium essay on a specific topic." }},
            hygiene: { es: { title: "Higiene Decisional", desc: "Evalúa riesgos y sesgos en tu situación." }, en: { title: "Decision Hygiene", desc: "Evaluate risks and biases in your situation." }}
        };

        function setLanguage(lang) {
            currentLanguage = lang;
            document.getElementById('lang-es').classList.toggle('active', lang === 'es');
            document.getElementById('lang-en').classList.toggle('active', lang === 'en');
            updateUI();
        }

        function selectModule(module) {
            currentModule = module;
            document.querySelectorAll('.module-btn').forEach((btn, idx) => {
                btn.classList.toggle('active', (idx === 0 && module === 'clarity') || (idx === 1 && module === 'field-note') || (idx === 2 && module === 'hygiene'));
            });
            updateUI();
        }

        function setResponseMode(mode) {
            currentResponseMode = mode;
            document.getElementById('mode-soft').classList.toggle('active', mode === 'soft');
            document.getElementById('mode-brutal').classList.toggle('active', mode === 'brutal');
        }

        function updateUI() {
            const data = moduleData[currentModule][currentLanguage];
            document.getElementById('workspace-title').textContent = data.title;
            document.getElementById('workspace-desc').textContent = data.desc;
        }

        async function analyzeText() {
            const text = document.getElementById('user-input').value;
            const output = document.getElementById('output');
            output.textContent = "Procesando...";

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ module: currentModule, text, language: currentLanguage, responseMode: currentResponseMode })
                });
                const data = await res.json();
                output.textContent = data.response;
            } catch (e) {
                output.textContent = "Error de conexión.";
            }
        }

        function clearInput() {
            document.getElementById('user-input').value = "";
            document.getElementById('output').textContent = "Listo para analizar.";
        }
    </script>
</body>
</html>
