<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratorio de Claridad | Andrés Ramírez</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Instrument+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --parchment: #F7F4EF;
            --ink: #1A1814;
            --amber: #8B6F4E;
            --sand: #C4A882;
            --clarity-blue: #0047AB;
            --thin-line: 1px solid rgba(26, 24, 20, 0.1);
        }
        body {
            background-color: var(--parchment);
            color: var(--ink);
            font-family: 'Instrument Sans', sans-serif;
            font-size: 15px;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .top-bridge {
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: var(--thin-line);
            background: white;
        }
        .back-link {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--sand);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s;
        }
        .back-link:hover { color: var(--clarity-blue); }

        .header {
            padding: 3rem 5% 2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        .header-left h1 {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 2.8rem;
            font-weight: 300;
            line-height: 1;
            margin-bottom: 0.5rem;
        }
        .header-left p {
            font-size: 12px;
            color: var(--amber);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 500;
        }
        .lang-toggle button {
            background: none; border: none; font-family: 'DM Mono', monospace;
            font-size: 12px; color: var(--sand); cursor: pointer; padding: 0.5rem;
        }
        .lang-toggle button.active { color: var(--clarity-blue); font-weight: 600; border-bottom: 1px solid var(--clarity-blue); }

        .main-content { display: flex; flex: 1; min-height: 70vh; border-top: var(--thin-line); border-bottom: var(--thin-line); }

        .modules-panel { width: 25%; border-right: var(--thin-line); padding: 3rem 3%; }
        .section-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--sand); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 2rem; display: block; }
        .module-btn {
            display: block; width: 100%; padding: 1.5rem; margin-bottom: 1rem;
            background: transparent; border: 1px solid transparent; cursor: pointer; text-align: left; transition: all 0.4s;
        }
        .module-btn.active { background: white; border: var(--thin-line); border-left: 3px solid var(--clarity-blue); }
        .module-btn.active h4 { font-style: italic; color: var(--clarity-blue); }

        .workspace { flex: 1; padding: 4rem 8%; display: flex; flex-direction: column; background: white; }
        .textarea-wrapper textarea {
            width: 100%; min-height: 250px; padding: 2rem; font-family: 'Instrument Sans', sans-serif;
            background: var(--parchment); border: var(--thin-line); resize: none; font-size: 16px; outline: none;
        }
        .btn-primary { background: var(--ink); color: var(--parchment); border: none; padding: 0.8rem 2.5rem; font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 1px; cursor: pointer; }
        .btn-primary:hover { background: var(--clarity-blue); }

        .footer {
            padding: 4rem 5%;
            background: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: var(--thin-line);
        }
        .footer-brand { display: flex; align-items: center; gap: 1.5rem; }
        .footer-brand img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; filter: grayscale(100%); }
        .footer-info h5 { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.2rem; font-weight: 400; }
        .footer-info p { font-size: 11px; color: var(--sand); text-transform: uppercase; letter-spacing: 1px; }
        .footer-links { display: flex; gap: 2rem; }
        .footer-links a { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--ink); text-decoration: none; border-bottom: 1px solid transparent; transition: 0.3s; }
        .footer-links a:hover { border-bottom-color: var(--clarity-blue); color: var(--clarity-blue); }

        @media (max-width: 900px) {
            .main-content { flex-direction: column; }
            .modules-panel { width: 100%; border-right: none; }
        }
    </style>
</head>
<body>

    <nav class="top-bridge">
        <a href="https://andresramirez.pro" class="back-link">← Volver a AndresRamirez.pro</a>
        <div class="lang-toggle">
            <button id="lang-es" class="active" onclick="setLanguage('es')">ES</button>
            <button id="lang-en" onclick="setLanguage('en')">EN</button>
        </div>
    </nav>

    <header class="header">
        <div class="header-left">
            <h1 id="main-title">Laboratorio de Claridad</h1>
            <p id="main-subtitle">Arquitectura mental para decisiones complejas</p>
        </div>
    </header>

    <div class="main-content">
        <aside class="modules-panel">
            <span class="section-label" id="label-modules">Módulos</span>
            <button class="module-btn active" onclick="selectModule('clarity', this)">
                <h4 id="m1-title">01. Clarity Protocol</h4>
                <p id="m1-desc">Analyze and refine your thinking</p>
            </button>
            <button class="module-btn" onclick="selectModule('hygiene', this)">
                <h4 id="m2-title">02. Decision Hygiene</h4>
                <p id="m2-desc">Evaluate risks and biases</p>
            </button>
        </aside>

        <main class="workspace">
            <div class="workspace-header" style="margin-bottom: 2rem;">
                <h2 id="workspace-title">Clarity Protocol</h2>
                <p id="workspace-desc">Análisis estructurado de intención y debilidades lógicas.</p>
            </div>

            <div class="textarea-wrapper">
                <textarea id="user-input" placeholder=""></textarea>
            </div>

            <div style="margin-top: 2rem; display: flex; justify-content: space-between; align-items: center;">
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <span style="font-size: 11px; color: var(--sand); font-family: 'DM Mono';" id="label-tone">TONO:</span>
                    <button class="btn-primary" style="padding: 0.5rem 1.5rem; background: #EEEBE6; color: var(--ink);" id="mode-toggle" onclick="toggleTone()">SUAVE</button>
                </div>
                <button class="btn-primary" onclick="analyzeText()" id="btn-analyze">ANALIZAR</button>
            </div>

            <div id="output" style="margin-top: 3rem; font-family: 'Cormorant Garamond'; font-size: 1.3rem; border-top: var(--thin-line); padding-top: 2rem;">
                ...
            </div>

            <!-- 🔥 PANEL DE ERRORES ULTRA CLARO -->
            <div id="error-debug" style="display: none; margin-top: 2rem; padding: 1.5rem; background: #fff0f0; border: 3px solid #c00; border-radius: 12px; font-family: 'DM Mono', monospace; font-size: 13px; line-height: 1.5; color: #300;"></div>
        </main>
    </div>

    <footer class="footer">
        <div class="footer-brand">
            <img src="/assets/images/andres-ramirez-portrait.jpg" alt="Andrés Ramírez">
            <div class="footer-info">
                <h5>Andrés Ramírez</h5>
                <p>Clarity Strategist</p>
            </div>
        </div>
        <div class="footer-links">
            <a href="https://threads.net/@aram7891" target="_blank">THREADS</a>
            <a href="https://instagram.com/selfloveclubusa" target="_blank">INSTAGRAM</a>
            <a href="https://andresramirez.pro">PORTAFOLIO</a>
        </div>
    </footer>

    <script>
        let currentLanguage = 'es';
        let currentModule = 'clarity';
        let currentResponseMode = 'soft';

        const i18n = {
            es: {
                back: "← Volver a AndresRamirez.pro",
                mainTitle: "Laboratorio de Claridad",
                mainSubtitle: "Arquitectura mental para decisiones complejas",
                labelModules: "Módulos",
                btnAnalyze: "ANALIZAR",
                ready: "Listo para analizar.",
                toneLabel: "TONO:",
                modeSoft: "SUAVE",
                modeBrutal: "BRUTAL",
                modules: {
                    clarity: { title: "01. Protocolo de Claridad", desc: "Analiza y refina tu pensamiento", workTitle: "Protocolo de Claridad", workDesc: "Análisis estructurado de intención y debilidades lógicas." },
                    hygiene: { title: "02. Higiene Decisional", desc: "Evalúa riesgos y sesgos", workTitle: "Higiene Decisional", workDesc: "Evaluación de riesgos, sesgos y umbrales decisionales." }
                }
            },
            en: {
                back: "← BACK TO ANDRESRAMIREZ.PRO",
                mainTitle: "Clarity Lab",
                mainSubtitle: "MENTAL ARCHITECTURE FOR COMPLEX DECISIONS",
                labelModules: "MODULES",
                btnAnalyze: "ANALYZE",
                ready: "Ready to analyze.",
                toneLabel: "TONE:",
                modeSoft: "SOFT",
                modeBrutal: "BRUTAL",
                modules: {
                    clarity: { title: "01. Clarity Protocol", desc: "Analyze and refine your thinking", workTitle: "Clarity Protocol", workDesc: "Structured analysis of intention and logical weaknesses." },
                    hygiene: { title: "02. Decision Hygiene", desc: "Evaluate risks and biases", workTitle: "Decision Hygiene", workDesc: "Risk, bias and decision threshold evaluation." }
                }
            }
        };

        function setLanguage(lang) {
            currentLanguage = lang;
            document.getElementById('lang-es').classList.toggle('active', lang === 'es');
            document.getElementById('lang-en').classList.toggle('active', lang === 'en');
            updateUI();
        }

        function updateUI() {
            const ui = i18n[currentLanguage];
            const mod = ui.modules[currentModule];
            
            document.querySelector('.back-link').textContent = ui.back;
            document.getElementById('main-title').textContent = ui.mainTitle;
            document.getElementById('main-subtitle').textContent = ui.mainSubtitle;
            document.getElementById('label-modules').textContent = ui.labelModules;
            document.getElementById('btn-analyze').textContent = ui.btnAnalyze;
            document.getElementById('label-tone').textContent = ui.toneLabel;

            document.getElementById('workspace-title').textContent = mod.workTitle;
            document.getElementById('workspace-desc').textContent = mod.workDesc;

            // Actualiza los botones del sidebar
            document.getElementById('m1-title').textContent = ui.modules.clarity.title;
            document.getElementById('m1-desc').textContent = ui.modules.clarity.desc;
            document.getElementById('m2-title').textContent = ui.modules.hygiene.title;
            document.getElementById('m2-desc').textContent = ui.modules.hygiene.desc;

            updateModeButton();
        }

        function updateModeButton() {
            const btn = document.getElementById('mode-toggle');
            const ui = i18n[currentLanguage];
            btn.textContent = currentResponseMode === 'soft' ? ui.modeSoft : ui.modeBrutal;
        }

        function selectModule(module, btnElement) {
            currentModule = module;
            updateUI();
            document.querySelectorAll('.module-btn').forEach(b => b.classList.remove('active'));
            if (btnElement) btnElement.classList.add('active');
        }

        function toggleTone() {
            currentResponseMode = currentResponseMode === 'soft' ? 'brutal' : 'soft';
            updateModeButton();
            const btn = document.getElementById('mode-toggle');
            btn.style.background = currentResponseMode === 'brutal' ? 'var(--ink)' : '#EEEBE6';
            btn.style.color = currentResponseMode === 'brutal' ? 'white' : 'var(--ink)';
        }

        async function analyzeText() {
            const text = document.getElementById('user-input').value.trim();
            if (!text) return;

            const output = document.getElementById('output');
            const errorDiv = document.getElementById('error-debug');
            errorDiv.style.display = 'none';
            output.innerHTML = `<em>${currentLanguage === 'es' ? 'Procesando data...' : 'Processing data...'}</em>`;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        text: text,
                        language: currentLanguage,
                        responseMode: currentResponseMode,
                        module: currentModule   // ← NUEVO: ahora envía el módulo
                    })
                });

                let data;
                try { data = await response.json(); } catch (e) { throw new Error('El servidor no devolvió una respuesta válida'); }

                if (!response.ok || !data.success) {
                    throw new Error(data.error || `Error del servidor (${response.status})`);
                }

                output.innerHTML = `<p style="white-space: pre-wrap; line-height: 1.7;">${data.response}</p>`;

            } catch (err) {
                console.error(err);
                const ui = i18n[currentLanguage];
                errorDiv.innerHTML = `
                    <strong>🚨 ERROR DETECTADO EN EL LABORATORIO</strong><br><br>
                    ${err.message}<br><br>
                    <small>🔍 Copia este mensaje completo si me lo quieres mandar.</small>
                `;
                errorDiv.style.display = 'block';
                output.innerHTML = `<span style="color:#c00;">${currentLanguage === 'es' ? '❌ Error al conectar con OpenAI' : '❌ OpenAI connection error'}</span>`;
            }
        }

        // Inicializar
        updateUI();
    </script>
</body>
</html>
