<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratorio de Claridad | Andrés Ramírez</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Instrument+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --parchment: #F7F4EF;
            --ink: #1A1814;
            --amber: #8B6F4E;
            --sand: #C4A882;
            --thin-line: 1px solid rgba(26, 24, 20, 0.1);
        }
        body {
            background-color: var(--parchment);
            color: var(--ink);
            font-family: 'Instrument Sans', sans-serif;
            font-size: 15px;
            line-height: 1.6;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* HEADER EDITORIAL */
        .header {
            padding: 3rem 5% 2rem 5%;
            border-bottom: var(--thin-line);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        .header-left h1 {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 2.5rem;
            font-weight: 300;
            line-height: 1;
            margin-bottom: 0.5rem;
        }
        .header-left p {
            font-size: 12px;
            color: var(--amber);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 500;
        }
        .lang-toggle button {
            background: none;
            border: none;
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            color: var(--sand);
            cursor: pointer;
            padding: 0.5rem;
            transition: color 0.3s;
        }
        .lang-toggle button.active { color: var(--ink); font-weight: 600; }

        .container { display: flex; flex: 1; overflow: hidden; }

        /* SIDEBAR */
        .modules-panel {
            width: 25%;
            border-right: var(--thin-line);
            padding: 2rem 3%;
            overflow-y: auto;
        }
        .section-label {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: var(--sand);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 2rem;
            display: block;
        }
        .module-btn {
            display: block;
            width: 100%;
            padding: 1.5rem;
            margin-bottom: 1rem;
            background: transparent;
            border: 1px solid transparent;
            cursor: pointer;
            text-align: left;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .module-btn h4 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem;
            font-weight: 400;
            margin-bottom: 0.2rem;
        }
        .module-btn p { font-size: 11px; color: var(--sand); line-height: 1.3; }
        .module-btn.active {
            background: white;
            border: var(--thin-line);
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
        }
        .module-btn.active h4 { font-style: italic; color: var(--amber); }

        /* WORKSPACE */
        .workspace { flex: 1; padding: 4rem 8%; overflow-y: auto; display: flex; flex-direction: column; }
        .workspace-header { margin-bottom: 3rem; }
        .workspace-header h2 { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; font-weight: 300; margin-bottom: 0.5rem; }
        .workspace-header p { color: var(--sand); font-size: 14px; }

        .textarea-wrapper textarea {
            width: 100%;
            min-height: 200px;
            padding: 2rem;
            font-family: 'Instrument Sans', sans-serif;
            background: white;
            border: var(--thin-line);
            resize: none;
            font-size: 16px;
            outline: none;
            transition: border 0.3s;
        }
        .textarea-wrapper textarea:focus { border-color: var(--amber); }

        .controls-row {
            margin: 2.5rem 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .segmented-control { display: flex; background: #EEEBE6; padding: 3px; border-radius: 2px; }
        .mode-btn {
            padding: 0.5rem 1.5rem;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 12px;
            font-family: 'DM Mono', monospace;
            color: var(--sand);
            transition: all 0.3s;
        }
        .mode-btn.active { background: var(--ink); color: var(--parchment); }

        .btn {
            padding: 0.8rem 2rem;
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border: var(--thin-line);
            transition: all 0.3s;
        }
        .btn-primary { background: var(--ink); color: var(--parchment); border: none; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

        .output-content {
            margin-top: 2rem;
            padding: 2rem;
            background: rgba(255,255,255,0.5);
            border: var(--thin-line);
            min-height: 150px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem;
            line-height: 1.8;
        }

        @media (max-width: 900px) {
            .container { flex-direction: column; overflow: visible; }
            .modules-panel { width: 100%; border-right: none; border-bottom: var(--thin-line); }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-left">
            <h1 id="main-title">Laboratorio de Claridad</h1>
            <p id="main-subtitle">Arquitectura mental para decisiones complejas</p>
        </div>
        <div class="lang-toggle">
            <button id="lang-es" class="active" onclick="setLanguage('es')">ES</button>
            <button id="lang-en" onclick="setLanguage('en')">EN</button>
        </div>
    </div>

    <div class="container">
        <div class="modules-panel">
            <span class="section-label" id="label-modules">Módulos</span>
            <button class="module-btn active" onclick="selectModule('clarity')">
                <h4 id="m1-title">01. Protocolo de Claridad</h4>
                <p id="m1-desc">Analiza y refina tu pensamiento</p>
            </button>
            <button class="module-btn" onclick="selectModule('field-note')">
                <h4 id="m2-title">02. Nota de Campo</h4>
                <p id="m2-desc">Ensayo premium sobre tema</p>
            </button>
            <button class="module-btn" onclick="selectModule('hygiene')">
                <h4 id="m3-title">03. Higiene Decisional</h4>
                <p id="m3-desc">Evalúa riesgos y sesgos</p>
            </button>
        </div>

        <div class="workspace">
            <div class="workspace-header">
                <h2 id="workspace-title">Protocolo de Claridad</h2>
                <p id="workspace-desc">Análisis estructurado de intención y debilidades lógicas.</p>
            </div>

            <div class="textarea-wrapper">
                <textarea id="user-input" placeholder=""></textarea>
            </div>

            <div class="controls-row">
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <span style="font-size: 12px; color: var(--sand);" id="label-tone">Tono:</span>
                    <div class="segmented-control">
                        <button class="mode-btn active" id="mode-soft" onclick="setResponseMode('soft')">SUAVE</button>
                        <button class="mode-btn" id="mode-brutal" onclick="setResponseMode('brutal')">BRUTAL</button>
                    </div>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn" onclick="clearInput()" id="btn-clear">Limpiar</button>
                    <button class="btn btn-primary" onclick="analyzeText()" id="btn-analyze">Analizar</button>
                </div>
            </div>

            <div class="output-content" id="output">
                ...
            </div>
        </div>
    </div>

    <script>
        let currentLanguage = 'es';
        let currentModule = 'clarity';
        let currentResponseMode = 'soft';

        const i18n = {
            es: {
                mainTitle: "Laboratorio de Claridad",
                mainSubtitle: "Arquitectura mental para decisiones complejas",
                labelModules: "Módulos",
                labelTone: "Tono:",
                btnClear: "Limpiar",
                btnAnalyze: "Analizar",
                ready: "Listo para analizar.",
                processing: "Procesando pensamiento...",
                tones: { soft: "SUAVE", brutal: "BRUTAL" },
                modules: {
                    clarity: {
                        title: "01. Protocolo de Claridad",
                        desc: "Analiza y refina tu pensamiento",
                        workTitle: "Protocolo de Claridad",
                        workDesc: "Análisis estructurado de intención y debilidades lógicas.",
                        placeholder: "Ej: Siento que mi ambición está dañando mi relación actual, pero no sé si es miedo al éxito o falta de compatibilidad real..."
                    },
                    'field-note': {
                        title: "02. Nota de Campo",
                        desc: "Ensayo premium sobre tema",
                        workTitle: "Nota de Campo",
                        workDesc: "Ensayo profundo sobre un concepto de performance humano.",
                        placeholder: "Ej: La fricción entre la disciplina radical y la salud mental en entornos de alta presión..."
                    },
                    hygiene: {
                        title: "03. Higiene Decisional",
                        desc: "Evalúa riesgos y sesgos",
                        workTitle: "Higiene Decisional",
                        workDesc: "Identifica los puntos ciegos antes de actuar.",
                        placeholder: "Ej: Estoy a punto de confrontar a mi socio sobre la distribución de dividendos. ¿Qué sesgos de pérdida podrían estar nublándome?"
                    }
                }
            },
            en: {
                mainTitle: "Clarity Laboratory",
                mainSubtitle: "Mental architecture for complex decisions",
                labelModules: "Modules",
                labelTone: "Tone:",
                btnClear: "Clear",
                btnAnalyze: "Analyze",
                ready: "Ready to analyze.",
                processing: "Processing thought...",
                tones: { soft: "SOFT", brutal: "BRUTAL" },
                modules: {
                    clarity: {
                        title: "01. Clarity Protocol",
                        desc: "Analyze and refine your thinking",
                        workTitle: "Clarity Protocol",
                        workDesc: "Structured analysis of intent and logical gaps.",
                        placeholder: "e.g., I feel my ambition is hurting my current relationship, but I don't know if it's fear of success or lack of real compatibility..."
                    },
                    'field-note': {
                        title: "02. Field Note",
                        desc: "Premium essay on topic",
                        workTitle: "Field Note",
                        workDesc: "Deep essay on a human performance concept.",
                        placeholder: "e.g., The friction between radical discipline and mental health in high-pressure environments..."
                    },
                    hygiene: {
                        title: "03. Decision Hygiene",
                        desc: "Evaluate risks and biases",
                        workTitle: "Decision Hygiene",
                        workDesc: "Identify blind spots before taking action.",
                        placeholder: "e.g., I'm about to confront my partner regarding dividend distribution. What loss biases might be clouding my judgment?"
                    }
                }
            }
        };

        function setLanguage(lang) {
            currentLanguage = lang;
            document.getElementById('lang-es').classList.toggle('active', lang === 'es');
            document.getElementById('lang-en').classList.toggle('active', lang === 'en');
            updateUI();
        }

        function selectModule(module) {
            currentModule = module;
            const btns = document.querySelectorAll('.module-btn');
            btns[0].classList.toggle('active', module === 'clarity');
            btns[1].classList.toggle('active', module === 'field-note');
            btns[2].classList.toggle('active', module === 'hygiene');
            updateUI();
        }

        function setResponseMode(mode) {
            currentResponseMode = mode;
            document.getElementById('mode-soft').classList.toggle('active', mode === 'soft');
            document.getElementById('mode-brutal').classList.toggle('active', mode === 'brutal');
        }

        function updateUI() {
            const ui = i18n[currentLanguage];
            const mod = ui.modules[currentModule];

            // Global UI
            document.getElementById('main-title').textContent = ui.mainTitle;
            document.getElementById('main-subtitle').textContent = ui.mainSubtitle;
            document.getElementById('label-modules').textContent = ui.labelModules;
            document.getElementById('label-tone').textContent = ui.labelTone;
            document.getElementById('btn-clear').textContent = ui.btnClear;
            document.getElementById('btn-analyze').textContent = ui.btnAnalyze;
            document.getElementById('mode-soft').textContent = ui.tones.soft;
            document.getElementById('mode-brutal').textContent = ui.tones.brutal;

            // Sidebar Titles
            document.getElementById('m1-title').textContent = ui.modules.clarity.title;
            document.getElementById('m1-desc').textContent = ui.modules.clarity.desc;
            document.getElementById('m2-title').textContent = ui.modules['field-note'].title;
            document.getElementById('m2-desc').textContent = ui.modules['field-note'].desc;
            document.getElementById('m3-title').textContent = ui.modules.hygiene.title;
            document.getElementById('m3-desc').textContent = ui.modules.hygiene.desc;

            // Workspace
            document.getElementById('workspace-title').textContent = mod.workTitle;
            document.getElementById('workspace-desc').textContent = mod.workDesc;
            document.getElementById('user-input').placeholder = mod.placeholder;
            
            if(document.getElementById('output').textContent === i18n.es.ready || document.getElementById('output').textContent === i18n.en.ready || document.getElementById('output').textContent === '...') {
                document.getElementById('output').textContent = ui.ready;
            }
        }

        async function analyzeText() {
            const text = document.getElementById('user-input').value;
            const output = document.getElementById('output');
            if(!text) return;
            
            output.textContent = i18n[currentLanguage].processing;

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        module: currentModule,
                        text,
                        language: currentLanguage,
                        responseMode: currentResponseMode
                    })
                });
                const data = await res.json();
                output.textContent = data.response;
            } catch (e) {
                output.textContent = currentLanguage === 'es' ? "Error de conexión." : "Connection error.";
            }
        }

        function clearInput() {
            document.getElementById('user-input').value = "";
            document.getElementById('output').textContent = i18n[currentLanguage].ready;
        }

        // Initialize
        updateUI();
    </script>
</body>
</html>
