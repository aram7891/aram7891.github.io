<!DOCTYPE html>

<body class="bg-brand-bg text-brand-dark font-sans flex flex-col min-h-screen antialiased selection:bg-brand-blue selection:text-white">

  <!-- 1. LANGUAGE GATE (PUERTA VIP) -->

          <div class="flex flex-col gap-4">
            <button onclick="selectLanguageAndProceed('en')" class="w-full py-4 border border-brand-lightBlue text-brand-dark font-bold tracking-[0.2em] text-[10px] uppercase transition-all duration-300 rounded-full hover:bg-brand-blue hover:text-white shadow-sm hover:shadow-xl hover:scale-[1.02] active:scale-[0.98]">English</button>
            <button onclick="selectLanguageAndProceed('es')" class="w-full py-4 border border-brand-lightBlue text-brand-dark font-bold tracking-[0.2em] text-[10px] uppercase transition-all duration-300 rounded-full hover:bg-brand-blue hover:text-white shadow-sm hover:shadow-xl hover:scale-[1.02] active:scale-[0.98]">Español</button>

  <!-- 2. MAIN CONTENT (EL REGALO) -->
  <div id="main-content" class="flex-grow flex flex-col hidden opacity-0 transition-opacity duration-1000">
    <div class="fixed top-6 right-6 z-40">
      <div class="bg-white/90 backdrop-blur-md border border-brand-lightBlue shadow-xl flex items-center p-1 rounded-full text-[10px] font-bold tracking-widest">
        <button onclick="changeLanguage('es')" id="btn-toggle-es" class="px-3 py-1.5 rounded-full transition-all text-brand-dark hover:text-brand-blue uppercase">ES</button>
        <button onclick="changeLanguage('en')" id="btn-toggle-en" class="px-3 py-1.5 rounded-full transition-all text-brand-dark hover:text-brand-blue uppercase">EN</button>
      </div>
    </div>

    <main class="flex-grow flex items-center justify-center px-6 py-24 relative z-10">
      <div class="max-w-xl w-full bg-white border border-brand-lightBlue p-10 md:p-16 shadow-2xl relative text-center">
        
        <!-- BADGE DEL REGALO -->
        <div class="absolute -top-12 left-1/2 transform -translate-x-1/2 bg-white border border-brand-lightBlue w-24 h-24 rounded-full flex items-center justify-center shadow-xl">
          <div class="bg-brand-bg w-20 h-20 rounded-full flex items-center justify-center text-brand-blue">
            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.2" d="M21 11H3M21 11V19C21 20.1046 20.1046 21 19 21H5C3.89543 21 3 20.1046 3 19V11M21 11C21 9.89543 20.1046 9 19 9H5C3.89543 9 3 9.89543 3 11M12 21V9M12 9H16.5C17.8807 9 19 7.88071 19 6.5C19 5.11929 17.8807 4 16.5 4C14.75 4 12 9 12 9ZM12 9H7.5C6.11929 9 5 7.88071 5 6.5C5 5.11929 6.11929 4 7.5 4C9.25 4 12 9 12 9Z"></path>
            </svg>
          </div>
        </div>
        
        <div class="mt-8"></div>
        <p class="text-[10px] font-bold uppercase tracking-[0.5em] text-brand-blue mb-10" data-i18n="tag"></p>
        <p class="text-xl md:text-2xl text-brand-dark/70 font-light mb-8 leading-relaxed" data-i18n="joke"></p>
        <p class="text-[10px] font-bold uppercase tracking-[0.4em] text-brand-dark/20 mb-14 border-b border-brand-lightBlue pb-10 inline-block" data-i18n="reality"></p>
        <p class="text-4xl md:text-5xl font-serif font-semibold text-brand-dark mb-16 leading-tight" data-i18n="hook"></p>
        
        <!-- BOTONES DE ACCIÓN -->
        <div class="flex flex-col sm:flex-row gap-6 justify-center items-center">
          <!-- ESTE BOTÓN AHORA ABRE CORRECTAMENTE blueprint.html -->
          <button onclick="openBlueprint()" class="w-full sm:w-auto px-12 py-4 bg-brand-blue text-white font-bold tracking-[0.2em] text-[10px] uppercase shadow-2xl hover:bg-brand-dark transition-all duration-500 flex items-center justify-center gap-4 group rounded-full hover:scale-[1.05] active:scale-[0.95]">
            <svg class="w-5 h-5 group-hover:-rotate-12 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 11H3M21 11V19C21 20.1046 20.1046 21 19 21H5C3.89543 21 3 20.1046 3 19V11M21 11C21 9.89543 20.1046 9 19 9H5C3.89543 9 3 9.89543 3 11M12 21V9M12 9H16.5C17.8807 9 19 7.88071 19 6.5C19 5.11929 17.8807 4 16.5 4C14.75 4 12 9 12 9ZM12 9H7.5C6.11929 9 5 7.88071 5 6.5C5 5.11929 6.11929 4 7.5 4C9.25 4 12 9 12 9Z"></path></svg>
            <span data-i18n="btn-primary"></span>
          </button>
          <a href="https://andresramirez.pro" target="_blank" class="w-full sm:w-auto px-12 py-4 border border-brand-lightBlue text-brand-dark/40 hover:text-brand-dark hover:border-brand-blue font-bold text-[10px] uppercase tracking-[0.2em] transition-all duration-300 rounded-full">
            <span data-i18n="btn-secondary"></span>
          </a>
        </div>
      </div>
    </main>

    <footer class="bg-white pt-16 pb-12 px-10 border-t border-brand-lightBlue relative z-10 mt-auto">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center md:items-start gap-12 text-center md:text-left">
            <div class="flex flex-col md:flex-row items-center gap-8">
                <div class="w-24 h-24 bg-brand-lightBlue shrink-0 relative overflow-hidden shadow-inner rounded-lg">
                    <img src="assets/images/andres-ramirez-portrait.jpg" alt="Andrés Ramírez" class="w-full h-full object-cover portrait-luxury cursor-pointer" onerror="this.src='https://ui-avatars.com/api/?name=AR&background=2A5C8A&color=fff'">
                </div>
                <div>
                    <h4 class="font-serif font-semibold text-3xl tracking-tight text-brand-dark mb-1">Andrés Ramírez</h4>
                    <p class="text-brand-blue text-[10px] font-bold uppercase tracking-[0.3em]">Clarity Strategist</p>
                </div>
            </div>
            <div class="flex flex-col md:items-end gap-6 text-[10px] font-bold uppercase tracking-[0.4em] text-brand-dark/30">
                <p data-i18n="footer-connect"></p>
                <div class="flex gap-10">
                    <a href="https://threads.net/@aram7891" target="_blank" class="text-brand-dark/60 hover:text-brand-blue transition-all flex items-center gap-3 group">Threads</a>
                    <a href="https://instagram.com/selfloveclubusa" target="_blank" class="text-brand-dark/60 hover:text-brand-blue transition-all flex items-center gap-3 group">Instagram</a>
                </div>
            </div>
        </div>
        <div class="max-w-6xl mx-auto mt-20 pt-8 border-t border-brand-lightBlue flex flex-col sm:flex-row justify-between items-center gap-4 text-[10px] text-brand-dark/40 font-bold uppercase tracking-[0.5em]">
            <p data-i18n="footer-rights"></p>
        </div>
    </footer>
  </div>

  <script>
    const translations = {
        es: {
            "tag": "Un regalo para ti",
            "joke": "A mi mente hispana <span class=\"font-serif italic text-brand-blue font-semibold\">\"Blueprint\"</span> siempre le suena a un pájaro azul.",
            "reality": "En realidad significa plano.",
            "hook": "El plano de claridad que ya te pertenece.<br><span class=\"italic text-brand-blue\">Ábrelo.</span>",
            "btn-primary": "Abrir el Blueprint",
            "btn-secondary": "Ir a mi sitio",
            "footer-connect": "Conecta conmigo",
            "footer-rights": "© 2026 andresramirez.pro | Clarity Strategy"
        },
        en: {
            "tag": "A gift for you",
            "joke": "To my Spanish-speaking mind, <span class=\"font-serif italic text-brand-blue font-semibold\">\"Blueprint\"</span> sounds like a rare blue bird.",
            "reality": "It actually means a structural plan.",
            "hook": "The clarity plan that already belongs to you.<br><span class=\"italic text-brand-blue\">Open it.</span>",
            "btn-primary": "Open the Blueprint",
            "btn-secondary": "Go to my site",
            "footer-connect": "Connect with me",
            "footer-rights": "© 2026 andresramirez.pro | Clarity Strategy"
        }
    };

    const gateScreen = document.getElementById('language-gate');
    const mainContent = document.getElementById('main-content');
    const btnEs = document.getElementById('btn-toggle-es');
    const btnEn = document.getElementById('btn-toggle-en');

    // BLINDAJE DE SEGURIDAD PARA SAFARI (Evita que los botones fallen)
    function safeSetLang(lang) { try { localStorage.setItem("lang", lang); } catch(e) {} }
    function safeGetLang() { try { return localStorage.getItem("lang"); } catch(e) { return null; } }

    document.addEventListener("DOMContentLoaded", () => {
        const savedLang = safeGetLang();
        if (savedLang) {
            gateScreen.style.display = 'none';
            mainContent.classList.remove('hidden');
            setTimeout(() => { mainContent.classList.remove('opacity-0'); }, 50);
            applyLanguage(savedLang);
        } else {
            gateScreen.style.display = 'flex';
        }
    });

    function selectLanguageAndProceed(lang) {
        safeSetLang(lang);
        gateScreen.classList.add('opacity-0');
        setTimeout(() => {
            gateScreen.style.display = 'none';
            applyLanguage(lang);
            mainContent.classList.remove('hidden');
            setTimeout(() => { mainContent.classList.remove('opacity-0'); }, 50);
        }, 700);
    }

    function changeLanguage(lang) {
        safeSetLang(lang);
        applyLanguage(lang);
    }

    function applyLanguage(lang) {
        document.documentElement.lang = lang;
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (translations[lang]?.[key]) el.innerHTML = translations[lang][key];
        });

        const activeClass = "bg-brand-blue text-white shadow-lg";
        const inactiveClass = "text-brand-dark hover:text-brand-blue";
        btnEs.className = "px-3 py-1.5 rounded-full transition-all " + (lang === 'es' ? activeClass : inactiveClass);
        btnEn.className = "px-3 py-1.5 rounded-full transition-all " + (lang === 'en' ? activeClass : inactiveClass);
    }

    function openBlueprint() {
      // AQUÍ SE CORRIGIÓ EL ERROR: Ahora abre el archivo correcto.
      window.open("blueprint.html", "_blank", "noopener,noreferrer");
    }
  </script>
</body>
</html>
