<section class="max-w-5xl mx-auto px-6 py-20">

  <h2 class="text-3xl font-serif mb-10">Laboratorio de Discernimiento</h2>

  <!-- DISCERNIMIENTO RELACIONAL -->
  <div class="mb-16">
    <h3 class="text-xl font-serif mb-4">Discernimiento Relacional</h3>

    <textarea id="situationInput"
              class="w-full border border-divider p-4 rounded-md mb-4"
              rows="6"
              placeholder="Describe la situación con la mayor claridad posible..."></textarea>

    <button onclick="analyzeClarity()"
            class="px-6 py-3 bg-ink text-paper rounded-md flex items-center space-x-2">
      <span id="analyzeBtnText">Analizar</span>
      <span id="analyzeSpinner" class="hidden animate-spin">⏳</span>
    </button>

    <div id="clarityResult" class="hidden mt-6 border border-divider p-6 rounded-md">
      <div id="clarityContent"></div>
    </div>
  </div>

  <!-- NOTAS DE CAMPO -->
  <div>
    <h3 class="text-xl font-serif mb-4">Notas de Campo</h3>

    <textarea id="patternInput"
              class="w-full border border-divider p-4 rounded-md mb-4"
              rows="6"
              placeholder="Describe el patrón, comportamiento o dinámica que quieres auditar..."></textarea>

    <button onclick="generateFieldNote()"
            class="px-6 py-3 bg-ink text-paper rounded-md flex items-center space-x-2">
      <span id="noteBtnText">Generar Nota</span>
      <span id="noteSpinner" class="hidden animate-spin">⏳</span>
    </button>

    <div id="noteResult" class="hidden mt-6 border border-divider p-6 rounded-md">
      <div id="noteContent"></div>
    </div>
  </div>

</section>
