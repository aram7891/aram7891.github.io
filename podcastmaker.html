```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLC Strategy Lab | Podcast Script Maker | Andrés Ramírez</title>
    <!-- Tailwind CSS para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y Babel para que el navegador entienda JSX -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        .font-serif { font-family: 'Playfair Display', serif; }

        @media print {
            body { background: white !important; }
            .print-hidden { display: none !important; }
            .print-area { 
                box-shadow: none !important; 
                border: none !important; 
                margin: 0 !important; 
                padding: 0 !important;
                width: 100% !important;
            }
            @page { margin: 1cm; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [apiKey, setApiKey] = useState('');
            const [inputText, setInputText] = useState('');
            const [result, setResult] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            const TEMPLATE = `
# [TÍTULO DEL ENSAYO EN MAYÚSCULAS]
Subtítulo: [Tesis central]
Byline: Research & Strategy by Andrés Ramírez

## EXECUTIVE SUMMARY
[Resumen de impacto]

## THE CORE PROBLEM (INPUT)
[Análisis del caos original]

## CLARITY ARCHITECTURE (FILTER)
[Metodología aplicada]
- Punto 1
- Punto 2

## DECISION FRAMEWORK
Input -> Filter -> Decision: [Flujo estratégico]

## GLOSSARY OF STRATEGY
Término: Definición SLC.

## FINAL SIGNATURE
Clarity is a choice.
            `;

            const callGemini = async (text) => {
                const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                
                const payload = {
                    contents: [{ parts: [{ text: `Procesa este contenido según la estructura SLC:\n\n${text}` }] }],
                    systemInstruction: { parts: [{ text: `Eres la estratega técnica de Andrés Ramírez. Tu tarea es transformar el texto del usuario en un ensayo estructurado siguiendo estrictamente esta plantilla: ${TEMPLATE}. Mantén un tono analítico, sofisticado y directo. Usa Markdown para la estructura.` }] }
                };

                let delay = 1000;
                for (let i = 0; i < 5; i++) {
                    try {
                        const response = await fetch(endpoint, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });

                        if (response.ok) {
                            const data = await response.json();
                            return data.candidates?.[0]?.content?.parts?.[0]?.text;
                        }
                    } catch (err) {
                        if (i === 4) throw err;
                    }
                    await new Promise(resolve => setTimeout(resolve, delay));
                    delay *= 2;
                }
                throw new Error('Error al conectar con Gemini. Revisa tu API Key.');
            };

            const handleProcess = async () => {
                if (!apiKey) return setError('Chamo, falta la API Key.');
                if (!inputText) return setError('Pega el texto a procesar.');
                
                setLoading(true);
                setError('');
                try {
                    const output = await callGemini(inputText);
                    setResult(output);
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* UI Header */}
                    <header className="print-hidden bg-white border-b border-slate-200 p-4 sticky top-0 z-50">
                        <div className="max-w-6xl mx-auto flex flex-wrap justify-between items-center gap-4">
                            <div className="flex items-center gap-3">
                                <div className="bg-black text-white p-2 rounded font-bold text-lg">SLC</div>
                                <div>
                                    <h1 className="font-bold leading-none">Strategy Lab</h1>
                                    <span className="text-[10px] text-slate-400 uppercase tracking-widest">Research & Strategy</span>
                                </div>
                            </div>
                            
                            <div className="flex items-center gap-3">
                                <input 
                                    type="password" 
                                    placeholder="Gemini API Key" 
                                    className="border rounded px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-black w-40 md:w-60"
                                    value={apiKey}
                                    onChange={(e) => setApiKey(e.target.value)}
                                />
                                <button 
                                    onClick={handleProcess}
                                    disabled={loading}
                                    className="bg-black text-white px-5 py-2 rounded text-sm font-semibold hover:bg-slate-800 disabled:bg-slate-300 transition-all flex items-center gap-2"
                                >
                                    {loading ? "Procesando..." : "Ejecutar"}
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-2 gap-8 flex-grow w-full">
                        {/* Editor Section */}
                        <div className="print-hidden">
                            <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden h-full flex flex-col">
                                <div className="bg-slate-50 px-4 py-2 border-b border-slate-200 flex justify-between items-center">
                                    <span className="text-[10px] font-bold uppercase tracking-widest text-slate-400 italic">Investigación Cruda</span>
                                </div>
                                <textarea 
                                    className="w-full h-[600px] p-6 focus:outline-none text-sm leading-relaxed resize-none"
                                    placeholder="Pega aquí el contenido que extrajiste del PDF..."
                                    value={inputText}
                                    onChange={(e) => setInputText(e.target.value)}
                                ></textarea>
                                {error && <div className="p-4 bg-red-50 text-red-600 text-xs border-t">{error}</div>}
                            </div>
                        </div>

                        {/* Preview Section */}
                        <div id="document-preview" className="print-area bg-white rounded-xl shadow-xl border border-slate-200 overflow-hidden min-h-[842px] flex flex-col relative">
                            {!result && !loading ? (
                                <div className="flex-grow flex flex-col items-center justify-center p-12 text-slate-300">
                                    <i data-lucide="layout" className="w-12 h-12 mb-4 opacity-20"></i>
                                    <p className="text-center italic">Esperando arquitectura de claridad...</p>
                                </div>
                            ) : loading ? (
                                <div className="flex-grow flex flex-col items-center justify-center p-12">
                                    <div className="w-10 h-10 border-4 border-slate-200 border-t-black rounded-full animate-spin mb-4"></div>
                                    <p className="text-sm font-medium">Filtrando el ruido...</p>
                                </div>
                            ) : (
                                <div className="p-12 flex flex-col h-full">
                                    {/* Header Branding */}
                                    <div className="flex justify-between items-center border-b border-slate-100 pb-4 mb-8">
                                        <span className="text-[9px] font-bold tracking-[0.2em] text-slate-400 uppercase">Self Love Club | Research & Strategy</span>
                                        <div className="w-5 h-5 bg-black"></div>
                                    </div>

                                    {/* Essay Content */}
                                    <div className="flex-grow">
                                        <div className="whitespace-pre-wrap font-serif text-slate-800 leading-relaxed text-[13px] md:text-[14px]">
                                            {result}
                                        </div>
                                    </div>

                                    {/* Signature / Footer */}
                                    <footer className="mt-16 pt-8 border-t border-slate-100 flex items-center justify-between">
                                        <div className="flex items-center gap-4">
                                            <img 
                                                src="/assets/images/andres-ramirez-portrait.jpg" 
                                                alt="Andrés Ramírez" 
                                                className="w-14 h-14 rounded-full object-cover grayscale border border-slate-100"
                                                onError={(e) => { e.target.src = 'https://via.placeholder.com/100?text=AR'; }}
                                            />
                                            <div className="leading-tight">
                                                <h3 className="text-xs font-bold uppercase tracking-tight">Andrés Ramírez</h3>
                                                <p className="text-[10px] text-slate-400 font-medium">Clarity Strategist</p>
                                                <div className="flex gap-2 mt-1">
                                                    <span className="text-[9px] text-slate-300">@aram7891</span>
                                                    <span className="text-[9px] text-slate-300">@selfloveclubusa</span>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="text-[10px] text-slate-300 italic">
                                            Clarity is a choice.
                                        </div>
                                    </footer>

                                    {/* Floating Print Button (Hidden in Print) */}
                                    <button 
                                        onClick={() => window.print()}
                                        className="print-hidden absolute top-4 right-4 bg-slate-50 hover:bg-slate-100 p-2 rounded-full border border-slate-100 transition-all"
                                        title="Guardar PDF"
                                    >
                                        <i data-lucide="download" className="w-4 h-4 text-slate-600"></i>
                                    </button>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Inicializar iconos de Lucide después de renderizar
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>

```
